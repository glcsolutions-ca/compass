# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "compass"

[setup]
script = "pnpm install"

[setup.darwin]
script = '''
set -eu

export VOLTA_HOME="$HOME/.volta"
export PATH="$VOLTA_HOME/bin:$PATH"

if ! command -v node >/dev/null 2>&1; then
  if ! command -v curl >/dev/null 2>&1; then
    echo "Node.js is missing and curl was not found. Install Node.js 22+ and rerun setup." >&2
    exit 1
  fi

  if ! command -v volta >/dev/null 2>&1; then
    curl -fsSL https://get.volta.sh | bash
  fi

  export PATH="$VOLTA_HOME/bin:$PATH"
  volta install node@22
fi

npm install --global corepack@latest
PNPM_SHIM_DIR="$(npm config get prefix)/bin"
mkdir -p "$PNPM_SHIM_DIR"
if ! corepack enable pnpm --install-directory "$PNPM_SHIM_DIR"; then
  echo "Corepack could not write pnpm shims to $PNPM_SHIM_DIR." >&2
  echo "Run in an elevated shell:" >&2
  echo "sudo npm install --global corepack@latest && corepack enable pnpm --install-directory \"$PNPM_SHIM_DIR\" && corepack prepare pnpm@10.30.1 --activate && pnpm install" >&2
  exit 1
fi
corepack prepare pnpm@10.30.1 --activate
pnpm install
'''

