scope:docs:
  - changed-files:
      - any-glob-to-any-file:
          [
            "README.md",
            "bootstrap/**",
            "pipeline/**/*.md",
            "infra/**/*.md",
            "tests/**/*.md",
            "AGENTS.md"
          ]
scope:runtime-api-web:
  - changed-files:
      - any-glob-to-any-file: ["apps/api/**", "apps/web/**", "db/**", "infra/azure/**"]
scope:packages:
  - changed-files:
      - any-glob-to-any-file: ["packages/**"]
risk:pipeline:
  - changed-files:
      - any-glob-to-any-file:
          [
            ".github/**",
            "pipeline/**",
            "scripts/**",
            "package.json",
            "pnpm-lock.yaml",
            "turbo.json"
          ]
ci:
  - changed-files:
      - any-glob-to-any-file: [".github/**", "pipeline/**", "scripts/**"]
