scope:infra:
  - changed-files:
      - any-glob-to-any-file:
          - platform/infra/azure/**
          - platform/infra/azure/environments/**
          - bootstrap/config/production.json
          - platform/scripts/bootstrap/**

scope:runtime-api-web:
  - changed-files:
      - any-glob-to-any-file:
          - apps/api/**
          - apps/web/**
          - packages/database/**
          - tests/acceptance/**

scope:packages:
  - changed-files:
      - any-glob-to-any-file:
          - packages/**

scope:docs:
  - changed-files:
      - any-glob-to-any-file:
          - README.md
          - AGENTS.md
          - bootstrap/README.md
          - platform/pipeline/**/*.md
          - platform/infra/**/*.md

ci:
  - changed-files:
      - any-glob-to-any-file:
          - .github/workflows/**
          - .github/actions/**
          - platform/pipeline/**
          - platform/scripts/dev/**

risk:pipeline:
  - changed-files:
      - any-glob-to-any-file:
          - .github/workflows/**
          - .github/actions/**
          - platform/pipeline/**
          - platform/scripts/bootstrap/configure-github-repo.mjs

risk:high:
  - changed-files:
      - any-glob-to-any-file:
          - platform/infra/azure/**
          - packages/database/migrations/**
          - platform/scripts/bootstrap/ensure-entra-apps.mjs
          - platform/scripts/bootstrap/configure-web-domain.mjs
          - bootstrap/config/production.json
          - platform/infra/azure/environments/production.parameters.json
