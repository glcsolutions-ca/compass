name: Commit Stage Intake

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

jobs:
  commit_stage:
    name: Commit Stage
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Queue eligibility check
        run: echo "PR is eligible for merge queue. Authoritative Commit Stage runs on merge_group."
