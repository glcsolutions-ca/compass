name: PR Intake (Auto-enable Merge when ready)

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

jobs:
  enable_auto_merge:
    name: Enable auto-merge for main PRs
    if: ${{ github.event.pull_request.base.ref == 'main' }}
    runs-on: ubuntu-latest

    steps:
      - name: Enable auto-merge
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info("No pull request payload; skipping.");
              return;
            }

            if (pr.draft) {
              core.info(`PR #${pr.number} is draft; auto-merge will be enabled when ready_for_review fires.`);
              return;
            }

            if (pr.auto_merge) {
              core.info(`Auto-merge already enabled for PR #${pr.number}.`);
              return;
            }

            try {
              await github.graphql(
                `mutation EnableAutoMerge($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: { pullRequestId: $pullRequestId }) {
                    pullRequest {
                      number
                    }
                  }
                }`,
                { pullRequestId: pr.node_id }
              );

              core.info(`Enabled auto-merge for PR #${pr.number}.`);
            } catch (error) {
              const message = error instanceof Error ? error.message : String(error);
              if (message.includes("is already enabled")) {
                core.info(`Auto-merge already enabled for PR #${pr.number}.`);
                return;
              }
              throw error;
            }
