name: PR Metadata and Queue Admission
run-name: PR Metadata and Queue Admission (#${{ github.event.pull_request.number }})

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-metadata-and-admission-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply_pr_labels:
    name: Apply PR Labels
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Apply labels from changed paths
        uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: false

  queue_admission:
    name: Queue Admission
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install actionlint
        run: |
          install_dir="$RUNNER_TEMP/actionlint-bin"
          archive="$RUNNER_TEMP/actionlint_1.7.8_linux_amd64.tar.gz"
          mkdir -p "$install_dir"
          curl --fail --retry 5 --retry-all-errors --retry-delay 2 --location \
            --output "$archive" \
            https://github.com/rhysd/actionlint/releases/download/v1.7.8/actionlint_1.7.8_linux_amd64.tar.gz
          tar -xzf "$archive" -C "$install_dir" actionlint
          echo "$install_dir" >> "$GITHUB_PATH"

      - name: Workflow lint
        run: actionlint

      - name: Validate Bicep templates
        run: node platform/scripts/dev/validate-bicep-templates.mjs

      - name: Audit retired references
        run: node platform/scripts/dev/audit-legacy-references.mjs

  commit_stage_complete:
    name: Commit Stage Complete
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs:
      - apply_pr_labels
      - queue_admission
    steps:
      - name: Assert expected path succeeded
        env:
          APPLY_PR_LABELS: ${{ needs.apply_pr_labels.result }}
          QUEUE_ADMISSION: ${{ needs.queue_admission.result }}
        run: |
          set -euo pipefail

          assert_success() {
            local name="$1"
            local result="$2"
            if [ "$result" != 'success' ]; then
              echo "${name} finished with ${result}" >&2
              exit 1
            fi
          }

          assert_success "apply_pr_labels" "$APPLY_PR_LABELS"
          assert_success "queue_admission" "$QUEUE_ADMISSION"

      - name: Write commit summary
        run: |
          {
            echo '## Commit Stage Complete'
            echo '- Apply PR Labels: pass'
            echo '- Queue Admission: pass'
            echo '- Mode: PR queue-admission prerequisite'
          } >> "$GITHUB_STEP_SUMMARY"
