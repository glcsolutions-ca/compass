name: PR Metadata and Queue Admission
run-name: PR Metadata and Queue Admission (#${{ github.event.pull_request.number }})

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-metadata-and-admission-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply_pr_labels:
    name: Apply PR Labels
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Apply labels from changed paths
        uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: false

  queue_admission:
    name: Queue Admission
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install actionlint
        run: |
          install_dir="$RUNNER_TEMP/actionlint-bin"
          mkdir -p "$install_dir"
          (
            cd "$install_dir"
            curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash \
              | bash -s -- 1.7.8
          )
          echo "$install_dir" >> "$GITHUB_PATH"

      - name: Workflow lint
        run: actionlint

      - name: Validate Bicep templates
        run: node scripts/dev/validate-bicep-templates.mjs

      - name: Audit retired references
        run: node scripts/dev/audit-legacy-references.mjs

  commit_stage_complete:
    name: Commit Stage Complete
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs:
      - apply_pr_labels
      - queue_admission
    steps:
      - name: Assert expected path succeeded
        env:
          APPLY_PR_LABELS: ${{ needs.apply_pr_labels.result }}
          QUEUE_ADMISSION: ${{ needs.queue_admission.result }}
        run: |
          set -euo pipefail

          assert_success() {
            local name="$1"
            local result="$2"
            if [ "$result" != 'success' ]; then
              echo "${name} finished with ${result}" >&2
              exit 1
            fi
          }

          assert_success "apply_pr_labels" "$APPLY_PR_LABELS"
          assert_success "queue_admission" "$QUEUE_ADMISSION"

      - name: Write commit summary
        run: |
          {
            echo '## Commit Stage Complete'
            echo '- Apply PR Labels: pass'
            echo '- Queue Admission: pass'
            echo '- Mode: PR queue-admission prerequisite'
          } >> "$GITHUB_STEP_SUMMARY"

  pipeline_complete:
    name: Pipeline Complete
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs:
      - commit_stage_complete
    steps:
      - name: Assert compatibility check succeeded
        env:
          COMMIT_STAGE_COMPLETE: ${{ needs.commit_stage_complete.result }}
        run: |
          set -euo pipefail

          if [ "$COMMIT_STAGE_COMPLETE" != 'success' ]; then
            echo "commit_stage_complete finished with ${COMMIT_STAGE_COMPLETE}" >&2
            exit 1
          fi

      - name: Write compatibility summary
        run: |
          {
            echo '## Pipeline Complete'
            echo '- Compatibility status: pass'
            echo '- Superseded by: Commit Stage Complete'
          } >> "$GITHUB_STEP_SUMMARY"
