name: Queue Admission
run-name: Queue Admission (PR #${{ github.event.pull_request.number }} @ ${{ github.sha }})

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  queue_admission:
    name: Commit Stage
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Queue-admission check
        run: |
          echo "PR-head Commit Stage check passed."
          echo "Authoritative candidate build runs once on merge_group."

      - name: Write admission summary
        run: |
          {
            echo "## Queue Admission"
            echo "- Required check: Commit Stage"
            echo "- PR: #${{ github.event.pull_request.number }}"
            echo "- Head SHA: ${{ github.sha }}"
            echo "- Result: pass"
          } >> "$GITHUB_STEP_SUMMARY"
