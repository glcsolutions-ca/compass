name: Commit Stage
run-name: Commit Stage (merge_group @ ${{ github.sha }})

on:
  merge_group:
    types:
      - checks_requested

permissions:
  contents: read

env:
  REGISTRY_BASE: ghcr.io/glcsolutions-ca
  API_IMAGE_NAME: compass-api
  WEB_IMAGE_NAME: compass-web
  WORKER_IMAGE_NAME: compass-worker
  MIGRATIONS_IMAGE_NAME: compass-migrations
  MANIFESTS_REPO: ghcr.io/glcsolutions-ca/compass-release-manifests
  RELEASE_UNITS_REPO: ghcr.io/glcsolutions-ca/compass-release-units

jobs:
  commit_tests:
    name: Commit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - &checkout_step
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - &setup_pnpm_step
        name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - &setup_node_step
        name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - &install_dependencies_step
        name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Commit quick gate
        run: pnpm check:ci

      - name: Pipeline script tests
        run: pnpm --filter @compass/pipeline-tools run test

  build_and_publish_images:
    name: Build and publish ${{ matrix.image.id }} image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    env:
      DOCKER_BUILD_RECORD_UPLOAD: "false"
    needs:
      - commit_tests
    strategy:
      fail-fast: false
      matrix:
        image:
          - id: api
            dockerfile: apps/api/Dockerfile
            image_name: compass-api
          - id: web
            dockerfile: apps/web/Dockerfile
            image_name: compass-web
          - id: worker
            dockerfile: apps/worker/Dockerfile
            image_name: compass-worker
          - id: migrations
            dockerfile: db/Dockerfile.migrations
            image_name: compass-migrations

    steps:
      - *checkout_step

      - &setup_buildx_step
        name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - &login_ghcr_step
        name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image.id }} image
        id: build_image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY_BASE }}/${{ matrix.image.image_name }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=build-${{ matrix.image.id }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.image.id }}
          provenance: true
          sbom: true

      - name: Record digest output
        run: |
          mkdir -p .artifacts/image-digests
          printf '%s' '${{ steps.build_image.outputs.digest }}' > .artifacts/image-digests/${{ matrix.image.id }}.digest

      - name: Upload digest artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: image-digest-${{ matrix.image.id }}
          path: .artifacts/image-digests/${{ matrix.image.id }}.digest
          if-no-files-found: error
          retention-days: 3

  publish_candidate:
    name: Publish candidate to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    needs:
      - commit_tests
      - build_and_publish_images

    steps:
      - *checkout_step

      - *setup_pnpm_step

      - *setup_node_step

      - *install_dependencies_step

      - *setup_buildx_step

      - *login_ghcr_step

      - name: Setup ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

      - name: Download digest artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: image-digest-*
          path: .artifacts/image-digests
          merge-multiple: true

      - name: Capture canonical digest refs
        id: refs
        run: |
          api_digest="$(cat .artifacts/image-digests/api.digest)"
          web_digest="$(cat .artifacts/image-digests/web.digest)"
          worker_digest="$(cat .artifacts/image-digests/worker.digest)"
          migrations_digest="$(cat .artifacts/image-digests/migrations.digest)"

          echo "api_image_ref=${REGISTRY_BASE}/${API_IMAGE_NAME}@${api_digest}" >> "$GITHUB_OUTPUT"
          echo "web_image_ref=${REGISTRY_BASE}/${WEB_IMAGE_NAME}@${web_digest}" >> "$GITHUB_OUTPUT"
          echo "worker_image_ref=${REGISTRY_BASE}/${WORKER_IMAGE_NAME}@${worker_digest}" >> "$GITHUB_OUTPUT"
          echo "migrations_image_ref=${REGISTRY_BASE}/${MIGRATIONS_IMAGE_NAME}@${migrations_digest}" >> "$GITHUB_OUTPUT"

      - name: Compute candidate id
        id: candidate
        run: echo "candidate_id=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Publish release-unit index
        id: release_unit
        run: |
          set -euo pipefail

          candidate_id="${{ steps.candidate.outputs.candidate_id }}"
          docker buildx imagetools create \
            --tag "${RELEASE_UNITS_REPO}:${candidate_id}" \
            "${{ steps.refs.outputs.api_image_ref }}" \
            "${{ steps.refs.outputs.web_image_ref }}" \
            "${{ steps.refs.outputs.worker_image_ref }}" \
            "${{ steps.refs.outputs.migrations_image_ref }}"

          release_unit_digest="$(oras manifest fetch --descriptor "${RELEASE_UNITS_REPO}:${candidate_id}" | jq -r '.digest')"
          if [ -z "${release_unit_digest}" ] || [ "${release_unit_digest}" = "null" ]; then
            echo "Unable to resolve release-unit digest for ${candidate_id}" >&2
            exit 1
          fi

          echo "release_unit_digest=${release_unit_digest}" >> "$GITHUB_OUTPUT"

      - name: Generate release candidate manifest
        run: |
          set -euo pipefail

          mkdir -p .artifacts/release-candidate
          created_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          jq -n \
            --arg candidateId "${{ steps.candidate.outputs.candidate_id }}" \
            --arg repository "${{ github.repository }}" \
            --arg sourceRevision "${{ github.sha }}" \
            --arg createdAt "${created_at}" \
            --arg apiImage "${{ steps.refs.outputs.api_image_ref }}" \
            --arg webImage "${{ steps.refs.outputs.web_image_ref }}" \
            --arg workerImage "${{ steps.refs.outputs.worker_image_ref }}" \
            --arg migrationsArtifact "${{ steps.refs.outputs.migrations_image_ref }}" \
            --arg commitStageRunId "${{ github.run_id }}" \
            --arg registry "${{ env.REGISTRY_BASE }}" \
            --arg releaseUnitDigest "${{ steps.release_unit.outputs.release_unit_digest }}" \
            '{
              schemaVersion: "rc.v1",
              candidateId: $candidateId,
              source: {
                repository: $repository,
                revision: $sourceRevision,
                createdAt: $createdAt
              },
              artifacts: {
                apiImage: $apiImage,
                webImage: $webImage,
                workerImage: $workerImage,
                migrationsArtifact: $migrationsArtifact
              },
              provenance: {
                commitStageRunId: $commitStageRunId,
                registry: $registry,
                releaseUnitDigest: $releaseUnitDigest
              }
            }' > .artifacts/release-candidate/manifest.json

      - name: Validate release candidate manifest
        run: pnpm --filter @compass/pipeline-tools run manifest:validate:runtime --file .artifacts/release-candidate/manifest.json

      - name: Publish candidate manifest package
        run: |
          cp .artifacts/release-candidate/manifest.json manifest.json
          oras push --artifact-type application/vnd.compass.release-manifest.v1+json \
            "${MANIFESTS_REPO}:${{ steps.candidate.outputs.candidate_id }}" \
            "manifest.json:application/vnd.compass.release-manifest.v1+json"

      - name: Write commit summary
        run: |
          {
            echo "## Commit Stage"
            echo "- Candidate: ${{ steps.candidate.outputs.candidate_id }}"
            echo "- Source revision: ${{ github.sha }}"
            echo "- Release unit digest: ${{ steps.release_unit.outputs.release_unit_digest }}"
            echo "- Manifest package: ${MANIFESTS_REPO}:${{ steps.candidate.outputs.candidate_id }}"
            echo "- Release-unit package: ${RELEASE_UNITS_REPO}:${{ steps.candidate.outputs.candidate_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Attest release-unit build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.RELEASE_UNITS_REPO }}
          subject-digest: ${{ steps.release_unit.outputs.release_unit_digest }}
          push-to-registry: true

  commit_stage_gate:
    name: Commit Stage
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - commit_tests
      - build_and_publish_images
      - publish_candidate
    steps:
      - name: Fail closed when upstream commit-stage jobs fail
        env:
          COMMIT_TESTS_RESULT: ${{ needs.commit_tests.result }}
          BUILD_AND_PUBLISH_IMAGES_RESULT: ${{ needs.build_and_publish_images.result }}
          PUBLISH_CANDIDATE_RESULT: ${{ needs.publish_candidate.result }}
        run: |
          set -euo pipefail

          results=(
            "commit_tests:${COMMIT_TESTS_RESULT}"
            "build_and_publish_images:${BUILD_AND_PUBLISH_IMAGES_RESULT}"
            "publish_candidate:${PUBLISH_CANDIDATE_RESULT}"
          )

          failed=0
          for entry in "${results[@]}"; do
            job="${entry%%:*}"
            result="${entry##*:}"
            echo "${job} => ${result}"
            if [ "${result}" != "success" ]; then
              failed=1
            fi
          done

          if [ "${failed}" -ne 0 ]; then
            echo "Commit Stage failed because one or more upstream jobs were not successful." >&2
            exit 1
          fi

          echo "Commit Stage passed."
