name: Commit Stage

on:
  merge_group:
    types:
      - checks_requested

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY_BASE: ghcr.io/glcsolutions-ca
  API_IMAGE_NAME: compass-api
  WEB_IMAGE_NAME: compass-web
  WORKER_IMAGE_NAME: compass-worker
  MIGRATIONS_IMAGE_NAME: compass-migrations
  RC_REGISTRY_REPO: ghcr.io/glcsolutions-ca/compass-release-candidates

jobs:
  commit_tests:
    name: Commit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      stage_start_at: ${{ steps.capture_start.outputs.stage_start_at }}

    steps:
      - name: Capture commit-stage start time
        id: capture_start
        run: echo "stage_start_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Commit quick gate
        run: pnpm test:commit:candidate

      - name: Pipeline script tests
        run: pnpm test:commit:pipeline

  commit_analysis:
    name: Commit analysis
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs:
      - commit_tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Coverage gate inputs
        run: pnpm test:commit:analysis

      - name: Upload commit analysis artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: commit-analysis-${{ github.run_id }}
          path: .artifacts/commit-analysis/commit-analysis.json
          if-no-files-found: error

  build_and_publish_images:
    name: Build and publish ${{ matrix.image.id }} image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - commit_tests
    strategy:
      fail-fast: false
      matrix:
        image:
          - id: api
            dockerfile: apps/api/Dockerfile
            image_name: compass-api
          - id: web
            dockerfile: apps/web/Dockerfile
            image_name: compass-web
          - id: worker
            dockerfile: apps/worker/Dockerfile
            image_name: compass-worker
          - id: migrations
            dockerfile: db/Dockerfile.migrations
            image_name: compass-migrations

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image.id }} image
        id: build_image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY_BASE }}/${{ matrix.image.image_name }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=build-${{ matrix.image.id }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.image.id }}

      - name: Record digest output
        run: |
          mkdir -p .artifacts/image-digests
          printf '%s' '${{ steps.build_image.outputs.digest }}' > .artifacts/image-digests/${{ matrix.image.id }}.digest

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-digest-${{ matrix.image.id }}
          path: .artifacts/image-digests/${{ matrix.image.id }}.digest
          if-no-files-found: error

  collect_image_refs:
    name: Collect image refs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - build_and_publish_images
    outputs:
      api_image_ref: ${{ steps.refs.outputs.api_image_ref }}
      web_image_ref: ${{ steps.refs.outputs.web_image_ref }}
      worker_image_ref: ${{ steps.refs.outputs.worker_image_ref }}
      migrations_image_ref: ${{ steps.refs.outputs.migrations_image_ref }}

    steps:
      - name: Download api digest
        uses: actions/download-artifact@v4
        with:
          name: image-digest-api
          path: .artifacts/image-digests

      - name: Download web digest
        uses: actions/download-artifact@v4
        with:
          name: image-digest-web
          path: .artifacts/image-digests

      - name: Download worker digest
        uses: actions/download-artifact@v4
        with:
          name: image-digest-worker
          path: .artifacts/image-digests

      - name: Download migrations digest
        uses: actions/download-artifact@v4
        with:
          name: image-digest-migrations
          path: .artifacts/image-digests

      - name: Capture canonical digest refs
        id: refs
        run: |
          api_digest="$(cat .artifacts/image-digests/api.digest)"
          web_digest="$(cat .artifacts/image-digests/web.digest)"
          worker_digest="$(cat .artifacts/image-digests/worker.digest)"
          migrations_digest="$(cat .artifacts/image-digests/migrations.digest)"

          echo "api_image_ref=${REGISTRY_BASE}/${API_IMAGE_NAME}@${api_digest}" >> "$GITHUB_OUTPUT"
          echo "web_image_ref=${REGISTRY_BASE}/${WEB_IMAGE_NAME}@${web_digest}" >> "$GITHUB_OUTPUT"
          echo "worker_image_ref=${REGISTRY_BASE}/${WORKER_IMAGE_NAME}@${worker_digest}" >> "$GITHUB_OUTPUT"
          echo "migrations_image_ref=${REGISTRY_BASE}/${MIGRATIONS_IMAGE_NAME}@${migrations_digest}" >> "$GITHUB_OUTPUT"

  generate_and_validate_manifest:
    name: Generate and publish release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - collect_image_refs
      - commit_analysis
    outputs:
      candidate_id: ${{ steps.candidate.outputs.candidate_id }}
      manifest_ref: ${{ steps.publish_manifest.outputs.manifest_ref }}
      stage_end_at: ${{ steps.capture_end.outputs.stage_end_at }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute candidate id
        id: candidate
        run: echo "candidate_id=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Generate release candidate manifest
        run: |
          mkdir -p .artifacts/release-candidate
          node pipeline/stages/01-commit/scripts/generate-release-candidate.mjs \
            --out .artifacts/release-candidate/manifest.json \
            --candidate-id "${{ steps.candidate.outputs.candidate_id }}" \
            --repository "${{ github.repository }}" \
            --source-revision "${{ github.sha }}" \
            --api-image "${{ needs.collect_image_refs.outputs.api_image_ref }}" \
            --web-image "${{ needs.collect_image_refs.outputs.web_image_ref }}" \
            --worker-image "${{ needs.collect_image_refs.outputs.worker_image_ref }}" \
            --migrations-artifact "${{ needs.collect_image_refs.outputs.migrations_image_ref }}" \
            --registry "${{ env.REGISTRY_BASE }}" \
            --commit-stage-run-id "${{ github.run_id }}"

      - name: Validate release candidate manifest
        run: node pipeline/shared/scripts/validate-release-candidate.mjs --file .artifacts/release-candidate/manifest.json

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR (ORAS)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish release candidate manifest
        id: publish_manifest
        run: |
          candidate_id="${{ steps.candidate.outputs.candidate_id }}"
          reference="${RC_REGISTRY_REPO}:${candidate_id}"

          if oras manifest fetch --descriptor "${reference}" > /dev/null 2>&1; then
            echo "Candidate manifest already exists for ${candidate_id}; validating immutability before reuse."

            node pipeline/shared/scripts/fetch-release-candidate.mjs \
              --candidate-id "${candidate_id}" \
              --registry-repo "${RC_REGISTRY_REPO}" \
              --out "$RUNNER_TEMP/existing-release-candidate.json"

            EXPECTED_MANIFEST_PATH=".artifacts/release-candidate/manifest.json" \
            EXISTING_MANIFEST_PATH="$RUNNER_TEMP/existing-release-candidate.json" \
            node <<'NODE'
            const fs = require("node:fs");

            const expected = JSON.parse(fs.readFileSync(process.env.EXPECTED_MANIFEST_PATH, "utf8"));
            const existing = JSON.parse(fs.readFileSync(process.env.EXISTING_MANIFEST_PATH, "utf8"));

            const checks = [
              ["candidateId", expected.candidateId, existing.candidateId],
              ["source.revision", expected.source?.revision, existing.source?.revision],
              ["artifacts.apiImage", expected.artifacts?.apiImage, existing.artifacts?.apiImage],
              ["artifacts.webImage", expected.artifacts?.webImage, existing.artifacts?.webImage],
              ["artifacts.workerImage", expected.artifacts?.workerImage, existing.artifacts?.workerImage],
              [
                "artifacts.migrationsArtifact",
                expected.artifacts?.migrationsArtifact,
                existing.artifacts?.migrationsArtifact
              ]
            ];

            const mismatches = checks.filter(([, expectedValue, existingValue]) => expectedValue !== existingValue);
            if (mismatches.length > 0) {
              console.error("Immutable candidate tag conflict detected. Existing candidate differs from newly generated manifest.");
              for (const [field, expectedValue, existingValue] of mismatches) {
                console.error(`${field}: expected=${expectedValue} existing=${existingValue}`);
              }
              process.exit(1);
            }

            console.info("Existing candidate manifest matches generated manifest; reusing immutable candidate.");
            NODE

            echo "manifest_ref=${reference}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cp .artifacts/release-candidate/manifest.json manifest.json
          oras push --artifact-type application/vnd.compass.release-candidate.v1 \
            "${reference}" \
            "manifest.json:application/vnd.compass.release-candidate.v1+json"
          echo "manifest_ref=${reference}" >> "$GITHUB_OUTPUT"

      - name: Capture commit-stage end time
        id: capture_end
        run: echo "stage_end_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

  enforce_commit_stage_slo:
    name: Enforce commit-stage SLO
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - commit_tests
      - generate_and_validate_manifest
    if: ${{ needs.generate_and_validate_manifest.result == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Enforce SLO and write metrics
        run: |
          mkdir -p .artifacts/commit-stage
          pnpm rc:slo:check \
            --start "${{ needs.commit_tests.outputs.stage_start_at }}" \
            --end "${{ needs.generate_and_validate_manifest.outputs.stage_end_at }}" \
            --warn-seconds 300 \
            --fail-seconds 600 \
            --out .artifacts/commit-stage/commit-stage-metrics.json

      - name: Upload commit-stage metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: commit-stage-metrics-${{ github.run_id }}
          path: .artifacts/commit-stage/commit-stage-metrics.json
          if-no-files-found: error

  commit_stage_gate:
    name: Commit Stage
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - commit_tests
      - commit_analysis
      - build_and_publish_images
      - generate_and_validate_manifest
      - enforce_commit_stage_slo
    steps:
      - name: Fail closed when upstream commit-stage jobs fail
        env:
          COMMIT_TESTS_RESULT: ${{ needs.commit_tests.result }}
          COMMIT_ANALYSIS_RESULT: ${{ needs.commit_analysis.result }}
          BUILD_AND_PUBLISH_IMAGES_RESULT: ${{ needs.build_and_publish_images.result }}
          GENERATE_AND_VALIDATE_MANIFEST_RESULT: ${{ needs.generate_and_validate_manifest.result }}
          ENFORCE_COMMIT_STAGE_SLO_RESULT: ${{ needs.enforce_commit_stage_slo.result }}
        run: |
          set -euo pipefail

          results=(
            "commit_tests:${COMMIT_TESTS_RESULT}"
            "commit_analysis:${COMMIT_ANALYSIS_RESULT}"
            "build_and_publish_images:${BUILD_AND_PUBLISH_IMAGES_RESULT}"
            "generate_and_validate_manifest:${GENERATE_AND_VALIDATE_MANIFEST_RESULT}"
            "enforce_commit_stage_slo:${ENFORCE_COMMIT_STAGE_SLO_RESULT}"
          )

          failed=0
          for entry in "${results[@]}"; do
            job="${entry%%:*}"
            result="${entry##*:}"
            echo "${job} => ${result}"
            if [ "${result}" != "success" ]; then
              failed=1
            fi
          done

          if [ "${failed}" -ne 0 ]; then
            echo "Commit Stage failed because one or more upstream jobs were not successful." >&2
            exit 1
          fi

          echo "Commit Stage passed."
