name: Commit Stage

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  merge_group:
    types:
      - checks_requested

permissions:
  contents: read

env:
  REGISTRY_BASE: ghcr.io/glcsolutions-ca
  API_IMAGE_NAME: compass-api
  WEB_IMAGE_NAME: compass-web
  WORKER_IMAGE_NAME: compass-worker
  MIGRATIONS_IMAGE_NAME: compass-migrations
  MANIFESTS_REPO: ghcr.io/glcsolutions-ca/compass-release-manifests
  RELEASE_UNITS_REPO: ghcr.io/glcsolutions-ca/compass-release-units

jobs:
  pr_head_commit_stage:
    name: Commit Stage
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Queue-admission check
        run: |
          echo "PR-head Commit Stage check passed."
          echo "Authoritative candidate build runs once on merge_group."

  commit_tests:
    name: Commit tests
    if: ${{ github.event_name == 'merge_group' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Commit quick gate
        run: pnpm test:commit:candidate

      - name: Pipeline script tests
        run: pnpm test:commit:pipeline

  build_and_publish_images:
    name: Build and publish ${{ matrix.image.id }} image
    if: ${{ github.event_name == 'merge_group' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    env:
      DOCKER_BUILD_RECORD_UPLOAD: "false"
    needs:
      - commit_tests
    strategy:
      fail-fast: false
      matrix:
        image:
          - id: api
            dockerfile: apps/api/Dockerfile
            image_name: compass-api
          - id: web
            dockerfile: apps/web/Dockerfile
            image_name: compass-web
          - id: worker
            dockerfile: apps/worker/Dockerfile
            image_name: compass-worker
          - id: migrations
            dockerfile: db/Dockerfile.migrations
            image_name: compass-migrations

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image.id }} image
        id: build_image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY_BASE }}/${{ matrix.image.image_name }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=build-${{ matrix.image.id }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.image.id }}
          provenance: true
          sbom: true

      - name: Record digest output
        run: |
          mkdir -p .artifacts/image-digests
          printf '%s' '${{ steps.build_image.outputs.digest }}' > .artifacts/image-digests/${{ matrix.image.id }}.digest

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-digest-${{ matrix.image.id }}
          path: .artifacts/image-digests/${{ matrix.image.id }}.digest
          if-no-files-found: error

  publish_candidate:
    name: Publish candidate to GHCR
    if: ${{ github.event_name == 'merge_group' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    needs:
      - commit_tests
      - build_and_publish_images
    outputs:
      candidate_id: ${{ steps.candidate.outputs.candidate_id }}
      release_unit_digest: ${{ steps.release_unit.outputs.release_unit_digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download digest artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: image-digest-*
          path: .artifacts/image-digests
          merge-multiple: true

      - name: Capture canonical digest refs
        id: refs
        run: |
          api_digest="$(cat .artifacts/image-digests/api.digest)"
          web_digest="$(cat .artifacts/image-digests/web.digest)"
          worker_digest="$(cat .artifacts/image-digests/worker.digest)"
          migrations_digest="$(cat .artifacts/image-digests/migrations.digest)"

          echo "api_image_ref=${REGISTRY_BASE}/${API_IMAGE_NAME}@${api_digest}" >> "$GITHUB_OUTPUT"
          echo "web_image_ref=${REGISTRY_BASE}/${WEB_IMAGE_NAME}@${web_digest}" >> "$GITHUB_OUTPUT"
          echo "worker_image_ref=${REGISTRY_BASE}/${WORKER_IMAGE_NAME}@${worker_digest}" >> "$GITHUB_OUTPUT"
          echo "migrations_image_ref=${REGISTRY_BASE}/${MIGRATIONS_IMAGE_NAME}@${migrations_digest}" >> "$GITHUB_OUTPUT"

      - name: Compute candidate id
        id: candidate
        run: echo "candidate_id=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Generate release candidate manifest
        run: |
          mkdir -p .artifacts/release-candidate
          node pipeline/stages/01-commit/scripts/generate-release-candidate.mjs \
            --out .artifacts/release-candidate/manifest.json \
            --candidate-id "${{ steps.candidate.outputs.candidate_id }}" \
            --repository "${{ github.repository }}" \
            --source-revision "${{ github.sha }}" \
            --api-image "${{ steps.refs.outputs.api_image_ref }}" \
            --web-image "${{ steps.refs.outputs.web_image_ref }}" \
            --worker-image "${{ steps.refs.outputs.worker_image_ref }}" \
            --migrations-artifact "${{ steps.refs.outputs.migrations_image_ref }}" \
            --registry "${{ env.REGISTRY_BASE }}" \
            --commit-stage-run-id "${{ github.run_id }}"

      - name: Validate release candidate manifest
        run: node pipeline/shared/scripts/validate-release-candidate.mjs --file .artifacts/release-candidate/manifest.json

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR (Docker)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish candidate manifest package
        run: |
          cp .artifacts/release-candidate/manifest.json manifest.json
          oras push --artifact-type application/vnd.compass.release-manifest.v1+json \
            "${MANIFESTS_REPO}:${{ steps.candidate.outputs.candidate_id }}" \
            "manifest.json:application/vnd.compass.release-manifest.v1+json"

      - name: Publish release-unit index
        id: release_unit
        run: |
          set -euo pipefail

          candidate_id="${{ steps.candidate.outputs.candidate_id }}"
          docker buildx imagetools create \
            --tag "${RELEASE_UNITS_REPO}:${candidate_id}" \
            "${{ steps.refs.outputs.api_image_ref }}" \
            "${{ steps.refs.outputs.web_image_ref }}" \
            "${{ steps.refs.outputs.worker_image_ref }}" \
            "${{ steps.refs.outputs.migrations_image_ref }}"

          release_unit_digest="$(oras manifest fetch --descriptor "${RELEASE_UNITS_REPO}:${candidate_id}" | jq -r '.digest')"
          if [ -z "${release_unit_digest}" ] || [ "${release_unit_digest}" = "null" ]; then
            echo "Unable to resolve release-unit digest for ${candidate_id}" >&2
            exit 1
          fi

          echo "release_unit_digest=${release_unit_digest}" >> "$GITHUB_OUTPUT"

      - name: Write commit-stage metadata
        run: |
          mkdir -p .artifacts/metadata
          jq -n \
            --arg candidateId "${{ steps.candidate.outputs.candidate_id }}" \
            --arg sourceRevision "${{ github.sha }}" \
            --arg releaseUnitDigest "${{ steps.release_unit.outputs.release_unit_digest }}" \
            --arg commitRunId "${{ github.run_id }}" \
            --arg eventName "${{ github.event_name }}" \
            '{
              candidateId: $candidateId,
              sourceRevision: $sourceRevision,
              releaseUnitDigest: $releaseUnitDigest,
              commitRunId: $commitRunId,
              eventName: $eventName
            }' > .artifacts/metadata/commit-stage-metadata.json

      - name: Upload commit-stage metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: commit-stage-metadata
          path: .artifacts/metadata/commit-stage-metadata.json
          if-no-files-found: error

      - name: Attest release-unit build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.RELEASE_UNITS_REPO }}
          subject-digest: ${{ steps.release_unit.outputs.release_unit_digest }}
          push-to-registry: true

  commit_stage_gate:
    name: Commit Stage
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'merge_group' && always() }}
    needs:
      - commit_tests
      - build_and_publish_images
      - publish_candidate
    steps:
      - name: Fail closed when upstream commit-stage jobs fail
        env:
          COMMIT_TESTS_RESULT: ${{ needs.commit_tests.result }}
          BUILD_AND_PUBLISH_IMAGES_RESULT: ${{ needs.build_and_publish_images.result }}
          PUBLISH_CANDIDATE_RESULT: ${{ needs.publish_candidate.result }}
        run: |
          set -euo pipefail

          results=(
            "commit_tests:${COMMIT_TESTS_RESULT}"
            "build_and_publish_images:${BUILD_AND_PUBLISH_IMAGES_RESULT}"
            "publish_candidate:${PUBLISH_CANDIDATE_RESULT}"
          )

          failed=0
          for entry in "${results[@]}"; do
            job="${entry%%:*}"
            result="${entry##*:}"
            echo "${job} => ${result}"
            if [ "${result}" != "success" ]; then
              failed=1
            fi
          done

          if [ "${failed}" -ne 0 ]; then
            echo "Commit Stage failed because one or more upstream jobs were not successful." >&2
            exit 1
          fi

          echo "Commit Stage passed."
