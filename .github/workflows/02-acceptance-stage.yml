name: Acceptance Stage
run-name: Acceptance Stage (${{ github.event.workflow_run.head_sha }})

on:
  workflow_run:
    workflows:
      - Commit Stage
    types:
      - completed

concurrency:
  group: acceptance-stage
  cancel-in-progress: true

permissions:
  contents: read

env:
  MANIFESTS_REPO: ghcr.io/glcsolutions-ca/compass-release-manifests
  RELEASE_UNITS_REPO: ghcr.io/glcsolutions-ca/compass-release-units
  ACCEPTANCE_PREDICATE_TYPE: https://compass.glcsolutions.ca/pipeline/attestations/acceptance/v1

jobs:
  resolve_candidate:
    name: Resolve acceptance candidate
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      candidate_id: ${{ steps.resolve.outputs.candidate_id }}
      source_revision: ${{ steps.resolve.outputs.source_revision }}
      release_unit_digest_hint: ${{ steps.resolve.outputs.release_unit_digest_hint }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve candidate from canonical GHCR manifest
        id: resolve
        run: |
          set -euo pipefail
          candidate_id="sha-${{ github.event.workflow_run.head_sha }}"
          pnpm --filter @compass/pipeline-tools run manifest:fetch -- \
            --candidate-id "$candidate_id" \
            --registry-repo "${MANIFESTS_REPO}" \
            --out "$RUNNER_TEMP/release-candidate.json"
          pnpm --filter @compass/pipeline-tools run manifest:validate:runtime --file "$RUNNER_TEMP/release-candidate.json"
          source_revision="$(jq -r '.source.revision' "$RUNNER_TEMP/release-candidate.json")"
          release_unit_digest_hint="$(jq -r '.provenance.releaseUnitDigest // empty' "$RUNNER_TEMP/release-candidate.json")"
          {
            echo "candidate_id=${candidate_id}"
            echo "source_revision=${source_revision}"
            echo "release_unit_digest_hint=${release_unit_digest_hint}"
          } >> "$GITHUB_OUTPUT"

  acceptance:
    name: Acceptance Stage
    needs:
      - resolve_candidate
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.resolve_candidate.outputs.source_revision }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch release manifest from GHCR
        run: |
          pnpm --filter @compass/pipeline-tools run manifest:fetch -- \
            --candidate-id "${{ needs.resolve_candidate.outputs.candidate_id }}" \
            --registry-repo "${{ env.MANIFESTS_REPO }}" \
            --out "$RUNNER_TEMP/release-candidate.json"

      - name: Resolve and verify release-unit digest
        id: release_unit
        run: |
          set -euo pipefail
          resolved_digest="$(oras manifest fetch --descriptor "${RELEASE_UNITS_REPO}:${{ needs.resolve_candidate.outputs.candidate_id }}" | jq -r '.digest')"
          hint="${{ needs.resolve_candidate.outputs.release_unit_digest_hint }}"
          if [ -n "${hint}" ] && [ "${hint}" != "${resolved_digest}" ]; then
            echo 'Release-unit digest mismatch' >&2
            exit 1
          fi
          echo "release_unit_digest=${resolved_digest}" >> "$GITHUB_OUTPUT"

      - name: Run candidate acceptance locally
        run: |
          node pipeline/stages/02-acceptance/scripts/run-acceptance-from-candidate.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --diagnostics-dir "$RUNNER_TEMP/acceptance-diagnostics"

      - name: Generate acceptance attestation predicate
        run: |
          predicate_path="${GITHUB_WORKSPACE}/.artifacts/attestations/acceptance-predicate.json"
          mkdir -p "$(dirname "${predicate_path}")"
          pnpm --filter @compass/pipeline-tools run acceptance:predicate:generate -- \
            --out "${predicate_path}" \
            --candidate-id "${{ needs.resolve_candidate.outputs.candidate_id }}" \
            --source-revision "${{ needs.resolve_candidate.outputs.source_revision }}" \
            --verdict pass \
            --workflow-run-id "${{ github.run_id }}" \
            --tested-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --suite-summary 'system=pass browser=pass'

      - name: Attest acceptance verdict to candidate subject
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.RELEASE_UNITS_REPO }}
          subject-digest: ${{ steps.release_unit.outputs.release_unit_digest }}
          predicate-type: ${{ env.ACCEPTANCE_PREDICATE_TYPE }}
          predicate-path: ${{ github.workspace }}/.artifacts/attestations/acceptance-predicate.json
          push-to-registry: true

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: acceptance-diagnostics-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/acceptance-diagnostics
            .artifacts/attestations/acceptance-predicate.json
          if-no-files-found: warn
          retention-days: 7
