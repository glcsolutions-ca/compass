name: Acceptance Stage

on:
  workflow_run:
    workflows:
      - Commit Stage
    types:
      - completed

concurrency:
  group: acceptance-environment
  cancel-in-progress: true

permissions:
  contents: read

env:
  MANIFESTS_REPO: ghcr.io/glcsolutions-ca/compass-release-manifests
  RELEASE_UNITS_REPO: ghcr.io/glcsolutions-ca/compass-release-units
  ACCEPTANCE_PREDICATE_TYPE: https://compass.glcsolutions.ca/pipeline/attestations/acceptance/v1

jobs:
  acceptance:
    name: Acceptance Stage
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: acceptance
    permissions:
      actions: read
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Capture acceptance stage start time
        id: acceptance_start
        run: echo "started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - &checkout_step
        name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release candidate handoff from triggering run
        id: handoff_artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: release-candidate-manifest
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ${{ runner.temp }}/triggering-run

      - name: Resolve authoritative handoff
        id: handoff
        run: |
          set -euo pipefail

          manifest_file="${RUNNER_TEMP}/triggering-run/manifest.json"
          if [ ! -f "${manifest_file}" ]; then
            manifest_file="$(find "${RUNNER_TEMP}/triggering-run" -maxdepth 3 -type f -name '*.json' | head -n 1 || true)"
          fi

          if [ -z "${manifest_file}" ] || [ ! -f "${manifest_file}" ]; then
            echo "authoritative=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=non-authoritative Commit Stage run (no release-candidate-manifest artifact)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "authoritative=true" >> "$GITHUB_OUTPUT"
          echo "manifest_path=${manifest_file}" >> "$GITHUB_OUTPUT"

      - name: Skip non-authoritative Commit Stage run
        if: ${{ steps.handoff.outputs.authoritative != 'true' }}
        run: |
          echo "Skipping Acceptance: ${{ steps.handoff.outputs.skip_reason }}"

      - name: Validate handoff manifest (runtime validator)
        if: ${{ steps.handoff.outputs.authoritative == 'true' }}
        run: node pipeline/shared/scripts/validate-release-candidate-runtime.mjs --file "${{ steps.handoff.outputs.manifest_path }}"

      - name: Resolve candidate from handoff manifest
        if: ${{ steps.handoff.outputs.authoritative == 'true' }}
        id: candidate
        run: |
          set -euo pipefail

          manifest_file="${{ steps.handoff.outputs.manifest_path }}"
          candidate_id="$(jq -r '.candidateId // empty' "${manifest_file}")"
          source_revision="$(jq -r '.source.revision // empty' "${manifest_file}")"
          release_unit_digest_hint="$(jq -r '.provenance.releaseUnitDigest // empty' "${manifest_file}")"

          if ! echo "${candidate_id}" | grep -Eq '^sha-[0-9a-f]{40}$'; then
            echo "Invalid candidateId in handoff manifest: ${candidate_id}" >&2
            exit 1
          fi

          if ! echo "${source_revision}" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "Invalid source.revision in handoff manifest: ${source_revision}" >&2
            exit 1
          fi

          if [ -n "${release_unit_digest_hint}" ] && ! echo "${release_unit_digest_hint}" | grep -Eq '^sha256:[0-9a-f]{64}$'; then
            echo "Invalid provenance.releaseUnitDigest in handoff manifest: ${release_unit_digest_hint}" >&2
            exit 1
          fi

          echo "candidate_id=${candidate_id}" >> "$GITHUB_OUTPUT"
          echo "source_revision=${source_revision}" >> "$GITHUB_OUTPUT"
          echo "release_unit_digest_hint=${release_unit_digest_hint}" >> "$GITHUB_OUTPUT"

      - name: Wait for source revision on main
        if: ${{ steps.handoff.outputs.authoritative == 'true' }}
        id: main_guard
        run: |
          set -euo pipefail

          source_revision="${{ steps.candidate.outputs.source_revision }}"
          deadline=$(( $(date +%s) + 600 ))
          is_on_main=false

          while [ "$(date +%s)" -lt "${deadline}" ]; do
            git fetch --no-tags origin main
            if git merge-base --is-ancestor "${source_revision}" origin/main >/dev/null 2>&1; then
              is_on_main=true
              break
            fi
            sleep 30
          done

          echo "is_on_main=${is_on_main}" >> "$GITHUB_OUTPUT"

      - name: Skip stale candidate not merged to main
        if: ${{ steps.handoff.outputs.authoritative == 'true' && steps.main_guard.outputs.is_on_main != 'true' }}
        run: |
          echo "Skipping stale candidate ${{ steps.candidate.outputs.candidate_id }} because source revision is not on main."

      - &setup_pnpm_step
        name: Setup pnpm
        if: ${{ steps.handoff.outputs.authoritative == 'true' && steps.main_guard.outputs.is_on_main == 'true' }}
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - &setup_node_step
        name: Setup Node
        if: ${{ steps.handoff.outputs.authoritative == 'true' && steps.main_guard.outputs.is_on_main == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - &install_dependencies_step
        name: Install dependencies
        if: ${{ steps.handoff.outputs.authoritative == 'true' && steps.main_guard.outputs.is_on_main == 'true' }}
        run: pnpm install --frozen-lockfile

      - &setup_oras_step
        name: Setup ORAS
        if: ${{ steps.handoff.outputs.authoritative == 'true' && steps.main_guard.outputs.is_on_main == 'true' }}
        uses: oras-project/setup-oras@v1

      - &login_ghcr_step
        name: Login to GHCR
        if: ${{ steps.handoff.outputs.authoritative == 'true' && steps.main_guard.outputs.is_on_main == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch release manifest from GHCR
        if: ${{ steps.handoff.outputs.authoritative == 'true' && steps.main_guard.outputs.is_on_main == 'true' }}
        run: |
          node pipeline/shared/scripts/fetch-release-candidate.mjs \
            --candidate-id "${{ steps.candidate.outputs.candidate_id }}" \
            --registry-repo "${{ env.MANIFESTS_REPO }}" \
            --out "$RUNNER_TEMP/release-candidate.json"

      - name: Validate GHCR release manifest
        if: ${{ steps.handoff.outputs.authoritative == 'true' && steps.main_guard.outputs.is_on_main == 'true' }}
        run: node pipeline/shared/scripts/validate-release-candidate.mjs --file "$RUNNER_TEMP/release-candidate.json"

      - name: Verify handoff manifest matches GHCR manifest
        if: ${{ steps.handoff.outputs.authoritative == 'true' && steps.main_guard.outputs.is_on_main == 'true' }}
        run: |
          set -euo pipefail
          diff -u <(jq -S . "${{ steps.handoff.outputs.manifest_path }}") <(jq -S . "$RUNNER_TEMP/release-candidate.json")

      - name: Resolve and verify release-unit digest
        if: ${{ steps.handoff.outputs.authoritative == 'true' && steps.main_guard.outputs.is_on_main == 'true' }}
        id: release_unit
        run: |
          set -euo pipefail

          resolved_digest="$(oras manifest fetch --descriptor "${RELEASE_UNITS_REPO}:${{ steps.candidate.outputs.candidate_id }}" | jq -r '.digest')"
          if [ -z "${resolved_digest}" ] || [ "${resolved_digest}" = "null" ]; then
            echo "Unable to resolve release-unit digest for ${{ steps.candidate.outputs.candidate_id }}" >&2
            exit 1
          fi

          hint="${{ steps.candidate.outputs.release_unit_digest_hint }}"
          if [ -n "${hint}" ] && [ "${hint}" != "${resolved_digest}" ]; then
            echo "Release-unit digest mismatch for ${{ steps.candidate.outputs.candidate_id }}" >&2
            echo "manifest=${hint} resolved=${resolved_digest}" >&2
            exit 1
          fi

          echo "release_unit_digest=${resolved_digest}" >> "$GITHUB_OUTPUT"

      - name: Deploy and run acceptance suites
        if: ${{ steps.handoff.outputs.authoritative == 'true' && steps.main_guard.outputs.is_on_main == 'true' }}
        id: acceptance_run
        run: |
          set +e

          mkdir -p .artifacts/acceptance

          node pipeline/stages/02-acceptance/scripts/deploy-candidate-github.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --run-id "${{ github.run_id }}" \
            --out "$RUNNER_TEMP/acceptance-deploy-state.json"
          deploy_status=$?

          verify_status=1
          system_status=1
          browser_status=1

          if [ "${deploy_status}" -eq 0 ]; then
            node pipeline/stages/02-acceptance/scripts/verify-candidate-github.mjs \
              --manifest "$RUNNER_TEMP/release-candidate.json" \
              --deploy-state "$RUNNER_TEMP/acceptance-deploy-state.json" \
              --api-base-url "http://127.0.0.1:3001" \
              --web-base-url "http://127.0.0.1:3000"
            verify_status=$?
          fi

          if [ "${deploy_status}" -eq 0 ] && [ "${verify_status}" -eq 0 ]; then
            pnpm exec playwright install --with-deps chromium
            playwright_status=$?
            if [ "${playwright_status}" -eq 0 ]; then
              (
                HEAD_SHA="${{ steps.candidate.outputs.source_revision }}" \
                TESTED_SHA="${{ steps.candidate.outputs.source_revision }}" \
                BASE_URL="http://127.0.0.1:3001" \
                TARGET_API_BASE_URL="http://127.0.0.1:3001" \
                pnpm test:acceptance:system
              ) &
              system_pid=$!

              (
                WEB_BASE_URL="http://127.0.0.1:3000" \
                pnpm test:acceptance:browser
              ) &
              browser_pid=$!

              wait "${system_pid}"
              system_status=$?

              wait "${browser_pid}"
              browser_status=$?
            fi
          fi

          verdict="fail"
          if [ "${deploy_status}" -eq 0 ] && [ "${verify_status}" -eq 0 ] && [ "${system_status}" -eq 0 ] && [ "${browser_status}" -eq 0 ]; then
            verdict="pass"
          fi

          summary="deploy=${deploy_status} verify=${verify_status} system=${system_status} browser=${browser_status}"
          echo "verdict=${verdict}" >> "$GITHUB_OUTPUT"
          echo "suite_summary=${summary}" >> "$GITHUB_OUTPUT"

      - name: Generate acceptance attestation predicate
        if: ${{ steps.handoff.outputs.authoritative == 'true' && steps.main_guard.outputs.is_on_main == 'true' }}
        run: |
          mkdir -p .artifacts/attestations
          node pipeline/stages/02-acceptance/scripts/generate-acceptance-attestation-predicate.mjs \
            --out .artifacts/attestations/acceptance-predicate.json \
            --candidate-id "${{ steps.candidate.outputs.candidate_id }}" \
            --source-revision "${{ steps.candidate.outputs.source_revision }}" \
            --verdict "${{ steps.acceptance_run.outputs.verdict }}" \
            --workflow-run-id "${{ github.run_id }}" \
            --tested-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --suite-summary "${{ steps.acceptance_run.outputs.suite_summary }}"

      - name: Attest acceptance verdict to candidate subject
        if: ${{ steps.handoff.outputs.authoritative == 'true' && steps.main_guard.outputs.is_on_main == 'true' }}
        uses: actions/attest@v2
        with:
          subject-name: ${{ env.RELEASE_UNITS_REPO }}
          subject-digest: ${{ steps.release_unit.outputs.release_unit_digest }}
          predicate-type: ${{ env.ACCEPTANCE_PREDICATE_TYPE }}
          predicate-path: .artifacts/attestations/acceptance-predicate.json
          push-to-registry: true

      - name: Upload release candidate handoff for Release Stage
        if: ${{ steps.handoff.outputs.authoritative == 'true' && steps.main_guard.outputs.is_on_main == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-manifest
          path: ${{ runner.temp }}/release-candidate.json
          if-no-files-found: error

      - name: Fail acceptance stage when verdict is non-pass
        if: ${{ steps.handoff.outputs.authoritative == 'true' && steps.main_guard.outputs.is_on_main == 'true' && steps.acceptance_run.outputs.verdict != 'pass' }}
        run: |
          echo "Acceptance failed for candidate ${{ steps.candidate.outputs.candidate_id }}: ${{ steps.acceptance_run.outputs.suite_summary }}" >&2
          exit 1
