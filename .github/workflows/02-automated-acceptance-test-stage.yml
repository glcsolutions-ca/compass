name: Automated Acceptance Test Stage

on:
  push:
    branches:
      - main

concurrency:
  group: acceptance-environment
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  RC_REGISTRY_REPO: ghcr.io/glcsolutions-ca/compass-release-candidates
  ACCEPTANCE_EVIDENCE_REGISTRY_REPO: ghcr.io/glcsolutions-ca/compass-acceptance-evidence

jobs:
  acceptance_tests:
    name: Automated Acceptance Test Stage
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: acceptance

    steps:
      - name: Capture acceptance stage start time
        id: acceptance_start
        run: echo "started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR (ORAS)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Login to GHCR (Docker)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute candidate id from source revision
        id: candidate
        run: echo "candidate_id=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Fetch release candidate manifest
        run: |
          node pipeline/shared/scripts/fetch-release-candidate.mjs \
            --candidate-id "${{ steps.candidate.outputs.candidate_id }}" \
            --registry-repo "${{ env.RC_REGISTRY_REPO }}" \
            --out "$RUNNER_TEMP/release-candidate.json"

      - name: Validate release candidate manifest
        run: node pipeline/shared/scripts/validate-release-candidate.mjs --file "$RUNNER_TEMP/release-candidate.json"

      - name: Verify manifest revision matches push revision
        id: manifest_source
        run: |
          manifest_source_revision="$(node -e 'const fs=require("fs");const doc=JSON.parse(fs.readFileSync(process.argv[1],"utf8"));process.stdout.write(doc.source.revision);' "$RUNNER_TEMP/release-candidate.json")"
          echo "source_revision=${manifest_source_revision}" >> "$GITHUB_OUTPUT"

          if [ "${manifest_source_revision}" != "${{ github.sha }}" ]; then
            echo "Manifest source revision mismatch for candidate ${{ steps.candidate.outputs.candidate_id }}" >&2
            echo "manifest=${manifest_source_revision} push=${{ github.sha }}" >&2
            exit 1
          fi

      - name: Deploy exact candidate to GitHub runner resources
        run: |
          node pipeline/stages/02-acceptance/scripts/deploy-candidate-github.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --run-id "${{ github.run_id }}" \
            --out "$RUNNER_TEMP/acceptance-deploy-state.json"

      - name: Verify GitHub runner deployment
        run: |
          node pipeline/stages/02-acceptance/scripts/verify-candidate-github.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --deploy-state "$RUNNER_TEMP/acceptance-deploy-state.json" \
            --api-base-url "http://127.0.0.1:3001" \
            --web-base-url "http://127.0.0.1:3000"

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run acceptance suites in parallel
        run: |
          set +e

          (
            HEAD_SHA="${{ github.sha }}" \
            TESTED_SHA="${{ steps.manifest_source.outputs.source_revision }}" \
            BASE_URL="http://127.0.0.1:3001" \
            TARGET_API_BASE_URL="http://127.0.0.1:3001" \
            pnpm test:acceptance:system
          ) &
          system_pid=$!

          (
            WEB_BASE_URL="http://127.0.0.1:3000" \
            pnpm test:acceptance:browser
          ) &
          browser_pid=$!

          wait "${system_pid}"
          system_status=$?

          wait "${browser_pid}"
          browser_status=$?

          set -e

          if [ "${system_status}" -ne 0 ] || [ "${browser_status}" -ne 0 ]; then
            echo "Acceptance suite failure: system=${system_status} browser=${browser_status}" >&2
            exit 1
          fi

      - name: Record and publish acceptance evidence
        if: always()
        run: |
          finished_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          verdict="fail"
          if [ "${{ job.status }}" = "success" ]; then
            verdict="pass"
          fi

          source_revision="${{ steps.manifest_source.outputs.source_revision }}"
          if [ -z "${source_revision}" ]; then
            source_revision="${{ github.sha }}"
          fi

          mkdir -p .artifacts/acceptance-evidence
          node pipeline/stages/02-acceptance/scripts/record-acceptance-evidence.mjs \
            --out .artifacts/acceptance-evidence/acceptance-evidence.json \
            --candidate-id "${{ steps.candidate.outputs.candidate_id }}" \
            --source-revision "${source_revision}" \
            --workflow-run-id "${{ github.run_id }}" \
            --verdict "${verdict}" \
            --started-at "${{ steps.acceptance_start.outputs.started_at }}" \
            --finished-at "${finished_at}" \
            --summary "Automated acceptance ${verdict} for candidate ${{ steps.candidate.outputs.candidate_id }}"

          cp .artifacts/acceptance-evidence/acceptance-evidence.json acceptance-evidence.json
          oras push --artifact-type application/vnd.compass.acceptance-evidence.v1 \
            "${ACCEPTANCE_EVIDENCE_REGISTRY_REPO}:${{ steps.candidate.outputs.candidate_id }}" \
            "acceptance-evidence.json:application/vnd.compass.acceptance-evidence.v1+json"

      - name: Write acceptance-stage output
        if: always()
        run: |
          source_revision="${{ steps.manifest_source.outputs.source_revision }}"
          if [ -z "${source_revision}" ]; then
            source_revision="${{ github.sha }}"
          fi

          mkdir -p .artifacts/acceptance-stage-output
          cat > .artifacts/acceptance-stage-output/acceptance-stage-output.json <<EOF_JSON
          {
            "schemaVersion": "acceptance-stage-output.v1",
            "candidateId": "${{ steps.candidate.outputs.candidate_id }}",
            "sourceRevision": "${source_revision}"
          }
          EOF_JSON

      - name: Upload acceptance-stage output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-stage-output
          path: .artifacts/acceptance-stage-output/acceptance-stage-output.json
          if-no-files-found: error
