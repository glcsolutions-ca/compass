name: Release Stage
run-name: Release Stage (${{ inputs.candidate_id || github.event.workflow_run.head_sha }})

on:
  workflow_run:
    workflows:
      - Acceptance Stage
    types:
      - completed
  workflow_dispatch:
    inputs:
      candidate_id:
        description: Accepted candidate to release or redeploy
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: production-release
  cancel-in-progress: false

env:
  MANIFESTS_REPO: ghcr.io/glcsolutions-ca/compass-release-manifests
  RELEASE_UNITS_REPO: ghcr.io/glcsolutions-ca/compass-release-units
  ACCEPTANCE_PREDICATE_TYPE: https://compass.glcsolutions.ca/pipeline/attestations/acceptance/v1
  RELEASE_PREDICATE_TYPE: https://compass.glcsolutions.ca/pipeline/attestations/release/v2

jobs:
  resolve_candidate:
    name: Resolve release candidate
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      candidate_id: ${{ steps.resolve.outputs.candidate_id }}
      source_revision: ${{ steps.resolve.outputs.source_revision }}
      release_unit_digest_hint: ${{ steps.resolve.outputs.release_unit_digest_hint }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve manifest
        id: resolve
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = 'workflow_dispatch' ]; then
            candidate_id='${{ inputs.candidate_id }}'
          else
            candidate_id="sha-${{ github.event.workflow_run.head_sha }}"
          fi
          pnpm --filter @compass/pipeline-tools run manifest:fetch -- \
            --candidate-id "$candidate_id" \
            --registry-repo "${MANIFESTS_REPO}" \
            --out "$RUNNER_TEMP/release-candidate.json"
          pnpm --filter @compass/pipeline-tools run manifest:validate:runtime --file "$RUNNER_TEMP/release-candidate.json"
          {
            echo "candidate_id=${candidate_id}"
            echo "source_revision=$(jq -r '.source.revision' "$RUNNER_TEMP/release-candidate.json")"
            echo "release_unit_digest_hint=$(jq -r '.provenance.releaseUnitDigest // empty' "$RUNNER_TEMP/release-candidate.json")"
          } >> "$GITHUB_OUTPUT"

  release:
    name: Release Stage
    needs:
      - resolve_candidate
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment:
      name: production
      url: ${{ vars.PRODUCTION_WEB_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch release manifest from GHCR
        run: |
          pnpm --filter @compass/pipeline-tools run manifest:fetch -- \
            --candidate-id "${{ needs.resolve_candidate.outputs.candidate_id }}" \
            --registry-repo "${{ env.MANIFESTS_REPO }}" \
            --out "$RUNNER_TEMP/release-candidate.json"

      - name: Resolve and verify release-unit digest
        id: release_unit
        run: |
          set -euo pipefail
          resolved_digest="$(oras manifest fetch --descriptor "${RELEASE_UNITS_REPO}:${{ needs.resolve_candidate.outputs.candidate_id }}" | jq -r '.digest')"
          hint="${{ needs.resolve_candidate.outputs.release_unit_digest_hint }}"
          if [ -n "${hint}" ] && [ "${hint}" != "${resolved_digest}" ]; then
            echo 'Release-unit digest mismatch' >&2
            exit 1
          fi
          echo "release_unit_digest=${resolved_digest}" >> "$GITHUB_OUTPUT"

      - name: Verify GHCR runtime packages are public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/bootstrap/ensure-ghcr-visibility.mjs

      - name: Assert production environment config
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          ACA_API_PROD_APP_NAME: ${{ vars.ACA_API_PROD_APP_NAME }}
          ACA_WEB_PROD_APP_NAME: ${{ vars.ACA_WEB_PROD_APP_NAME }}
          ACA_API_STAGE_APP_NAME: ${{ vars.ACA_API_STAGE_APP_NAME }}
          ACA_WEB_STAGE_APP_NAME: ${{ vars.ACA_WEB_STAGE_APP_NAME }}
          ACA_MIGRATE_JOB_NAME: ${{ vars.ACA_MIGRATE_JOB_NAME }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          PRODUCTION_WEB_BASE_URL: ${{ vars.PRODUCTION_WEB_BASE_URL }}
          ENTRA_WEB_CLIENT_ID: ${{ vars.ENTRA_WEB_CLIENT_ID }}
        run: |
          pnpm --filter @compass/pipeline-tools run env:assert -- \
            --required AZURE_RESOURCE_GROUP \
            --required ACA_API_PROD_APP_NAME \
            --required ACA_WEB_PROD_APP_NAME \
            --required ACA_API_STAGE_APP_NAME \
            --required ACA_WEB_STAGE_APP_NAME \
            --required ACA_MIGRATE_JOB_NAME \
            --required AZURE_CLIENT_ID \
            --required AZURE_TENANT_ID \
            --required AZURE_SUBSCRIPTION_ID \
            --required PRODUCTION_WEB_BASE_URL \
            --required ENTRA_WEB_CLIENT_ID

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Verify acceptance attestation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm --filter @compass/pipeline-tools run attest:verify-acceptance -- \
            --candidate-id "${{ needs.resolve_candidate.outputs.candidate_id }}" \
            --source-revision "${{ needs.resolve_candidate.outputs.source_revision }}" \
            --predicate-type "${ACCEPTANCE_PREDICATE_TYPE}" \
            --repo "${{ github.repository }}" \
            --subject "${RELEASE_UNITS_REPO}@${{ steps.release_unit.outputs.release_unit_digest }}"

      - name: Detect infra changes
        id: changed
        run: |
          json="$(node scripts/infra/detect-changed-scopes.mjs --revision "${{ needs.resolve_candidate.outputs.source_revision }}")"
          echo "infra_changed=$(printf '%s' "$json" | jq -r '.infraChanged')" >> "$GITHUB_OUTPUT"

      - name: Resolve current endpoints and prod images
        id: runtime
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          API_PROD: ${{ vars.ACA_API_PROD_APP_NAME }}
          WEB_PROD: ${{ vars.ACA_WEB_PROD_APP_NAME }}
          API_STAGE: ${{ vars.ACA_API_STAGE_APP_NAME }}
          WEB_STAGE: ${{ vars.ACA_WEB_STAGE_APP_NAME }}
        run: |
          api_prod_image="$(az containerapp show -g "$RG" -n "$API_PROD" --query 'properties.template.containers[0].image' -o tsv)"
          web_prod_image="$(az containerapp show -g "$RG" -n "$WEB_PROD" --query 'properties.template.containers[0].image' -o tsv)"
          api_stage_base_url="https://$(az containerapp show -g "$RG" -n "$API_STAGE" --query 'properties.configuration.ingress.fqdn' -o tsv)"
          web_stage_base_url="https://$(az containerapp show -g "$RG" -n "$WEB_STAGE" --query 'properties.configuration.ingress.fqdn' -o tsv)"
          prod_api_base_url="https://$(az containerapp show -g "$RG" -n "$API_PROD" --query 'properties.configuration.ingress.fqdn' -o tsv)"
          {
            echo "api_prod_image=${api_prod_image}"
            echo "web_prod_image=${web_prod_image}"
            echo "api_stage_base_url=${api_stage_base_url}"
            echo "web_stage_base_url=${web_stage_base_url}"
            echo "prod_api_base_url=${prod_api_base_url}"
          } >> "$GITHUB_OUTPUT"

      - name: Apply production Bicep when infra changed
        if: ${{ steps.changed.outputs.infra_changed == 'true' }}
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          node scripts/infra/apply-platform.mjs \
            --mode apply \
            --resource-group "$RG"

      - name: Deploy stage apps from candidate
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          API_STAGE: ${{ vars.ACA_API_STAGE_APP_NAME }}
          WEB_STAGE: ${{ vars.ACA_WEB_STAGE_APP_NAME }}
        run: |
          node pipeline/stages/03-release/scripts/deploy-stage-from-candidate.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --resource-group "$RG" \
            --api-app-name "$API_STAGE" \
            --web-app-name "$WEB_STAGE" \
            --stage-api-base-url "${{ steps.runtime.outputs.api_stage_base_url }}"

      - name: Stage health smoke
        id: stage_health_smoke
        run: |
          node pipeline/stages/03-release/scripts/run-stage-smoke.mjs \
            --api-base-url "${{ steps.runtime.outputs.api_stage_base_url }}" \
            --web-base-url "${{ steps.runtime.outputs.web_stage_base_url }}" \
            --include-auth false
          echo 'verdict=pass' >> "$GITHUB_OUTPUT"

      - name: Run production migrations
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          JOB: ${{ vars.ACA_MIGRATE_JOB_NAME }}
        run: |
          node pipeline/stages/03-release/scripts/run-production-migrations.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --resource-group "$RG" \
            --job-name "$JOB"

      - name: Stage auth smoke
        id: stage_smoke
        run: |
          node pipeline/stages/03-release/scripts/run-stage-smoke.mjs \
            --api-base-url "${{ steps.runtime.outputs.api_stage_base_url }}" \
            --web-base-url "${{ steps.runtime.outputs.web_stage_base_url }}" \
            --include-auth true
          echo 'verdict=pass' >> "$GITHUB_OUTPUT"

      - name: Deploy prod apps from candidate
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          API_PROD: ${{ vars.ACA_API_PROD_APP_NAME }}
          WEB_PROD: ${{ vars.ACA_WEB_PROD_APP_NAME }}
        run: |
          node pipeline/stages/03-release/scripts/deploy-prod-from-candidate.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --resource-group "$RG" \
            --api-app-name "$API_PROD" \
            --web-app-name "$WEB_PROD" \
            --prod-api-base-url "${{ steps.runtime.outputs.prod_api_base_url }}"

      - name: Production smoke
        id: production_smoke
        run: |
          node pipeline/stages/03-release/scripts/run-production-smoke.mjs \
            --web-base-url "${{ vars.PRODUCTION_WEB_BASE_URL }}"
          echo 'verdict=pass' >> "$GITHUB_OUTPUT"

      - name: Record release evidence
        run: |
          mkdir -p .artifacts/release
          node pipeline/stages/03-release/scripts/record-release-evidence.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --stage-api-base-url "${{ steps.runtime.outputs.api_stage_base_url }}" \
            --stage-web-base-url "${{ steps.runtime.outputs.web_stage_base_url }}" \
            --stage-smoke-verdict "${{ steps.stage_smoke.outputs.verdict }}" \
            --production-web-base-url "${{ vars.PRODUCTION_WEB_BASE_URL }}" \
            --production-smoke-verdict "${{ steps.production_smoke.outputs.verdict }}" \
            --out .artifacts/release/release-evidence.json

      - name: Generate release attestation predicate
        run: |
          predicate_path="${GITHUB_WORKSPACE}/.artifacts/attestations/release-predicate.json"
          mkdir -p "$(dirname "$predicate_path")"
          pnpm --filter @compass/pipeline-tools run release:predicate:generate -- \
            --out "$predicate_path" \
            --candidate-id "${{ needs.resolve_candidate.outputs.candidate_id }}" \
            --source-revision "${{ needs.resolve_candidate.outputs.source_revision }}" \
            --verdict pass \
            --workflow-run-id "${{ github.run_id }}" \
            --released-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --deployment-ref "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --api-image "$(jq -r '.artifacts.apiImage' "$RUNNER_TEMP/release-candidate.json")" \
            --web-image "$(jq -r '.artifacts.webImage' "$RUNNER_TEMP/release-candidate.json")" \
            --stage-api-base-url "${{ steps.runtime.outputs.api_stage_base_url }}" \
            --stage-web-base-url "${{ steps.runtime.outputs.web_stage_base_url }}" \
            --stage-smoke-verdict "${{ steps.stage_smoke.outputs.verdict }}" \
            --production-web-base-url "${{ vars.PRODUCTION_WEB_BASE_URL }}" \
            --production-smoke-verdict "${{ steps.production_smoke.outputs.verdict }}"

      - name: Attest release verdict to candidate subject
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.RELEASE_UNITS_REPO }}
          subject-digest: ${{ steps.release_unit.outputs.release_unit_digest }}
          predicate-type: ${{ env.RELEASE_PREDICATE_TYPE }}
          predicate-path: ${{ github.workspace }}/.artifacts/attestations/release-predicate.json
          push-to-registry: true

      - name: Upload release diagnostics
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-diagnostics-${{ github.run_id }}
          path: |
            .artifacts/release
            .artifacts/attestations/release-predicate.json
          if-no-files-found: warn
          retention-days: 7

      - name: Write release summary
        if: always()
        run: |
          {
            echo '## Release Stage'
            echo "- Candidate: ${{ needs.resolve_candidate.outputs.candidate_id }}"
            echo "- Stage API: ${{ steps.runtime.outputs.api_stage_base_url }}"
            echo "- Stage Web: ${{ steps.runtime.outputs.web_stage_base_url }}"
            echo "- Stage health smoke: ${{ steps.stage_health_smoke.outputs.verdict || 'skipped' }}"
            echo "- Stage auth smoke: ${{ steps.stage_smoke.outputs.verdict || 'skipped' }}"
            echo "- Production Web: ${{ vars.PRODUCTION_WEB_BASE_URL }}"
          } >> "$GITHUB_STEP_SUMMARY"
