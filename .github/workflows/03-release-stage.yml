name: Release Stage
run-name: Release Stage (${{ github.event_name == 'workflow_dispatch' && inputs.candidate_id || github.event.workflow_run.head_sha }})

on:
  workflow_dispatch:
    inputs:
      candidate_id:
        description: Release candidate id (sha-<40-char-source-sha>)
        required: true
        type: string
  workflow_run:
    workflows:
      - Acceptance Stage
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: production-environment
  cancel-in-progress: false

env:
  MANIFESTS_REPO: ghcr.io/glcsolutions-ca/compass-release-manifests
  RELEASE_UNITS_REPO: ghcr.io/glcsolutions-ca/compass-release-units
  ACCEPTANCE_PREDICATE_TYPE: https://compass.glcsolutions.ca/pipeline/attestations/acceptance/v1
  RELEASE_PREDICATE_TYPE: https://compass.glcsolutions.ca/pipeline/attestations/release/v1

jobs:
  resolve_candidate:
    name: Resolve release candidate
    if: |
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
      }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      run_release: ${{ steps.resolve.outputs.run_release }}
      skip_reason: ${{ steps.resolve.outputs.skip_reason }}
      candidate_id: ${{ steps.resolve.outputs.candidate_id }}
      source_revision_hint: ${{ steps.resolve.outputs.source_revision_hint }}
      release_unit_digest_hint: ${{ steps.resolve.outputs.release_unit_digest_hint }}
    steps:
      - name: Enforce manual-release branch guard
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          if [ "${{ github.ref_name }}" != "main" ]; then
            echo "Manual release is only allowed when workflow is run from main. Current ref: ${{ github.ref_name }}" >&2
            exit 1
          fi

      - name: Download release candidate handoff from triggering Acceptance run
        if: ${{ github.event_name == 'workflow_run' }}
        id: handoff_presence
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          artifact_ids="$(gh api \
            repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/artifacts \
            --jq '.artifacts[] | select(.name == "release-candidate-manifest") | .id')"

          if [ -n "${artifact_ids}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release candidate handoff from triggering Acceptance run
        if: ${{ github.event_name == 'workflow_run' && steps.handoff_presence.outputs.present == 'true' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-candidate-manifest
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ${{ runner.temp }}/triggering-run

      - name: Checkout release resolver scripts
        if: ${{ github.event_name == 'workflow_run' && steps.handoff_presence.outputs.present == 'true' }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Resolve candidate context
        id: resolve
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            candidate_id="${{ inputs.candidate_id }}"
            if ! echo "${candidate_id}" | grep -Eq '^sha-[0-9a-f]{40}$'; then
              echo "Invalid manual candidate_id: ${candidate_id}" >&2
              exit 1
            fi

            echo "run_release=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=" >> "$GITHUB_OUTPUT"
            echo "candidate_id=${candidate_id}" >> "$GITHUB_OUTPUT"
            echo "source_revision_hint=" >> "$GITHUB_OUTPUT"
            echo "release_unit_digest_hint=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ steps.handoff_presence.outputs.present }}" != "true" ]; then
            echo "run_release=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=acceptance run did not publish release-candidate-manifest (stale or skipped candidate)" >> "$GITHUB_OUTPUT"
            echo "candidate_id=" >> "$GITHUB_OUTPUT"
            echo "source_revision_hint=" >> "$GITHUB_OUTPUT"
            echo "release_unit_digest_hint=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          manifest_file="${RUNNER_TEMP}/triggering-run/manifest.json"
          if [ ! -f "${manifest_file}" ]; then
            manifest_file="$(find "${RUNNER_TEMP}/triggering-run" -maxdepth 3 -type f -name '*.json' | head -n 1 || true)"
          fi

          if [ -z "${manifest_file}" ] || [ ! -f "${manifest_file}" ]; then
            echo "run_release=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=acceptance run did not publish release-candidate-manifest (stale or skipped candidate)" >> "$GITHUB_OUTPUT"
            echo "candidate_id=" >> "$GITHUB_OUTPUT"
            echo "source_revision_hint=" >> "$GITHUB_OUTPUT"
            echo "release_unit_digest_hint=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          node pipeline/shared/scripts/validate-release-candidate-runtime.mjs --file "${manifest_file}"

          candidate_id="$(jq -r '.candidateId // empty' "${manifest_file}")"
          source_revision="$(jq -r '.source.revision // empty' "${manifest_file}")"
          release_unit_digest_hint="$(jq -r '.provenance.releaseUnitDigest // empty' "${manifest_file}")"

          if ! echo "${candidate_id}" | grep -Eq '^sha-[0-9a-f]{40}$'; then
            echo "Invalid candidateId in acceptance handoff manifest: ${candidate_id}" >&2
            exit 1
          fi

          if ! echo "${source_revision}" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "Invalid source.revision in acceptance handoff manifest: ${source_revision}" >&2
            exit 1
          fi

          if [ -n "${release_unit_digest_hint}" ] && ! echo "${release_unit_digest_hint}" | grep -Eq '^sha256:[0-9a-f]{64}$'; then
            echo "Invalid provenance.releaseUnitDigest in acceptance handoff manifest: ${release_unit_digest_hint}" >&2
            exit 1
          fi

          echo "run_release=true" >> "$GITHUB_OUTPUT"
          echo "skip_reason=" >> "$GITHUB_OUTPUT"
          echo "candidate_id=${candidate_id}" >> "$GITHUB_OUTPUT"
          echo "source_revision_hint=${source_revision}" >> "$GITHUB_OUTPUT"
          echo "release_unit_digest_hint=${release_unit_digest_hint}" >> "$GITHUB_OUTPUT"

      - name: Write resolver summary
        run: |
          {
            echo "## Release Resolver"
            echo "- Mode: ${{ github.event_name == 'workflow_dispatch' && 'manual' || 'auto' }}"
            echo "- Candidate: ${{ steps.resolve.outputs.candidate_id }}"
            echo "- Run release: ${{ steps.resolve.outputs.run_release }}"
            if [ -n "${{ steps.resolve.outputs.skip_reason }}" ]; then
              echo "- Skip reason: ${{ steps.resolve.outputs.skip_reason }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    name: Release Stage
    needs:
      - resolve_candidate
    if: ${{ needs.resolve_candidate.outputs.run_release == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 75
    environment:
      name: production
      url: ${{ vars.PRODUCTION_WEB_BASE_URL }}
    permissions:
      actions: read
      contents: read
      packages: write
      id-token: write
      attestations: write
      deployments: write
      artifact-metadata: write

    steps:
      - name: Capture release start time
        id: release_start
        run: echo "released_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - &checkout_step
        name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - &setup_pnpm_step
        name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - &setup_node_step
        name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - &install_dependencies_step
        name: Install dependencies
        run: pnpm install --frozen-lockfile

      - &setup_oras_step
        name: Setup ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

      - &login_ghcr_step
        name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch release manifest from GHCR
        run: |
          node pipeline/shared/scripts/fetch-release-candidate.mjs \
            --candidate-id "${{ needs.resolve_candidate.outputs.candidate_id }}" \
            --registry-repo "${{ env.MANIFESTS_REPO }}" \
            --out "$RUNNER_TEMP/release-candidate.json"

      - name: Validate release manifest
        run: node pipeline/shared/scripts/validate-release-candidate.mjs --file "$RUNNER_TEMP/release-candidate.json"

      - name: Capture source revision and verify handoff consistency
        id: source
        run: |
          set -euo pipefail

          source_revision="$(jq -r '.source.revision // empty' "$RUNNER_TEMP/release-candidate.json")"
          if ! echo "${source_revision}" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "Invalid source.revision in release manifest: ${source_revision}" >&2
            exit 1
          fi

          candidate_id_from_manifest="$(jq -r '.candidateId // empty' "$RUNNER_TEMP/release-candidate.json")"
          if [ "${candidate_id_from_manifest}" != "${{ needs.resolve_candidate.outputs.candidate_id }}" ]; then
            echo "Candidate id mismatch between resolved context and GHCR manifest." >&2
            echo "resolved=${{ needs.resolve_candidate.outputs.candidate_id }} manifest=${candidate_id_from_manifest}" >&2
            exit 1
          fi

          source_hint="${{ needs.resolve_candidate.outputs.source_revision_hint }}"
          if [ -n "${source_hint}" ] && [ "${source_hint}" != "${source_revision}" ]; then
            echo "Source revision mismatch between acceptance handoff and GHCR manifest." >&2
            echo "handoff=${source_hint} manifest=${source_revision}" >&2
            exit 1
          fi

          echo "source_revision=${source_revision}" >> "$GITHUB_OUTPUT"

      - name: Resolve and verify release-unit digest
        id: release_unit
        run: |
          set -euo pipefail

          resolved_digest="$(oras manifest fetch --descriptor "${RELEASE_UNITS_REPO}:${{ needs.resolve_candidate.outputs.candidate_id }}" | jq -r '.digest')"
          if [ -z "${resolved_digest}" ] || [ "${resolved_digest}" = "null" ]; then
            echo "Unable to resolve release-unit digest for ${{ needs.resolve_candidate.outputs.candidate_id }}" >&2
            exit 1
          fi

          handoff_hint="${{ needs.resolve_candidate.outputs.release_unit_digest_hint }}"
          if [ -n "${handoff_hint}" ] && [ "${handoff_hint}" != "${resolved_digest}" ]; then
            echo "Release-unit digest mismatch between acceptance handoff and registry descriptor." >&2
            echo "handoff=${handoff_hint} resolved=${resolved_digest}" >&2
            exit 1
          fi

          manifest_hint="$(jq -r '.provenance.releaseUnitDigest // empty' "$RUNNER_TEMP/release-candidate.json")"
          if [ -n "${manifest_hint}" ] && [ "${manifest_hint}" != "${resolved_digest}" ]; then
            echo "Release-unit digest mismatch between GHCR manifest and registry descriptor." >&2
            echo "manifest=${manifest_hint} resolved=${resolved_digest}" >&2
            exit 1
          fi

          echo "release_unit_digest=${resolved_digest}" >> "$GITHUB_OUTPUT"

      - name: Verify acceptance attestation bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh attestation verify \
            "oci://${{ env.RELEASE_UNITS_REPO }}@${{ steps.release_unit.outputs.release_unit_digest }}" \
            --repo "${{ github.repository }}" \
            --predicate-type "${{ env.ACCEPTANCE_PREDICATE_TYPE }}" \
            --bundle-from-oci \
            --signer-workflow "${{ github.repository }}/.github/workflows/02-acceptance-stage.yml" \
            --format json > "$RUNNER_TEMP/acceptance-attestation-verification.json"

      - name: Enforce acceptance attestation business rule
        run: |
          node pipeline/stages/05-release/scripts/verify-acceptance-attestation.mjs \
            --verification-json "$RUNNER_TEMP/acceptance-attestation-verification.json" \
            --predicate-type "${{ env.ACCEPTANCE_PREDICATE_TYPE }}" \
            --candidate-id "${{ needs.resolve_candidate.outputs.candidate_id }}" \
            --source-revision "${{ steps.source.outputs.source_revision }}"

      - name: Assert required production environment config
        env:
          API_BASE_URL: ${{ vars.PRODUCTION_API_BASE_URL }}
          WEB_BASE_URL: ${{ vars.PRODUCTION_WEB_BASE_URL }}
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_CONTAINERAPP_API_NAME: ${{ vars.ACA_API_APP_NAME }}
          AZURE_CONTAINERAPP_WEB_NAME: ${{ vars.ACA_WEB_APP_NAME }}
          AZURE_CONTAINERAPP_WORKER_NAME: ${{ vars.ACA_WORKER_APP_NAME }}
          AZURE_MIGRATION_JOB_NAME: ${{ vars.ACA_MIGRATE_JOB_NAME }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: |
          node pipeline/shared/scripts/assert-environment-config.mjs \
            --required API_BASE_URL \
            --required WEB_BASE_URL \
            --required AZURE_RESOURCE_GROUP \
            --required AZURE_CONTAINERAPP_API_NAME \
            --required AZURE_CONTAINERAPP_WEB_NAME \
            --required AZURE_CONTAINERAPP_WORKER_NAME \
            --required AZURE_MIGRATION_JOB_NAME \
            --required AZURE_CLIENT_ID \
            --required AZURE_TENANT_ID \
            --required AZURE_SUBSCRIPTION_ID

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy candidate and run production smoke checks
        id: release_run
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_CONTAINERAPP_API_NAME: ${{ vars.ACA_API_APP_NAME }}
          AZURE_CONTAINERAPP_WEB_NAME: ${{ vars.ACA_WEB_APP_NAME }}
          AZURE_CONTAINERAPP_WORKER_NAME: ${{ vars.ACA_WORKER_APP_NAME }}
          AZURE_MIGRATION_JOB_NAME: ${{ vars.ACA_MIGRATE_JOB_NAME }}
          ACR_NAME: ${{ vars.ACR_NAME }}
          ACR_LOGIN_SERVER: ${{ format('{0}.azurecr.io', vars.ACR_NAME) }}
          SOURCE_REGISTRY_USERNAME: ${{ github.actor }}
          SOURCE_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          API_BASE_URL: ${{ vars.PRODUCTION_API_BASE_URL }}
          WEB_BASE_URL: ${{ vars.PRODUCTION_WEB_BASE_URL }}
        run: |
          set +e

          mkdir -p .artifacts/release

          node pipeline/stages/05-release/scripts/deploy-production-candidate.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --api-app-name "$AZURE_CONTAINERAPP_API_NAME" \
            --web-app-name "$AZURE_CONTAINERAPP_WEB_NAME" \
            --worker-app-name "$AZURE_CONTAINERAPP_WORKER_NAME" \
            --migrations-job-name "$AZURE_MIGRATION_JOB_NAME" \
            --acr-name "$ACR_NAME" \
            --acr-login-server "$ACR_LOGIN_SERVER" \
            --source-registry-username "$SOURCE_REGISTRY_USERNAME" \
            --source-registry-password "$SOURCE_REGISTRY_PASSWORD" \
            --out "$RUNNER_TEMP/production-deploy-state.json"
          deploy_status=$?

          smoke_status=1
          if [ "${deploy_status}" -eq 0 ]; then
            node pipeline/stages/05-release/scripts/verify-production-candidate.mjs \
              --manifest "$RUNNER_TEMP/release-candidate.json" \
              --deploy-state "$RUNNER_TEMP/production-deploy-state.json" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --api-app-name "$AZURE_CONTAINERAPP_API_NAME" \
              --web-app-name "$AZURE_CONTAINERAPP_WEB_NAME" \
              --worker-app-name "$AZURE_CONTAINERAPP_WORKER_NAME" \
              --api-base-url "$API_BASE_URL" \
              --web-base-url "$WEB_BASE_URL"
            smoke_status=$?
          fi

          verdict="fail"
          if [ "${deploy_status}" -eq 0 ] && [ "${smoke_status}" -eq 0 ]; then
            verdict="pass"
          fi

          summary="deploy=${deploy_status} smoke=${smoke_status}"
          echo "verdict=${verdict}" >> "$GITHUB_OUTPUT"
          echo "release_summary=${summary}" >> "$GITHUB_OUTPUT"

      - name: Generate release attestation predicate
        run: |
          mkdir -p .artifacts/attestations
          node pipeline/stages/05-release/scripts/generate-release-attestation-predicate.mjs \
            --out .artifacts/attestations/release-predicate.json \
            --candidate-id "${{ needs.resolve_candidate.outputs.candidate_id }}" \
            --source-revision "${{ steps.source.outputs.source_revision }}" \
            --verdict "${{ steps.release_run.outputs.verdict }}" \
            --workflow-run-id "${{ github.run_id }}" \
            --released-at "${{ steps.release_start.outputs.released_at }}" \
            --deployment-ref "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Attest release verdict to candidate subject
        uses: actions/attest@ce27ba3b4a9a139d9a20a4a07d69fabb52f1e5bc # v2
        with:
          subject-name: ${{ env.RELEASE_UNITS_REPO }}
          subject-digest: ${{ steps.release_unit.outputs.release_unit_digest }}
          predicate-type: ${{ env.RELEASE_PREDICATE_TYPE }}
          predicate-path: .artifacts/attestations/release-predicate.json
          push-to-registry: true

      - name: Upload release diagnostics on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-diagnostics-${{ github.run_id }}
          path: |
            .artifacts/release
            .artifacts/attestations
            ${{ runner.temp }}/production-deploy-state.json
            ${{ runner.temp }}/acceptance-attestation-verification.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Write release summary
        if: ${{ always() }}
        run: |
          {
            echo "## Release Stage"
            echo "- Candidate: ${{ needs.resolve_candidate.outputs.candidate_id }}"
            echo "- Source revision: ${{ steps.source.outputs.source_revision }}"
            echo "- Release unit digest: ${{ steps.release_unit.outputs.release_unit_digest }}"
            echo "- Verdict: ${{ steps.release_run.outputs.verdict }}"
            echo "- Summary: ${{ steps.release_run.outputs.release_summary }}"
            echo "- Production URL: ${{ vars.PRODUCTION_WEB_BASE_URL }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail release stage when verdict is non-pass
        if: ${{ steps.release_run.outputs.verdict != 'pass' }}
        run: |
          echo "Release failed for candidate ${{ needs.resolve_candidate.outputs.candidate_id }}: ${{ steps.release_run.outputs.release_summary }}" >&2
          exit 1

  release_skip:
    name: Release Stage (skipped)
    needs:
      - resolve_candidate
    if: ${{ needs.resolve_candidate.outputs.run_release != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Record skip
        run: |
          {
            echo "## Release Stage"
            echo "- Candidate: ${{ needs.resolve_candidate.outputs.candidate_id }}"
            echo "- Result: skipped"
            echo "- Reason: ${{ needs.resolve_candidate.outputs.skip_reason }}"
          } >> "$GITHUB_STEP_SUMMARY"
