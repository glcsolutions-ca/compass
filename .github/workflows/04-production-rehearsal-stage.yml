name: Production Rehearsal Stage
run-name: Production Rehearsal (${{ github.event_name == 'workflow_dispatch' && inputs.candidate_id || github.event.workflow_run.head_sha }})

on:
  workflow_dispatch:
    inputs:
      candidate_id:
        description: Release candidate id (sha-<40-char-source-sha>)
        required: true
        type: string
  workflow_run:
    workflows:
      - Acceptance Stage
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: production-rehearsal
  cancel-in-progress: true

env:
  MANIFESTS_REPO: ghcr.io/glcsolutions-ca/compass-release-manifests
  RELEASE_UNITS_REPO: ghcr.io/glcsolutions-ca/compass-release-units
  ACCEPTANCE_PREDICATE_TYPE: https://compass.glcsolutions.ca/pipeline/attestations/acceptance/v1

jobs:
  resolve_candidate:
    name: Resolve rehearsal candidate
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: read
    outputs:
      run_rehearsal: ${{ steps.resolve.outputs.run_rehearsal }}
      skip_reason: ${{ steps.resolve.outputs.skip_reason }}
      candidate_id: ${{ steps.resolve.outputs.candidate_id }}
      source_revision: ${{ steps.resolve.outputs.source_revision }}
      release_unit_digest_hint: ${{ steps.resolve.outputs.release_unit_digest_hint }}
    steps:
      - name: Checkout rehearsal resolver scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect release candidate handoff from triggering Acceptance run
        if: ${{ github.event_name == 'workflow_run' }}
        id: handoff_presence
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          artifact_ids="$(gh api \
            repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/artifacts \
            --jq '.artifacts[] | select(.name == "release-candidate-manifest") | .id')"

          if [ -n "${artifact_ids}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release candidate handoff from triggering Acceptance run
        if: ${{ github.event_name == 'workflow_run' && steps.handoff_presence.outputs.present == 'true' }}
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: release-candidate-manifest
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ${{ runner.temp }}/triggering-run

      - name: Setup ORAS
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

      - name: Login to GHCR
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve candidate context
        id: resolve
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            candidate_id="${{ inputs.candidate_id }}"
            if ! echo "${candidate_id}" | grep -Eq '^sha-[0-9a-f]{40}$'; then
              echo "Invalid candidate_id: ${candidate_id}" >&2
              exit 1
            fi

            pull_dir="${RUNNER_TEMP}/release-candidate-pull"
            rm -rf "${pull_dir}"
            mkdir -p "${pull_dir}"
            oras pull "${MANIFESTS_REPO}:${candidate_id}" -o "${pull_dir}"

            manifest_file="${pull_dir}/manifest.json"
            if [ ! -f "${manifest_file}" ]; then
              manifest_file="$(find "${pull_dir}" -maxdepth 3 -type f -name '*.json' | head -n 1 || true)"
            fi
          else
            if [ "${{ steps.handoff_presence.outputs.present }}" != "true" ]; then
              echo "run_rehearsal=false" >> "$GITHUB_OUTPUT"
              echo "skip_reason=acceptance run did not publish release-candidate-manifest (stale or skipped candidate)" >> "$GITHUB_OUTPUT"
              echo "candidate_id=" >> "$GITHUB_OUTPUT"
              echo "source_revision=" >> "$GITHUB_OUTPUT"
              echo "release_unit_digest_hint=" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            manifest_file="${RUNNER_TEMP}/triggering-run/manifest.json"
            if [ ! -f "${manifest_file}" ]; then
              manifest_file="$(find "${RUNNER_TEMP}/triggering-run" -maxdepth 3 -type f -name '*.json' | head -n 1 || true)"
            fi
          fi

          if [ -z "${manifest_file}" ] || [ ! -f "${manifest_file}" ]; then
            echo "No manifest JSON found for production rehearsal candidate" >&2
            exit 1
          fi

          cp "${manifest_file}" "${RUNNER_TEMP}/release-candidate.json"
          pnpm --filter @compass/pipeline-tools run manifest:validate:runtime --file "${RUNNER_TEMP}/release-candidate.json"

          candidate_id="$(jq -r '.candidateId // empty' "${RUNNER_TEMP}/release-candidate.json")"
          source_revision="$(jq -r '.source.revision // empty' "${RUNNER_TEMP}/release-candidate.json")"
          release_unit_digest_hint="$(jq -r '.provenance.releaseUnitDigest // empty' "${RUNNER_TEMP}/release-candidate.json")"

          if ! echo "${candidate_id}" | grep -Eq '^sha-[0-9a-f]{40}$'; then
            echo "Invalid candidate_id in resolved manifest: ${candidate_id}" >&2
            exit 1
          fi

          if ! echo "${source_revision}" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "Invalid source.revision in resolved manifest: ${source_revision}" >&2
            exit 1
          fi

          if [ -n "${release_unit_digest_hint}" ] && ! echo "${release_unit_digest_hint}" | grep -Eq '^sha256:[0-9a-f]{64}$'; then
            echo "Invalid provenance.releaseUnitDigest in resolved manifest: ${release_unit_digest_hint}" >&2
            exit 1
          fi

          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "${source_revision}" origin/main >/dev/null 2>&1; then
            echo "run_rehearsal=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=stale candidate source revision not merged to main" >> "$GITHUB_OUTPUT"
            echo "candidate_id=${candidate_id}" >> "$GITHUB_OUTPUT"
            echo "source_revision=${source_revision}" >> "$GITHUB_OUTPUT"
            echo "release_unit_digest_hint=${release_unit_digest_hint}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          active_release_runs="$(gh api repos/${{ github.repository }}/actions/workflows/05-release-stage.yml/runs --jq '.workflow_runs | map(select(.status == "in_progress")) | length')"
          if [ "${active_release_runs}" -gt 0 ]; then
            echo "run_rehearsal=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=release stage is currently in progress" >> "$GITHUB_OUTPUT"
            echo "candidate_id=${candidate_id}" >> "$GITHUB_OUTPUT"
            echo "source_revision=${source_revision}" >> "$GITHUB_OUTPUT"
            echo "release_unit_digest_hint=${release_unit_digest_hint}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "run_rehearsal=true" >> "$GITHUB_OUTPUT"
          echo "skip_reason=" >> "$GITHUB_OUTPUT"
          echo "candidate_id=${candidate_id}" >> "$GITHUB_OUTPUT"
          echo "source_revision=${source_revision}" >> "$GITHUB_OUTPUT"
          echo "release_unit_digest_hint=${release_unit_digest_hint}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write resolver summary
        run: |
          {
            echo "## Production Rehearsal Resolver"
            echo "- Mode: ${{ github.event_name == 'workflow_dispatch' && 'manual' || 'auto' }}"
            echo "- Candidate: ${{ steps.resolve.outputs.candidate_id }}"
            echo "- Source revision: ${{ steps.resolve.outputs.source_revision }}"
            echo "- Run rehearsal: ${{ steps.resolve.outputs.run_rehearsal }}"
            if [ -n "${{ steps.resolve.outputs.skip_reason }}" ]; then
              echo "- Skip reason: ${{ steps.resolve.outputs.skip_reason }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  rehearsal:
    name: Production Rehearsal Stage
    needs:
      - resolve_candidate
    if: ${{ needs.resolve_candidate.outputs.run_rehearsal == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 75
    environment:
      name: production-rehearsal
      url: ${{ steps.slot_context.outputs.inactive_web_base_url }}
    permissions:
      contents: read
      packages: read
      id-token: write
      actions: read

    steps:
      - name: Capture rehearsal start time
        id: rehearsal_start
        run: echo "rehearsed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - &checkout_step
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.resolve_candidate.outputs.source_revision }}
          fetch-depth: 1
          persist-credentials: false

      - &setup_pnpm_step
        name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - &setup_node_step
        name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - &install_dependencies_step
        name: Install dependencies
        run: pnpm install --frozen-lockfile

      - &setup_oras_step
        name: Setup ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

      - &login_ghcr_step
        name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch release manifest from GHCR
        run: |
          pnpm --filter @compass/pipeline-tools run manifest:fetch -- \
            --candidate-id "${{ needs.resolve_candidate.outputs.candidate_id }}" \
            --registry-repo "${{ env.MANIFESTS_REPO }}" \
            --out "$RUNNER_TEMP/release-candidate.json"

      - name: Validate release manifest
        run: pnpm --filter @compass/pipeline-tools run manifest:validate --file "$RUNNER_TEMP/release-candidate.json"

      - name: Resolve and verify release-unit digest
        id: release_unit
        run: |
          set -euo pipefail

          resolved_digest="$(oras manifest fetch --descriptor "${RELEASE_UNITS_REPO}:${{ needs.resolve_candidate.outputs.candidate_id }}" | jq -r '.digest')"
          if [ -z "${resolved_digest}" ] || [ "${resolved_digest}" = "null" ]; then
            echo "Unable to resolve release-unit digest for ${{ needs.resolve_candidate.outputs.candidate_id }}" >&2
            exit 1
          fi

          hint="${{ needs.resolve_candidate.outputs.release_unit_digest_hint }}"
          if [ -n "${hint}" ] && [ "${hint}" != "${resolved_digest}" ]; then
            echo "Release-unit digest mismatch for ${{ needs.resolve_candidate.outputs.candidate_id }}" >&2
            echo "manifest=${hint} resolved=${resolved_digest}" >&2
            exit 1
          fi

          echo "release_unit_digest=${resolved_digest}" >> "$GITHUB_OUTPUT"

      - name: Verify acceptance attestation bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh attestation verify \
            "oci://${{ env.RELEASE_UNITS_REPO }}@${{ steps.release_unit.outputs.release_unit_digest }}" \
            --repo "${{ github.repository }}" \
            --predicate-type "${{ env.ACCEPTANCE_PREDICATE_TYPE }}" \
            --bundle-from-oci \
            --signer-workflow "${{ github.repository }}/.github/workflows/02-acceptance-stage.yml" \
            --format json > "$RUNNER_TEMP/acceptance-attestation-verification.json"

      - name: Enforce acceptance attestation business rule
        run: |
          pnpm --filter @compass/pipeline-tools run attest:verify-acceptance -- \
            --verification-json "$RUNNER_TEMP/acceptance-attestation-verification.json" \
            --predicate-type "${{ env.ACCEPTANCE_PREDICATE_TYPE }}" \
            --candidate-id "${{ needs.resolve_candidate.outputs.candidate_id }}" \
            --source-revision "${{ needs.resolve_candidate.outputs.source_revision }}"

      - name: Assert required rehearsal environment config
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_CONTAINERAPP_API_NAME: ${{ vars.ACA_API_APP_NAME }}
          AZURE_CONTAINERAPP_WEB_NAME: ${{ vars.ACA_WEB_APP_NAME }}
          AZURE_CONTAINERAPP_WORKER_NAME: ${{ vars.ACA_WORKER_APP_NAME }}
          AZURE_MIGRATION_JOB_NAME: ${{ vars.ACA_MIGRATE_JOB_NAME }}
          ACR_NAME: ${{ vars.ACR_NAME }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: |
          pnpm --filter @compass/pipeline-tools run env:assert -- \
            --required AZURE_RESOURCE_GROUP \
            --required AZURE_CONTAINERAPP_API_NAME \
            --required AZURE_CONTAINERAPP_WEB_NAME \
            --required AZURE_CONTAINERAPP_WORKER_NAME \
            --required AZURE_MIGRATION_JOB_NAME \
            --required ACR_NAME \
            --required AZURE_CLIENT_ID \
            --required AZURE_TENANT_ID \
            --required AZURE_SUBSCRIPTION_ID

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve blue/green slot baseline
        id: slot_context
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_CONTAINERAPP_API_NAME: ${{ vars.ACA_API_APP_NAME }}
          AZURE_CONTAINERAPP_WEB_NAME: ${{ vars.ACA_WEB_APP_NAME }}
        run: |
          node pipeline/stages/05-release/scripts/resolve-blue-green-slot.mjs \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --api-app-name "$AZURE_CONTAINERAPP_API_NAME" \
            --web-app-name "$AZURE_CONTAINERAPP_WEB_NAME" \
            --out "$RUNNER_TEMP/blue-green-slot.json" \
            --github-output "$GITHUB_OUTPUT"

      - name: Deploy and verify rehearsal candidate
        id: rehearsal_run
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_CONTAINERAPP_API_NAME: ${{ vars.ACA_API_APP_NAME }}
          AZURE_CONTAINERAPP_WEB_NAME: ${{ vars.ACA_WEB_APP_NAME }}
          AZURE_CONTAINERAPP_WORKER_NAME: ${{ vars.ACA_WORKER_APP_NAME }}
          AZURE_MIGRATION_JOB_NAME: ${{ vars.ACA_MIGRATE_JOB_NAME }}
          ACR_NAME: ${{ vars.ACR_NAME }}
          ACR_LOGIN_SERVER: ${{ format('{0}.azurecr.io', vars.ACR_NAME) }}
          SOURCE_REGISTRY_USERNAME: ${{ github.actor }}
          SOURCE_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          ACTIVE_LABEL: ${{ steps.slot_context.outputs.active_label }}
          INACTIVE_LABEL: ${{ steps.slot_context.outputs.inactive_label }}
          API_FQDN: ${{ steps.slot_context.outputs.api_fqdn }}
          WEB_FQDN: ${{ steps.slot_context.outputs.web_fqdn }}
          INACTIVE_API_BASE_URL: ${{ steps.slot_context.outputs.inactive_api_base_url }}
          INACTIVE_WEB_BASE_URL: ${{ steps.slot_context.outputs.inactive_web_base_url }}
        run: |
          set +e

          mkdir -p .artifacts/rehearsal

          pnpm --filter @compass/pipeline-tools run rehearsal:deploy:production -- \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --api-app-name "$AZURE_CONTAINERAPP_API_NAME" \
            --web-app-name "$AZURE_CONTAINERAPP_WEB_NAME" \
            --worker-app-name "$AZURE_CONTAINERAPP_WORKER_NAME" \
            --migrations-job-name "$AZURE_MIGRATION_JOB_NAME" \
            --active-label "$ACTIVE_LABEL" \
            --inactive-label "$INACTIVE_LABEL" \
            --api-fqdn "$API_FQDN" \
            --web-fqdn "$WEB_FQDN" \
            --acr-name "$ACR_NAME" \
            --acr-login-server "$ACR_LOGIN_SERVER" \
            --source-registry-username "$SOURCE_REGISTRY_USERNAME" \
            --source-registry-password "$SOURCE_REGISTRY_PASSWORD" \
            --out "$RUNNER_TEMP/production-rehearsal-deploy-state.json"
          deploy_status=$?

          verify_status=1
          if [ "${deploy_status}" -eq 0 ]; then
            pnpm --filter @compass/pipeline-tools run rehearsal:verify:production -- \
              --manifest "$RUNNER_TEMP/release-candidate.json" \
              --deploy-state "$RUNNER_TEMP/production-rehearsal-deploy-state.json" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --api-app-name "$AZURE_CONTAINERAPP_API_NAME" \
              --web-app-name "$AZURE_CONTAINERAPP_WEB_NAME" \
              --worker-app-name "$AZURE_CONTAINERAPP_WORKER_NAME" \
              --api-base-url "$INACTIVE_API_BASE_URL" \
              --web-base-url "$INACTIVE_WEB_BASE_URL" \
              --slot-label "$INACTIVE_LABEL" \
              --slot-weight "0"
            verify_status=$?
          fi

          verdict="fail"
          if [ "${deploy_status}" -eq 0 ] && [ "${verify_status}" -eq 0 ]; then
            verdict="pass"
          fi

          summary="deploy=${deploy_status} verify=${verify_status} active=${ACTIVE_LABEL} inactive=${INACTIVE_LABEL}"
          echo "verdict=${verdict}" >> "$GITHUB_OUTPUT"
          echo "rehearsal_summary=${summary}" >> "$GITHUB_OUTPUT"

      - name: Record production rehearsal evidence
        if: ${{ steps.rehearsal_run.outputs.verdict == 'pass' }}
        run: |
          pnpm --filter @compass/pipeline-tools run rehearsal:evidence:record -- \
            --out "$RUNNER_TEMP/production-rehearsal-evidence.json" \
            --candidate-id "${{ needs.resolve_candidate.outputs.candidate_id }}" \
            --source-revision "${{ needs.resolve_candidate.outputs.source_revision }}" \
            --workflow-run-id "${{ github.run_id }}" \
            --rehearsed-at "${{ steps.rehearsal_start.outputs.rehearsed_at }}" \
            --verdict "${{ steps.rehearsal_run.outputs.verdict }}" \
            --active-label "${{ steps.slot_context.outputs.active_label }}" \
            --inactive-label "${{ steps.slot_context.outputs.inactive_label }}" \
            --api-base-url "${{ steps.slot_context.outputs.inactive_api_base_url }}" \
            --web-base-url "${{ steps.slot_context.outputs.inactive_web_base_url }}" \
            --api-revision "$(jq -r '.deployment.api.candidateRevision' "$RUNNER_TEMP/production-rehearsal-deploy-state.json")" \
            --web-revision "$(jq -r '.deployment.web.candidateRevision' "$RUNNER_TEMP/production-rehearsal-deploy-state.json")" \
            --summary "${{ steps.rehearsal_run.outputs.rehearsal_summary }}"

      - name: Upload rehearsal evidence
        if: ${{ steps.rehearsal_run.outputs.verdict == 'pass' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: production-rehearsal-evidence
          path: ${{ runner.temp }}/production-rehearsal-evidence.json
          if-no-files-found: error
          retention-days: 7

      - name: Upload rehearsal diagnostics on failure
        if: ${{ !cancelled() && (failure() || steps.rehearsal_run.outputs.verdict != 'pass') }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: production-rehearsal-diagnostics-${{ github.run_id }}
          path: |
            .artifacts/rehearsal
            ${{ runner.temp }}/production-rehearsal-deploy-state.json
            ${{ runner.temp }}/blue-green-slot.json
            ${{ runner.temp }}/acceptance-attestation-verification.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Write rehearsal summary
        if: ${{ always() }}
        run: |
          {
            echo "## Production Rehearsal Stage"
            echo "- Candidate: ${{ needs.resolve_candidate.outputs.candidate_id }}"
            echo "- Source revision: ${{ needs.resolve_candidate.outputs.source_revision }}"
            echo "- Release unit digest: ${{ steps.release_unit.outputs.release_unit_digest }}"
            echo "- Verdict: ${{ steps.rehearsal_run.outputs.verdict }}"
            echo "- Summary: ${{ steps.rehearsal_run.outputs.rehearsal_summary }}"
            echo "- Active slot label: ${{ steps.slot_context.outputs.active_label }}"
            echo "- Inactive slot label: ${{ steps.slot_context.outputs.inactive_label }}"
            echo "- Rehearsal URL: ${{ steps.slot_context.outputs.inactive_web_base_url }}"
            echo "- Promote command: gh workflow run 05-release-stage.yml -f candidate_id=${{ needs.resolve_candidate.outputs.candidate_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail rehearsal stage when verdict is non-pass
        if: ${{ steps.rehearsal_run.outputs.verdict != 'pass' }}
        run: |
          echo "Production rehearsal failed for candidate ${{ needs.resolve_candidate.outputs.candidate_id }}: ${{ steps.rehearsal_run.outputs.rehearsal_summary }}" >&2
          exit 1

  rehearsal_skip:
    name: Production Rehearsal Stage (skipped)
    needs:
      - resolve_candidate
    if: ${{ needs.resolve_candidate.outputs.run_rehearsal != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Record skip
        run: |
          {
            echo "## Production Rehearsal Stage"
            echo "- Candidate: ${{ needs.resolve_candidate.outputs.candidate_id }}"
            echo "- Result: skipped"
            echo "- Reason: ${{ needs.resolve_candidate.outputs.skip_reason }}"
          } >> "$GITHUB_STEP_SUMMARY"
