name: Release Stage

on:
  workflow_dispatch:
    inputs:
      candidate_id:
        description: Release candidate id (sha-<40-char-source-sha>)
        required: true
        type: string
  workflow_run:
    workflows:
      - Staging / Manual Test Stage (Production Rehearsal Placeholder)
    types:
      - completed

permissions:
  actions: read
  contents: read
  packages: write
  id-token: write

concurrency:
  group: production-environment
  cancel-in-progress: false

env:
  RC_REGISTRY_REPO: ghcr.io/glcsolutions-ca/compass-release-candidates
  ACCEPTANCE_EVIDENCE_REGISTRY_REPO: ghcr.io/glcsolutions-ca/compass-acceptance-evidence
  PRODUCTION_REHEARSAL_EVIDENCE_REGISTRY_REPO: ghcr.io/glcsolutions-ca/compass-production-rehearsal-evidence
  RELEASE_EVIDENCE_REGISTRY_REPO: ghcr.io/glcsolutions-ca/compass-release-evidence

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production
    if: |
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main'
        )
      }}

    steps:
      - name: Capture release start time
        id: release_start
        run: echo "released_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR (ORAS)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Download rehearsal-stage output
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          name: rehearsal-stage-output
          path: ${{ runner.temp }}/rehearsal-stage-output
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve candidate id
        id: candidate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "candidate_id=${{ inputs.candidate_id }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const outputPath = path.join(process.env.RUNNER_TEMP, 'rehearsal-stage-output', 'rehearsal-stage-output.json');
          const payload = JSON.parse(fs.readFileSync(outputPath, 'utf8'));

          if (!payload.candidateId || !payload.sourceRevision) {
            throw new Error('rehearsal-stage output must include candidateId and sourceRevision');
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `candidate_id=${payload.candidateId}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `source_revision_hint=${payload.sourceRevision}\n`);
          NODE

      - name: Fetch release candidate manifest
        run: |
          node pipeline/shared/scripts/fetch-release-candidate.mjs \
            --candidate-id "${{ steps.candidate.outputs.candidate_id }}" \
            --registry-repo "${{ env.RC_REGISTRY_REPO }}" \
            --out "$RUNNER_TEMP/release-candidate.json"

      - name: Validate release candidate manifest
        run: node pipeline/shared/scripts/validate-release-candidate.mjs --file "$RUNNER_TEMP/release-candidate.json"

      - name: Capture source revision from manifest
        id: source
        run: |
          source_revision="$(node -e 'const fs=require("fs");const doc=JSON.parse(fs.readFileSync(process.argv[1],"utf8"));process.stdout.write(doc.source.revision);' "$RUNNER_TEMP/release-candidate.json")"
          echo "source_revision=${source_revision}" >> "$GITHUB_OUTPUT"

          source_hint="${{ steps.candidate.outputs.source_revision_hint }}"
          if [ -n "${source_hint}" ] && [ "${source_hint}" != "${source_revision}" ]; then
            echo "Source revision mismatch between rehearsal output and candidate manifest." >&2
            echo "hint=${source_hint} manifest=${source_revision}" >&2
            exit 1
          fi

      - name: Fetch acceptance evidence
        run: |
          mkdir -p "$RUNNER_TEMP/acceptance-evidence"
          oras pull "${ACCEPTANCE_EVIDENCE_REGISTRY_REPO}:${{ steps.candidate.outputs.candidate_id }}" -o "$RUNNER_TEMP/acceptance-evidence"

      - name: Verify acceptance evidence pass
        run: |
          node pipeline/stages/05-release/scripts/verify-acceptance-evidence.mjs \
            --dir "$RUNNER_TEMP/acceptance-evidence" \
            --candidate-id "${{ steps.candidate.outputs.candidate_id }}" \
            --source-revision "${{ steps.source.outputs.source_revision }}"

      - name: Fetch production rehearsal evidence
        run: |
          mkdir -p "$RUNNER_TEMP/production-rehearsal-evidence"
          oras pull "${PRODUCTION_REHEARSAL_EVIDENCE_REGISTRY_REPO}:${{ steps.candidate.outputs.candidate_id }}" -o "$RUNNER_TEMP/production-rehearsal-evidence"

      - name: Verify production rehearsal evidence pass
        run: |
          node pipeline/stages/05-release/scripts/verify-production-rehearsal-evidence.mjs \
            --dir "$RUNNER_TEMP/production-rehearsal-evidence" \
            --candidate-id "${{ steps.candidate.outputs.candidate_id }}" \
            --source-revision "${{ steps.source.outputs.source_revision }}"

      - name: Assert required production environment config
        env:
          API_BASE_URL: ${{ vars.PRODUCTION_API_BASE_URL }}
          WEB_BASE_URL: ${{ vars.PRODUCTION_WEB_BASE_URL }}
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_CONTAINERAPP_API_NAME: ${{ vars.ACA_API_APP_NAME }}
          AZURE_CONTAINERAPP_WEB_NAME: ${{ vars.ACA_WEB_APP_NAME }}
          AZURE_CONTAINERAPP_WORKER_NAME: ${{ vars.ACA_WORKER_APP_NAME }}
          AZURE_MIGRATION_JOB_NAME: ${{ vars.ACA_MIGRATE_JOB_NAME }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: |
          node pipeline/shared/scripts/assert-environment-config.mjs \
            --required API_BASE_URL \
            --required WEB_BASE_URL \
            --required AZURE_RESOURCE_GROUP \
            --required AZURE_CONTAINERAPP_API_NAME \
            --required AZURE_CONTAINERAPP_WEB_NAME \
            --required AZURE_CONTAINERAPP_WORKER_NAME \
            --required AZURE_MIGRATION_JOB_NAME \
            --required AZURE_CLIENT_ID \
            --required AZURE_TENANT_ID \
            --required AZURE_SUBSCRIPTION_ID

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy candidate to production from manifest
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_CONTAINERAPP_API_NAME: ${{ vars.ACA_API_APP_NAME }}
          AZURE_CONTAINERAPP_WEB_NAME: ${{ vars.ACA_WEB_APP_NAME }}
          AZURE_CONTAINERAPP_WORKER_NAME: ${{ vars.ACA_WORKER_APP_NAME }}
          AZURE_MIGRATION_JOB_NAME: ${{ vars.ACA_MIGRATE_JOB_NAME }}
          ACR_NAME: ${{ vars.ACR_NAME }}
          ACR_LOGIN_SERVER: ${{ format('{0}.azurecr.io', vars.ACR_NAME) }}
          SOURCE_REGISTRY_USERNAME: ${{ github.actor }}
          SOURCE_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node pipeline/stages/05-release/scripts/deploy-production-candidate.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --api-app-name "$AZURE_CONTAINERAPP_API_NAME" \
            --web-app-name "$AZURE_CONTAINERAPP_WEB_NAME" \
            --worker-app-name "$AZURE_CONTAINERAPP_WORKER_NAME" \
            --migrations-job-name "$AZURE_MIGRATION_JOB_NAME" \
            --acr-name "$ACR_NAME" \
            --acr-login-server "$ACR_LOGIN_SERVER" \
            --source-registry-username "$SOURCE_REGISTRY_USERNAME" \
            --source-registry-password "$SOURCE_REGISTRY_PASSWORD" \
            --out "$RUNNER_TEMP/production-deploy-state.json"

      - name: Production smoke checks
        env:
          API_BASE_URL: ${{ vars.PRODUCTION_API_BASE_URL }}
          WEB_BASE_URL: ${{ vars.PRODUCTION_WEB_BASE_URL }}
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_CONTAINERAPP_API_NAME: ${{ vars.ACA_API_APP_NAME }}
          AZURE_CONTAINERAPP_WEB_NAME: ${{ vars.ACA_WEB_APP_NAME }}
          AZURE_CONTAINERAPP_WORKER_NAME: ${{ vars.ACA_WORKER_APP_NAME }}
        run: |
          node pipeline/stages/05-release/scripts/verify-production-candidate.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --deploy-state "$RUNNER_TEMP/production-deploy-state.json" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --api-app-name "$AZURE_CONTAINERAPP_API_NAME" \
            --web-app-name "$AZURE_CONTAINERAPP_WEB_NAME" \
            --worker-app-name "$AZURE_CONTAINERAPP_WORKER_NAME" \
            --api-base-url "$API_BASE_URL" \
            --web-base-url "$WEB_BASE_URL"

      - name: Record and publish release evidence
        if: always()
        run: |
          source_revision="${{ steps.source.outputs.source_revision }}"
          if [ -z "${source_revision}" ]; then
            echo "Source revision unavailable. Skipping release evidence publication."
            exit 0
          fi

          candidate_id="${{ steps.candidate.outputs.candidate_id }}"
          if [ -z "${candidate_id}" ]; then
            echo "Candidate id unavailable. Skipping release evidence publication."
            exit 0
          fi

          verdict="fail"
          if [ "${{ job.status }}" = "success" ]; then
            verdict="pass"
          fi

          mkdir -p .artifacts/release-evidence
          node pipeline/stages/05-release/scripts/record-release-evidence.mjs \
            --out .artifacts/release-evidence/release-evidence.json \
            --candidate-id "${candidate_id}" \
            --source-revision "${source_revision}" \
            --workflow-run-id "${{ github.run_id }}" \
            --verdict "${verdict}" \
            --released-at "${{ steps.release_start.outputs.released_at }}" \
            --summary "Release ${verdict} for candidate ${candidate_id}"

          cp .artifacts/release-evidence/release-evidence.json release-evidence.json
          oras push --artifact-type application/vnd.compass.release-evidence.v1 \
            "${RELEASE_EVIDENCE_REGISTRY_REPO}:${candidate_id}" \
            "release-evidence.json:application/vnd.compass.release-evidence.v1+json"
