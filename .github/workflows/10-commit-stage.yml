name: Commit Stage
run-name: ${{ format('Commit Stage / {0}', github.sha) }}

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  merge_group:
    types:
      - checks_requested

permissions:
  contents: read

concurrency:
  group: commit-stage-${{ github.sha }}
  cancel-in-progress: false

env:
  REGISTRY_BASE: ghcr.io/glcsolutions-ca
  API_IMAGE_NAME: compass-api
  WEB_IMAGE_NAME: compass-web
  MIGRATIONS_IMAGE_NAME: compass-migrations
  MANIFESTS_REPO: ghcr.io/glcsolutions-ca/compass-release-manifests
  RELEASE_UNITS_REPO: ghcr.io/glcsolutions-ca/compass-release-units

jobs:
  queue_admission:
    if: github.event_name == 'pull_request'
    name: Commit Stage
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Record queue admission
        run: |
          {
            echo "## Commit Stage"
            echo "- Mode: pull_request queue admission"
            echo "- Action: no-op status required so merge queue can request the authoritative merge_group run"
          } >> "$GITHUB_STEP_SUMMARY"

  prepare:
    if: github.event_name == 'merge_group'
    name: Prepare Candidate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      candidate_id: ${{ steps.candidate.outputs.candidate_id }}
      source_revision: ${{ steps.source.outputs.source_revision }}
    steps:
      - name: Compute candidate id
        id: candidate
        run: echo "candidate_id=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Record source revision
        id: source
        run: echo "source_revision=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  build_candidate:
    if: github.event_name == 'merge_group'
    name: Build Candidate / ${{ matrix.image.id }}
    needs:
      - prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    env:
      DOCKER_BUILD_RECORD_UPLOAD: "false"
    strategy:
      fail-fast: false
      matrix:
        image:
          - id: api
            dockerfile: apps/api/Dockerfile
            image_name: compass-api
          - id: web
            dockerfile: apps/web/Dockerfile
            image_name: compass-web
          - id: migrations
            dockerfile: packages/database/Dockerfile.migrations
            image_name: compass-migrations
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image.id }} image
        id: build_image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY_BASE }}/${{ matrix.image.image_name }}:${{ needs.prepare.outputs.candidate_id }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.prepare.outputs.source_revision }}
          cache-from: type=gha,scope=build-${{ matrix.image.id }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.image.id }}
          provenance: true
          sbom: true

      - name: Record digest artifact
        run: |
          mkdir -p .artifacts/image-digests
          printf '%s' '${{ steps.build_image.outputs.digest }}' > .artifacts/image-digests/${{ matrix.image.id }}.digest

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-digest-${{ matrix.image.id }}
          path: .artifacts/image-digests/${{ matrix.image.id }}.digest
          if-no-files-found: error
          retention-days: 1

  smoke_candidate:
    if: github.event_name == 'merge_group'
    name: Candidate Smoke
    needs:
      - prepare
      - build_candidate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.source_revision }}
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digest artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: image-digest-*
          path: .artifacts/image-digests
          merge-multiple: true

      - name: Create smoke manifest
        run: |
          set -euo pipefail
          api_digest="$(cat .artifacts/image-digests/api.digest)"
          web_digest="$(cat .artifacts/image-digests/web.digest)"
          migrations_digest="$(cat .artifacts/image-digests/migrations.digest)"
          jq -n \
            --arg candidate_id "${{ needs.prepare.outputs.candidate_id }}" \
            --arg source_revision "${{ needs.prepare.outputs.source_revision }}" \
            --arg api_image "${REGISTRY_BASE}/${API_IMAGE_NAME}@${api_digest}" \
            --arg web_image "${REGISTRY_BASE}/${WEB_IMAGE_NAME}@${web_digest}" \
            --arg migrations_image "${REGISTRY_BASE}/${MIGRATIONS_IMAGE_NAME}@${migrations_digest}" \
            '{
              candidateId: $candidate_id,
              source: { revision: $source_revision },
              artifacts: {
                apiImage: $api_image,
                webImage: $web_image,
                migrationsArtifact: $migrations_image
              }
            }' > "$RUNNER_TEMP/release-candidate-smoke.json"

      - name: Run candidate smoke
        run: |
          node platform/pipeline/stages/01-commit/scripts/run-candidate-smoke.mjs \
            --manifest "$RUNNER_TEMP/release-candidate-smoke.json" \
            --diagnostics-dir "$RUNNER_TEMP/commit-smoke-diagnostics"

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: commit-smoke-artifacts
          path: ${{ runner.temp }}/commit-smoke-diagnostics
          if-no-files-found: warn
          retention-days: 7

  publish_candidate:
    if: github.event_name == 'merge_group'
    name: Publish Candidate
    needs:
      - prepare
      - build_candidate
      - smoke_candidate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Setup ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digest artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: image-digest-*
          path: .artifacts/image-digests
          merge-multiple: true

      - name: Capture canonical image refs
        id: refs
        run: |
          set -euo pipefail
          api_digest="$(cat .artifacts/image-digests/api.digest)"
          web_digest="$(cat .artifacts/image-digests/web.digest)"
          migrations_digest="$(cat .artifacts/image-digests/migrations.digest)"
          {
            echo "api_image_ref=${REGISTRY_BASE}/${API_IMAGE_NAME}@${api_digest}"
            echo "web_image_ref=${REGISTRY_BASE}/${WEB_IMAGE_NAME}@${web_digest}"
            echo "migrations_image_ref=${REGISTRY_BASE}/${MIGRATIONS_IMAGE_NAME}@${migrations_digest}"
          } >> "$GITHUB_OUTPUT"

      - name: Publish release unit
        id: release_unit
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${RELEASE_UNITS_REPO}:${{ needs.prepare.outputs.candidate_id }}" \
            "${{ steps.refs.outputs.api_image_ref }}" \
            "${{ steps.refs.outputs.web_image_ref }}" \
            "${{ steps.refs.outputs.migrations_image_ref }}"
          release_unit_digest="$(oras manifest fetch --descriptor "${RELEASE_UNITS_REPO}:${{ needs.prepare.outputs.candidate_id }}" | jq -r '.digest')"
          echo "release_unit_digest=${release_unit_digest}" >> "$GITHUB_OUTPUT"

      - name: Generate release candidate manifest
        run: |
          pnpm --filter @compass/pipeline-tools run manifest:generate -- \
            --out "$RUNNER_TEMP/release-candidate.json" \
            --repository "${{ github.repository }}" \
            --source-revision "${{ needs.prepare.outputs.source_revision }}" \
            --api-image "${{ steps.refs.outputs.api_image_ref }}" \
            --web-image "${{ steps.refs.outputs.web_image_ref }}" \
            --migrations-artifact "${{ steps.refs.outputs.migrations_image_ref }}" \
            --registry "${{ env.REGISTRY_BASE }}" \
            --commit-stage-run-id "${{ github.run_id }}" \
            --release-unit-digest "${{ steps.release_unit.outputs.release_unit_digest }}"

      - name: Validate release candidate manifest
        run: pnpm --filter @compass/pipeline-tools run manifest:validate:runtime --file "$RUNNER_TEMP/release-candidate.json"

      - name: Publish release candidate manifest
        run: |
          cp "$RUNNER_TEMP/release-candidate.json" manifest.json
          oras push --artifact-type application/vnd.compass.release-manifest.v1+json \
            "${MANIFESTS_REPO}:${{ needs.prepare.outputs.candidate_id }}" \
            manifest.json:application/vnd.compass.release-manifest.v1+json

  commit_stage:
    if: github.event_name == 'merge_group'
    name: Commit Stage
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build_candidate
      - smoke_candidate
      - publish_candidate
    steps:
      - name: Assert expected path succeeded
        env:
          PREPARE: ${{ needs.prepare.result }}
          BUILD_CANDIDATE: ${{ needs.build_candidate.result }}
          SMOKE_CANDIDATE: ${{ needs.smoke_candidate.result }}
          PUBLISH_CANDIDATE: ${{ needs.publish_candidate.result }}
        run: |
          set -euo pipefail

          assert_success() {
            local name="$1"
            local result="$2"
            if [ "$result" != 'success' ]; then
              echo "${name} finished with ${result}" >&2
              exit 1
            fi
          }

          assert_success prepare "$PREPARE"
          assert_success build_candidate "$BUILD_CANDIDATE"
          assert_success smoke_candidate "$SMOKE_CANDIDATE"
          assert_success publish_candidate "$PUBLISH_CANDIDATE"

      - name: Write commit summary
        run: |
          {
            echo "## Commit Stage"
            echo "- Mode: merge_group authoritative commit stage"
            echo "- Candidate: ${{ needs.prepare.outputs.candidate_id }}"
          } >> "$GITHUB_STEP_SUMMARY"
