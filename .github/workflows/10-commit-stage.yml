name: Commit Stage
run-name: >-
  ${{ github.event_name == 'pull_request'
      && format('Commit Stage / PR #{0}', github.event.pull_request.number)
      || format('Commit Stage / {0}', github.sha) }}

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  merge_group:
    types:
      - checks_requested

permissions:
  contents: read

concurrency:
  group: >-
    commit-stage-${{ github.event_name }}-${{
      github.event_name == 'pull_request' && github.event.pull_request.number || github.sha
    }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY_BASE: ghcr.io/glcsolutions-ca
  API_IMAGE_NAME: compass-api
  WEB_IMAGE_NAME: compass-web
  MIGRATIONS_IMAGE_NAME: compass-migrations
  MANIFESTS_REPO: ghcr.io/glcsolutions-ca/compass-release-manifests
  RELEASE_UNITS_REPO: ghcr.io/glcsolutions-ca/compass-release-units

jobs:
  preflight:
    name: Preflight
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Apply labels from changed paths
        uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: false

      - name: Skip draft pull request
        if: ${{ github.event.pull_request.draft }}
        run: echo "Draft pull request; skipping preflight."

      - name: Checkout
        if: ${{ !github.event.pull_request.draft }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node and pnpm
        if: ${{ !github.event.pull_request.draft }}
        uses: ./.github/actions/setup-node-pnpm

      - name: Install actionlint
        if: ${{ !github.event.pull_request.draft }}
        run: |
          set -euo pipefail
          install_dir="$RUNNER_TEMP/actionlint-bin"
          archive="$RUNNER_TEMP/actionlint_1.7.8_linux_amd64.tar.gz"
          mkdir -p "$install_dir"
          curl --fail --retry 5 --retry-all-errors --retry-delay 2 --location \
            --output "$archive" \
            https://github.com/rhysd/actionlint/releases/download/v1.7.8/actionlint_1.7.8_linux_amd64.tar.gz
          tar -xzf "$archive" -C "$install_dir" actionlint
          echo "$install_dir" >> "$GITHUB_PATH"

      - name: Workflow lint
        if: ${{ !github.event.pull_request.draft }}
        run: actionlint -color

      - name: Validate Bicep templates
        if: ${{ !github.event.pull_request.draft }}
        run: node platform/scripts/dev/validate-bicep-templates.mjs

      - name: Audit retired references
        if: ${{ !github.event.pull_request.draft }}
        run: node platform/scripts/dev/audit-legacy-references.mjs

  guard_mainline:
    name: Guard Mainline
    if: ${{ github.event_name == 'merge_group' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
      contents: read
    steps:
      - name: Require latest mainline promotion to be green
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/20-mainline-promotion.yml/runs?branch=main&event=push&status=completed&per_page=1"
          response_file="$(mktemp)"
          status_code="$(curl -sSL -o "$response_file" -w '%{http_code}' \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            "$api")"

          if [ "$status_code" = '404' ]; then
            echo 'No previous mainline promotion found; allowing commit stage.'
            exit 0
          fi

          if [ "$status_code" != '200' ]; then
            cat "$response_file" >&2
            exit 1
          fi

          count="$(jq '.total_count' "$response_file")"
          if [ "$count" = '0' ]; then
            echo 'No previous mainline promotion found; allowing commit stage.'
            exit 0
          fi

          conclusion="$(jq -r '.workflow_runs[0].conclusion' "$response_file")"
          html_url="$(jq -r '.workflow_runs[0].html_url' "$response_file")"

          if [ "$conclusion" != 'success' ]; then
            echo "Latest mainline promotion is ${conclusion}. Fix main before merging more changes." >&2
            echo "See: ${html_url}" >&2
            exit 1
          fi

  prepare:
    name: Prepare Candidate
    if: ${{ github.event_name == 'merge_group' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      candidate_id: ${{ steps.candidate.outputs.candidate_id }}
      source_revision: ${{ steps.source.outputs.source_revision }}
    steps:
      - name: Compute candidate id
        id: candidate
        run: echo "candidate_id=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Record source revision
        id: source
        run: echo "source_revision=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify
    if: ${{ github.event_name == 'merge_group' }}
    needs:
      - guard_mainline
      - prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Install actionlint
        run: |
          set -euo pipefail
          install_dir="$RUNNER_TEMP/actionlint-bin"
          archive="$RUNNER_TEMP/actionlint_1.7.8_linux_amd64.tar.gz"
          mkdir -p "$install_dir"
          curl --fail --retry 5 --retry-all-errors --retry-delay 2 --location \
            --output "$archive" \
            https://github.com/rhysd/actionlint/releases/download/v1.7.8/actionlint_1.7.8_linux_amd64.tar.gz
          tar -xzf "$archive" -C "$install_dir" actionlint
          echo "$install_dir" >> "$GITHUB_PATH"

      - name: Run commit checks
        run: pnpm check:commit

      - name: Run pipeline checks
        run: pnpm check:pipeline

      - name: Workflow lint
        run: actionlint -color

  build_candidate:
    name: Build Candidate / ${{ matrix.image.id }}
    if: ${{ github.event_name == 'merge_group' }}
    needs:
      - guard_mainline
      - prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    env:
      DOCKER_BUILD_RECORD_UPLOAD: "false"
    strategy:
      fail-fast: false
      matrix:
        image:
          - id: api
            dockerfile: apps/api/Dockerfile
            image_name: compass-api
          - id: web
            dockerfile: apps/web/Dockerfile
            image_name: compass-web
          - id: migrations
            dockerfile: packages/database/Dockerfile.migrations
            image_name: compass-migrations
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image.id }} image
        id: build_image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY_BASE }}/${{ matrix.image.image_name }}:${{ needs.prepare.outputs.candidate_id }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.prepare.outputs.source_revision }}
          cache-from: type=gha,scope=build-${{ matrix.image.id }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.image.id }}
          provenance: true
          sbom: true

      - name: Record digest artifact
        run: |
          mkdir -p .artifacts/image-digests
          printf '%s' '${{ steps.build_image.outputs.digest }}' > .artifacts/image-digests/${{ matrix.image.id }}.digest

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-digest-${{ matrix.image.id }}
          path: .artifacts/image-digests/${{ matrix.image.id }}.digest
          if-no-files-found: error
          retention-days: 1

  publish_candidate:
    name: Publish Candidate
    if: ${{ github.event_name == 'merge_group' }}
    needs:
      - prepare
      - verify
      - build_candidate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Setup ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digest artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: image-digest-*
          path: .artifacts/image-digests
          merge-multiple: true

      - name: Capture canonical image refs
        id: refs
        run: |
          set -euo pipefail
          api_digest="$(cat .artifacts/image-digests/api.digest)"
          web_digest="$(cat .artifacts/image-digests/web.digest)"
          migrations_digest="$(cat .artifacts/image-digests/migrations.digest)"
          {
            echo "api_image_ref=${REGISTRY_BASE}/${API_IMAGE_NAME}@${api_digest}"
            echo "web_image_ref=${REGISTRY_BASE}/${WEB_IMAGE_NAME}@${web_digest}"
            echo "migrations_image_ref=${REGISTRY_BASE}/${MIGRATIONS_IMAGE_NAME}@${migrations_digest}"
          } >> "$GITHUB_OUTPUT"

      - name: Publish release unit
        id: release_unit
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${RELEASE_UNITS_REPO}:${{ needs.prepare.outputs.candidate_id }}" \
            "${{ steps.refs.outputs.api_image_ref }}" \
            "${{ steps.refs.outputs.web_image_ref }}" \
            "${{ steps.refs.outputs.migrations_image_ref }}"
          release_unit_digest="$(oras manifest fetch --descriptor "${RELEASE_UNITS_REPO}:${{ needs.prepare.outputs.candidate_id }}" | jq -r '.digest')"
          echo "release_unit_digest=${release_unit_digest}" >> "$GITHUB_OUTPUT"

      - name: Generate release candidate manifest
        run: |
          pnpm --filter @compass/pipeline-tools run manifest:generate -- \
            --out "$RUNNER_TEMP/release-candidate.json" \
            --repository "${{ github.repository }}" \
            --source-revision "${{ needs.prepare.outputs.source_revision }}" \
            --api-image "${{ steps.refs.outputs.api_image_ref }}" \
            --web-image "${{ steps.refs.outputs.web_image_ref }}" \
            --migrations-artifact "${{ steps.refs.outputs.migrations_image_ref }}" \
            --registry "${{ env.REGISTRY_BASE }}" \
            --commit-stage-run-id "${{ github.run_id }}" \
            --release-unit-digest "${{ steps.release_unit.outputs.release_unit_digest }}"

      - name: Validate release candidate manifest
        run: pnpm --filter @compass/pipeline-tools run manifest:validate:runtime --file "$RUNNER_TEMP/release-candidate.json"

      - name: Publish release candidate manifest
        run: |
          cp "$RUNNER_TEMP/release-candidate.json" manifest.json
          oras push --artifact-type application/vnd.compass.release-manifest.v1+json \
            "${MANIFESTS_REPO}:${{ needs.prepare.outputs.candidate_id }}" \
            manifest.json:application/vnd.compass.release-manifest.v1+json

  commit_stage:
    name: Commit Stage
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs:
      - preflight
      - guard_mainline
      - prepare
      - verify
      - build_candidate
      - publish_candidate
    steps:
      - name: Assert expected path succeeded
        env:
          EVENT_NAME: ${{ github.event_name }}
          PREFLIGHT: ${{ needs.preflight.result }}
          GUARD_MAINLINE: ${{ needs.guard_mainline.result }}
          PREPARE: ${{ needs.prepare.result }}
          VERIFY: ${{ needs.verify.result }}
          BUILD_CANDIDATE: ${{ needs.build_candidate.result }}
          PUBLISH_CANDIDATE: ${{ needs.publish_candidate.result }}
        run: |
          set -euo pipefail

          assert_success() {
            local name="$1"
            local result="$2"
            if [ "$result" != 'success' ]; then
              echo "${name} finished with ${result}" >&2
              exit 1
            fi
          }

          if [ "$EVENT_NAME" = 'pull_request' ]; then
            assert_success preflight "$PREFLIGHT"
            exit 0
          fi

          assert_success guard_mainline "$GUARD_MAINLINE"
          assert_success prepare "$PREPARE"
          assert_success verify "$VERIFY"
          assert_success build_candidate "$BUILD_CANDIDATE"
          assert_success publish_candidate "$PUBLISH_CANDIDATE"

      - name: Write commit summary
        run: |
          {
            echo "## Commit Stage"
            if [ "${{ github.event_name }}" = 'pull_request' ]; then
              echo "- Mode: PR preflight"
            else
              echo "- Mode: merge_group authoritative commit stage"
              echo "- Candidate: ${{ needs.prepare.outputs.candidate_id }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
