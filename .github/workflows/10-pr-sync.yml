name: PR Sync
run-name: ${{ format('PR Sync / PR {0}', github.event.pull_request.number) }}

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: pr-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  in-sync:
    name: In Sync
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Check branch is in sync with main
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor origin/main HEAD; then
            echo "Branch is behind origin/main. Rebase before merge." >&2
            exit 1
          fi
