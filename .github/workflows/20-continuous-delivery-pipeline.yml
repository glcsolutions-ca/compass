name: Continuous Delivery Pipeline
run-name: ${{ format('CDP / {0}', github.sha) }}

on:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: read

env:
  REGISTRY_BASE: ghcr.io/glcsolutions-ca
  API_IMAGE_NAME: compass-api
  WEB_IMAGE_NAME: compass-web
  MANIFESTS_REPO: ghcr.io/glcsolutions-ca/compass-release-manifests
  RELEASE_UNITS_REPO: ghcr.io/glcsolutions-ca/compass-release-units
  CANDIDATE_ID: sha-${{ github.sha }}
  SOURCE_REVISION: ${{ github.sha }}
  COMMIT_STAGE_BUDGET_MINUTES: "5"
  ACCEPTANCE_STAGE_BUDGET_MINUTES: "5"
  RELEASE_STAGE_BUDGET_MINUTES: "10"
  TOTAL_LEAD_TIME_BUDGET_MINUTES: "15"

jobs:
  commit-stage-static-analysis:
    name: Commit Stage / Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.SOURCE_REVISION }}
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run static analysis
        run: pnpm verify:static

  commit-stage-unit-tests:
    name: Commit Stage / Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.SOURCE_REVISION }}
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run unit tests
        run: pnpm verify:unit

  commit-stage-integration-tests:
    name: Commit Stage / API Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.SOURCE_REVISION }}
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run integration tests
        run: pnpm verify:integration

  commit-stage-build-candidate:
    name: Commit Stage / Build Candidate / ${{ matrix.image.id }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    env:
      DOCKER_BUILD_RECORD_UPLOAD: "false"
    strategy:
      matrix:
        image:
          - id: api
            dockerfile: apps/api/Dockerfile
            image_name: compass-api
          - id: web
            dockerfile: apps/web/Dockerfile
            image_name: compass-web
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.SOURCE_REVISION }}
          persist-credentials: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image.id }} image
        id: build_image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY_BASE }}/${{ matrix.image.image_name }}:${{ env.CANDIDATE_ID }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ env.SOURCE_REVISION }}
          cache-from: type=gha,scope=build-${{ matrix.image.id }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.image.id }}
          provenance: true
          sbom: true

      - name: Record digest artifact
        run: |
          mkdir -p artifacts/image-digests
          printf '%s' '${{ steps.build_image.outputs.digest }}' > artifacts/image-digests/${{ matrix.image.id }}.digest

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: image-digest-${{ matrix.image.id }}
          path: artifacts/image-digests/${{ matrix.image.id }}.digest
          if-no-files-found: error
          retention-days: 1

  commit-stage-prepare-manifest:
    name: Commit Stage / Prepare Candidate Manifest
    needs:
      - commit-stage-build-candidate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.SOURCE_REVISION }}
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Download digest artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: image-digest-*
          path: artifacts/image-digests
          merge-multiple: true

      - name: Capture canonical image refs
        id: refs
        run: |
          set -euo pipefail
          api_digest="$(cat artifacts/image-digests/api.digest)"
          web_digest="$(cat artifacts/image-digests/web.digest)"
          {
            echo "api_image_ref=${REGISTRY_BASE}/${API_IMAGE_NAME}@${api_digest}"
            echo "web_image_ref=${REGISTRY_BASE}/${WEB_IMAGE_NAME}@${web_digest}"
          } >> "$GITHUB_OUTPUT"

      - name: Generate canonical release candidate manifest
        run: |
          pnpm --filter @compass/pipeline-tools run manifest:generate -- \
            --out "$RUNNER_TEMP/release-candidate.json" \
            --repository "${{ github.repository }}" \
            --source-revision "${{ env.SOURCE_REVISION }}" \
            --api-image "${{ steps.refs.outputs.api_image_ref }}" \
            --web-image "${{ steps.refs.outputs.web_image_ref }}" \
            --registry "${{ env.REGISTRY_BASE }}" \
            --commit-stage-run-id "${{ github.run_id }}"

      - name: Validate canonical release candidate manifest
        run: pnpm --filter @compass/pipeline-tools run manifest:validate:runtime --file "$RUNNER_TEMP/release-candidate.json"

      - name: Upload canonical manifest artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-candidate-manifest
          path: ${{ runner.temp }}/release-candidate.json
          if-no-files-found: error
          retention-days: 1

  commit-stage-smoke-candidate:
    name: Commit Stage / Smoke Candidate / API Runtime
    needs:
      - commit-stage-prepare-manifest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.SOURCE_REVISION }}
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download canonical manifest artifact
        uses: actions/download-artifact@v8
        with:
          name: release-candidate-manifest
          path: ${{ runner.temp }}

      - name: Run API runtime smoke
        run: |
          node platform/pipeline/stages/01-commit-stage/scripts/run-candidate-smoke.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --diagnostics-dir "$RUNNER_TEMP/commit-smoke-diagnostics"

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: commit-stage-smoke-artifacts
          path: ${{ runner.temp }}/commit-smoke-diagnostics
          if-no-files-found: warn
          retention-days: 7

  commit-stage-publish-candidate:
    name: Commit Stage / Publish Candidate
    needs:
      - commit-stage-static-analysis
      - commit-stage-unit-tests
      - commit-stage-integration-tests
      - commit-stage-prepare-manifest
      - commit-stage-smoke-candidate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Setup ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digest artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: image-digest-*
          path: artifacts/image-digests
          merge-multiple: true

      - name: Download canonical manifest artifact
        uses: actions/download-artifact@v8
        with:
          name: release-candidate-manifest
          path: ${{ runner.temp }}

      - name: Capture canonical image refs
        id: refs
        run: |
          set -euo pipefail
          api_digest="$(cat artifacts/image-digests/api.digest)"
          web_digest="$(cat artifacts/image-digests/web.digest)"
          {
            echo "api_image_ref=${REGISTRY_BASE}/${API_IMAGE_NAME}@${api_digest}"
            echo "web_image_ref=${REGISTRY_BASE}/${WEB_IMAGE_NAME}@${web_digest}"
          } >> "$GITHUB_OUTPUT"

      - name: Publish release unit
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${RELEASE_UNITS_REPO}:${{ env.CANDIDATE_ID }}" \
            "${{ steps.refs.outputs.api_image_ref }}" \
            "${{ steps.refs.outputs.web_image_ref }}"

      - name: Publish canonical release candidate manifest
        run: |
          cp "$RUNNER_TEMP/release-candidate.json" manifest.json
          oras push --artifact-type application/vnd.compass.release-manifest.v1+json \
            "${MANIFESTS_REPO}:${{ env.CANDIDATE_ID }}" \
            manifest.json:application/vnd.compass.release-manifest.v1+json

  commit-stage:
    name: Commit Stage
    if: always()
    runs-on: ubuntu-latest
    needs:
      - commit-stage-static-analysis
      - commit-stage-unit-tests
      - commit-stage-integration-tests
      - commit-stage-build-candidate
      - commit-stage-prepare-manifest
      - commit-stage-smoke-candidate
      - commit-stage-publish-candidate
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.SOURCE_REVISION }}
          persist-credentials: false

      - name: Assert expected path succeeded
        env:
          STATIC_ANALYSIS: ${{ needs.commit-stage-static-analysis.result }}
          UNIT_TESTS: ${{ needs.commit-stage-unit-tests.result }}
          INTEGRATION_TESTS: ${{ needs.commit-stage-integration-tests.result }}
          BUILD_CANDIDATE: ${{ needs.commit-stage-build-candidate.result }}
          PREPARE_MANIFEST: ${{ needs.commit-stage-prepare-manifest.result }}
          SMOKE_CANDIDATE: ${{ needs.commit-stage-smoke-candidate.result }}
          PUBLISH_CANDIDATE: ${{ needs.commit-stage-publish-candidate.result }}
        run: |
          set -euo pipefail

          assert_success() {
            local name="$1"
            local result="$2"
            if [ "$result" != "success" ]; then
              echo "${name} finished with ${result}" >&2
              exit 1
            fi
          }

          assert_success static-analysis "$STATIC_ANALYSIS"
          assert_success unit-tests "$UNIT_TESTS"
          assert_success integration-tests "$INTEGRATION_TESTS"
          assert_success build-candidate "$BUILD_CANDIDATE"
          assert_success prepare-manifest "$PREPARE_MANIFEST"
          assert_success smoke-candidate "$SMOKE_CANDIDATE"
          assert_success publish-candidate "$PUBLISH_CANDIDATE"

      - name: Write commit summary
        if: always()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STATIC_ANALYSIS: ${{ needs.commit-stage-static-analysis.result }}
          UNIT_TESTS: ${{ needs.commit-stage-unit-tests.result }}
          INTEGRATION_TESTS: ${{ needs.commit-stage-integration-tests.result }}
          BUILD_CANDIDATE: ${{ needs.commit-stage-build-candidate.result }}
          PREPARE_MANIFEST: ${{ needs.commit-stage-prepare-manifest.result }}
          SMOKE_CANDIDATE: ${{ needs.commit-stage-smoke-candidate.result }}
          PUBLISH_CANDIDATE: ${{ needs.commit-stage-publish-candidate.result }}
        run: |
          line_stop=false
          for result in \
            "$STATIC_ANALYSIS" \
            "$UNIT_TESTS" \
            "$INTEGRATION_TESTS" \
            "$BUILD_CANDIDATE" \
            "$PREPARE_MANIFEST" \
            "$SMOKE_CANDIDATE" \
            "$PUBLISH_CANDIDATE"; do
            if [ "$result" != "success" ]; then
              line_stop=true
            fi
          done

          node platform/pipeline/shared/scripts/write-run-timing-summary.mjs \
            --repo "${{ github.repository }}" \
            --run-id "${{ github.run_id }}" \
            --headline "Commit Stage Timing" \
            --commit-budget-minutes "${COMMIT_STAGE_BUDGET_MINUTES}" \
            --acceptance-budget-minutes "${ACCEPTANCE_STAGE_BUDGET_MINUTES}" \
            --release-budget-minutes "${RELEASE_STAGE_BUDGET_MINUTES}" \
            --total-budget-minutes "${TOTAL_LEAD_TIME_BUDGET_MINUTES}" \
            --line-stop "$line_stop"

          {
            echo ""
            echo "## Commit Stage"
            echo "- Candidate: ${{ env.CANDIDATE_ID }}"
            echo "- Source revision: ${{ env.SOURCE_REVISION }}"
          } >> "$GITHUB_STEP_SUMMARY"

  acceptance-stage-api:
    name: Acceptance Stage / API
    needs:
      - commit-stage-static-analysis
      - commit-stage-unit-tests
      - commit-stage-integration-tests
      - commit-stage-smoke-candidate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.SOURCE_REVISION }}
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download canonical manifest artifact
        uses: actions/download-artifact@v4
        with:
          name: release-candidate-manifest
          path: ${{ runner.temp }}

      - name: Run API acceptance
        run: |
          node platform/pipeline/stages/02-acceptance-stage/scripts/run-acceptance-from-candidate.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --diagnostics-dir "$RUNNER_TEMP/acceptance-api-diagnostics" \
            --suite api

      - name: Upload API acceptance artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: acceptance-stage-api-artifacts
          path: ${{ runner.temp }}/acceptance-api-diagnostics
          if-no-files-found: warn
          retention-days: 7

  acceptance-stage-web:
    name: Acceptance Stage / Web
    needs:
      - commit-stage-static-analysis
      - commit-stage-unit-tests
      - commit-stage-integration-tests
      - commit-stage-smoke-candidate
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.SOURCE_REVISION }}
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download canonical manifest artifact
        uses: actions/download-artifact@v4
        with:
          name: release-candidate-manifest
          path: ${{ runner.temp }}

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Web acceptance
        run: |
          node platform/pipeline/stages/02-acceptance-stage/scripts/run-acceptance-from-candidate.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --diagnostics-dir "$RUNNER_TEMP/acceptance-web-diagnostics" \
            --suite web

      - name: Upload Web acceptance artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: acceptance-stage-web-artifacts
          path: ${{ runner.temp }}/acceptance-web-diagnostics
          if-no-files-found: warn
          retention-days: 7

  acceptance-stage:
    name: Acceptance Stage
    if: always()
    needs:
      - commit-stage-publish-candidate
      - acceptance-stage-api
      - acceptance-stage-web
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PUBLISH_CANDIDATE: ${{ needs.commit-stage-publish-candidate.result }}
      API_ACCEPTANCE: ${{ needs.acceptance-stage-api.result }}
      WEB_ACCEPTANCE: ${{ needs.acceptance-stage-web.result }}
    steps:
      - name: Checkout summary scripts
        if: always()
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.SOURCE_REVISION }}
          persist-credentials: false

      - name: Assert expected path succeeded
        run: |
          set -euo pipefail
          if [ "$PUBLISH_CANDIDATE" != "success" ]; then
            echo "commit-stage-publish-candidate finished with $PUBLISH_CANDIDATE" >&2
            exit 1
          fi
          if [ "$API_ACCEPTANCE" != "success" ]; then
            echo "acceptance-stage-api finished with $API_ACCEPTANCE" >&2
            exit 1
          fi
          if [ "$WEB_ACCEPTANCE" != "success" ]; then
            echo "acceptance-stage-web finished with $WEB_ACCEPTANCE" >&2
            exit 1
          fi

      - name: Write acceptance summary
        if: always()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          line_stop=false
          if [ "$API_ACCEPTANCE" != "success" ] || [ "$WEB_ACCEPTANCE" != "success" ]; then
            line_stop=true
          fi

          node platform/pipeline/shared/scripts/write-run-timing-summary.mjs \
            --repo "${{ github.repository }}" \
            --run-id "${{ github.run_id }}" \
            --headline "Acceptance Stage Timing" \
            --commit-budget-minutes "${COMMIT_STAGE_BUDGET_MINUTES}" \
            --acceptance-budget-minutes "${ACCEPTANCE_STAGE_BUDGET_MINUTES}" \
            --release-budget-minutes "${RELEASE_STAGE_BUDGET_MINUTES}" \
            --total-budget-minutes "${TOTAL_LEAD_TIME_BUDGET_MINUTES}" \
            --line-stop "$line_stop"

  release-stage-prepare-deployment:
    name: Release Stage / Prepare Deployment
    needs:
      - acceptance-stage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      resource_group: ${{ steps.config.outputs.resource_group }}
      api_prod_app_name: ${{ steps.config.outputs.api_prod_app_name }}
      web_prod_app_name: ${{ steps.config.outputs.web_prod_app_name }}
      api_stage_app_name: ${{ steps.config.outputs.api_stage_app_name }}
      web_stage_app_name: ${{ steps.config.outputs.web_stage_app_name }}
      migrate_job_name: ${{ steps.config.outputs.migrate_job_name }}
      production_web_base_url: ${{ steps.config.outputs.production_web_base_url }}
      api_stage_base_url: ${{ steps.runtime.outputs.api_stage_base_url }}
      web_stage_base_url: ${{ steps.runtime.outputs.web_stage_base_url }}
      prod_api_base_url: ${{ steps.runtime.outputs.prod_api_base_url }}
    permissions:
      contents: read
      packages: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.SOURCE_REVISION }}
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Setup ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch release candidate manifest
        run: |
          node platform/pipeline/shared/scripts/fetch-release-candidate.mjs \
            --candidate-id "${{ env.CANDIDATE_ID }}" \
            --registry-repo "${MANIFESTS_REPO}" \
            --out "$RUNNER_TEMP/release-candidate.json"

      - name: Resolve delivery config
        id: config
        env:
          AZURE_DEPLOY_CLIENT_ID: ${{ vars.AZURE_DEPLOY_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
          DEPLOYMENT_STAMP: ${{ vars.DEPLOYMENT_STAMP }}
          PRODUCTION_WEB_BASE_URL: ${{ vars.PRODUCTION_WEB_BASE_URL }}
          AUTH_MODE: ${{ vars.AUTH_MODE }}
          ENTRA_WEB_CLIENT_ID: ${{ vars.ENTRA_WEB_CLIENT_ID }}
          ENTRA_ALLOWED_TENANT_IDS: ${{ vars.ENTRA_ALLOWED_TENANT_IDS }}
        run: |
          json="$(node platform/pipeline/stages/03-release-stage/scripts/prepare-deployment-context.mjs)"
          {
            echo "resource_group=$(printf '%s' "$json" | jq -r '.resourceGroup')"
            echo "api_prod_app_name=$(printf '%s' "$json" | jq -r '.apiProdAppName')"
            echo "web_prod_app_name=$(printf '%s' "$json" | jq -r '.webProdAppName')"
            echo "api_stage_app_name=$(printf '%s' "$json" | jq -r '.apiStageAppName')"
            echo "web_stage_app_name=$(printf '%s' "$json" | jq -r '.webStageAppName')"
            echo "migrate_job_name=$(printf '%s' "$json" | jq -r '.migrateJobName')"
            echo "production_web_base_url=$(printf '%s' "$json" | jq -r '.productionWebBaseUrl')"
          } >> "$GITHUB_OUTPUT"

      - name: Azure login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve runtime context
        id: runtime
        run: |
          json="$(node platform/pipeline/stages/03-release-stage/scripts/resolve-runtime-context.mjs \
            --resource-group "${{ steps.config.outputs.resource_group }}" \
            --api-stage-app-name "${{ steps.config.outputs.api_stage_app_name }}" \
            --web-stage-app-name "${{ steps.config.outputs.web_stage_app_name }}" \
            --api-prod-app-name "${{ steps.config.outputs.api_prod_app_name }}")"
          {
            echo "api_stage_base_url=$(printf '%s' "$json" | jq -r '.apiStageBaseUrl')"
            echo "web_stage_base_url=$(printf '%s' "$json" | jq -r '.webStageBaseUrl')"
            echo "prod_api_base_url=$(printf '%s' "$json" | jq -r '.prodApiBaseUrl')"
          } >> "$GITHUB_OUTPUT"

  release-stage-deploy-stage:
    name: Release Stage / Deploy Stage
    needs:
      - release-stage-prepare-deployment
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: continuous-delivery-stage
      cancel-in-progress: false
    environment:
      name: stage
    permissions:
      contents: read
      packages: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.SOURCE_REVISION }}
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Setup ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch release candidate manifest
        run: |
          node platform/pipeline/shared/scripts/fetch-release-candidate.mjs \
            --candidate-id "${{ env.CANDIDATE_ID }}" \
            --registry-repo "${MANIFESTS_REPO}" \
            --out "$RUNNER_TEMP/release-candidate.json"

      - name: Deploy stage apps from candidate
        run: |
          set -euo pipefail

          node platform/pipeline/stages/03-release-stage/scripts/deploy-stage-app-from-candidate.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --resource-group "${{ needs.release-stage-prepare-deployment.outputs.resource_group }}" \
            --app api \
            --app-name "${{ needs.release-stage-prepare-deployment.outputs.api_stage_app_name }}" \
            --stage-api-base-url "${{ needs.release-stage-prepare-deployment.outputs.api_stage_base_url }}" \
            --stage-web-base-url "${{ needs.release-stage-prepare-deployment.outputs.web_stage_base_url }}" &
          api_pid=$!

          node platform/pipeline/stages/03-release-stage/scripts/deploy-stage-app-from-candidate.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --resource-group "${{ needs.release-stage-prepare-deployment.outputs.resource_group }}" \
            --app web \
            --app-name "${{ needs.release-stage-prepare-deployment.outputs.web_stage_app_name }}" \
            --stage-api-base-url "${{ needs.release-stage-prepare-deployment.outputs.api_stage_base_url }}" \
            --stage-web-base-url "${{ needs.release-stage-prepare-deployment.outputs.web_stage_base_url }}" &
          web_pid=$!

          wait "$api_pid"
          wait "$web_pid"

  release-stage-smoke-stage-read-only:
    name: Release Stage / Pre-Migration Stage Smoke
    needs:
      - release-stage-prepare-deployment
      - release-stage-deploy-stage
    runs-on: ubuntu-latest
    concurrency:
      group: continuous-delivery-stage
      cancel-in-progress: false
    environment:
      name: stage
    outputs:
      verdict: ${{ steps.smoke.outputs.verdict }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Stage read-only smoke
        id: smoke
        run: |
          node platform/pipeline/stages/03-release-stage/scripts/run-stage-smoke.mjs \
            --api-base-url "${{ needs.release-stage-prepare-deployment.outputs.api_stage_base_url }}" \
            --web-base-url "${{ needs.release-stage-prepare-deployment.outputs.web_stage_base_url }}" \
            --include-auth false
          echo "verdict=pass" >> "$GITHUB_OUTPUT"

  release-stage-run-migrations:
    name: Release Stage / Run Production Migrations
    needs:
      - release-stage-prepare-deployment
      - release-stage-smoke-stage-read-only
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: continuous-delivery-stage
      cancel-in-progress: false
    environment:
      name: production
    permissions:
      contents: read
      packages: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.SOURCE_REVISION }}
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Setup ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch release candidate manifest
        run: |
          node platform/pipeline/shared/scripts/fetch-release-candidate.mjs \
            --candidate-id "${{ env.CANDIDATE_ID }}" \
            --registry-repo "${MANIFESTS_REPO}" \
            --out "$RUNNER_TEMP/release-candidate.json"

      - name: Run production migrations
        run: |
          node platform/pipeline/stages/03-release-stage/scripts/run-production-migrations.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --resource-group "${{ needs.release-stage-prepare-deployment.outputs.resource_group }}" \
            --job-name "${{ needs.release-stage-prepare-deployment.outputs.migrate_job_name }}"

  release-stage-smoke-stage-auth:
    name: Release Stage / Post-Migration Stage Smoke
    needs:
      - release-stage-prepare-deployment
      - release-stage-run-migrations
    runs-on: ubuntu-latest
    concurrency:
      group: continuous-delivery-stage
      cancel-in-progress: false
    environment:
      name: stage
    outputs:
      verdict: ${{ steps.smoke.outputs.verdict }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Stage auth smoke
        id: smoke
        run: |
          node platform/pipeline/stages/03-release-stage/scripts/run-stage-smoke.mjs \
            --api-base-url "${{ needs.release-stage-prepare-deployment.outputs.api_stage_base_url }}" \
            --web-base-url "${{ needs.release-stage-prepare-deployment.outputs.web_stage_base_url }}" \
            --include-auth true
          echo "verdict=pass" >> "$GITHUB_OUTPUT"

  release-stage-deploy-production:
    name: Release Stage / Deploy Production
    needs:
      - release-stage-prepare-deployment
      - release-stage-smoke-stage-auth
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: continuous-delivery-production
      cancel-in-progress: false
    permissions:
      contents: read
      packages: read
      id-token: write
    environment:
      name: production
      url: ${{ needs.release-stage-prepare-deployment.outputs.production_web_base_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.SOURCE_REVISION }}
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Setup ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch release candidate manifest
        run: |
          node platform/pipeline/shared/scripts/fetch-release-candidate.mjs \
            --candidate-id "${{ env.CANDIDATE_ID }}" \
            --registry-repo "${MANIFESTS_REPO}" \
            --out "$RUNNER_TEMP/release-candidate.json"

      - name: Deploy production apps from candidate
        run: |
          set -euo pipefail

          node platform/pipeline/stages/03-release-stage/scripts/deploy-prod-app-from-candidate.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --resource-group "${{ needs.release-stage-prepare-deployment.outputs.resource_group }}" \
            --app api \
            --app-name "${{ needs.release-stage-prepare-deployment.outputs.api_prod_app_name }}" \
            --prod-api-base-url "${{ needs.release-stage-prepare-deployment.outputs.prod_api_base_url }}" \
            --prod-web-base-url "${{ needs.release-stage-prepare-deployment.outputs.production_web_base_url }}" &
          api_pid=$!

          node platform/pipeline/stages/03-release-stage/scripts/deploy-prod-app-from-candidate.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --resource-group "${{ needs.release-stage-prepare-deployment.outputs.resource_group }}" \
            --app web \
            --app-name "${{ needs.release-stage-prepare-deployment.outputs.web_prod_app_name }}" \
            --prod-api-base-url "${{ needs.release-stage-prepare-deployment.outputs.prod_api_base_url }}" \
            --prod-web-base-url "${{ needs.release-stage-prepare-deployment.outputs.production_web_base_url }}" &
          web_pid=$!

          wait "$api_pid"
          wait "$web_pid"

  release-stage-smoke-production:
    name: Release Stage / Smoke Production
    needs:
      - release-stage-prepare-deployment
      - release-stage-deploy-production
    runs-on: ubuntu-latest
    concurrency:
      group: continuous-delivery-production
      cancel-in-progress: false
    environment:
      name: production
      url: ${{ needs.release-stage-prepare-deployment.outputs.production_web_base_url }}
    outputs:
      verdict: ${{ steps.smoke.outputs.verdict }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Production smoke
        id: smoke
        run: |
          node platform/pipeline/stages/03-release-stage/scripts/run-production-smoke.mjs \
            --web-base-url "${{ needs.release-stage-prepare-deployment.outputs.production_web_base_url }}"
          echo "verdict=pass" >> "$GITHUB_OUTPUT"

  release-stage:
    name: Release Stage
    if: always()
    runs-on: ubuntu-latest
    needs:
      - release-stage-prepare-deployment
      - release-stage-deploy-stage
      - release-stage-smoke-stage-read-only
      - release-stage-run-migrations
      - release-stage-smoke-stage-auth
      - release-stage-deploy-production
      - release-stage-smoke-production
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.SOURCE_REVISION }}
          persist-credentials: false

      - name: Assert expected path succeeded
        env:
          PREPARE_DEPLOYMENT: ${{ needs.release-stage-prepare-deployment.result }}
          DEPLOY_STAGE: ${{ needs.release-stage-deploy-stage.result }}
          PRE_MIGRATION_STAGE_SMOKE: ${{ needs.release-stage-smoke-stage-read-only.result }}
          RUN_PRODUCTION_MIGRATIONS: ${{ needs.release-stage-run-migrations.result }}
          POST_MIGRATION_STAGE_SMOKE: ${{ needs.release-stage-smoke-stage-auth.result }}
          DEPLOY_PRODUCTION: ${{ needs.release-stage-deploy-production.result }}
          SMOKE_PRODUCTION: ${{ needs.release-stage-smoke-production.result }}
        run: |
          set -euo pipefail

          assert_success() {
            local name="$1"
            local result="$2"
            if [ "$result" != "success" ]; then
              echo "${name} finished with ${result}" >&2
              exit 1
            fi
          }

          assert_success prepare-deployment "$PREPARE_DEPLOYMENT"
          assert_success deploy-stage "$DEPLOY_STAGE"
          assert_success pre-migration-stage-smoke "$PRE_MIGRATION_STAGE_SMOKE"
          assert_success run-production-migrations "$RUN_PRODUCTION_MIGRATIONS"
          assert_success post-migration-stage-smoke "$POST_MIGRATION_STAGE_SMOKE"
          assert_success deploy-production "$DEPLOY_PRODUCTION"
          assert_success smoke-production "$SMOKE_PRODUCTION"

      - name: Write release summary
        if: always()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREPARE_DEPLOYMENT: ${{ needs.release-stage-prepare-deployment.result }}
          DEPLOY_STAGE: ${{ needs.release-stage-deploy-stage.result }}
          PRE_MIGRATION_STAGE_SMOKE: ${{ needs.release-stage-smoke-stage-read-only.result }}
          RUN_PRODUCTION_MIGRATIONS: ${{ needs.release-stage-run-migrations.result }}
          POST_MIGRATION_STAGE_SMOKE: ${{ needs.release-stage-smoke-stage-auth.result }}
          DEPLOY_PRODUCTION: ${{ needs.release-stage-deploy-production.result }}
          SMOKE_PRODUCTION: ${{ needs.release-stage-smoke-production.result }}
        run: |
          line_stop=false
          for result in \
            "$PREPARE_DEPLOYMENT" \
            "$DEPLOY_STAGE" \
            "$PRE_MIGRATION_STAGE_SMOKE" \
            "$RUN_PRODUCTION_MIGRATIONS" \
            "$POST_MIGRATION_STAGE_SMOKE" \
            "$DEPLOY_PRODUCTION" \
            "$SMOKE_PRODUCTION"; do
            if [ "$result" != "success" ]; then
              line_stop=true
            fi
          done

          node platform/pipeline/shared/scripts/write-run-timing-summary.mjs \
            --repo "${{ github.repository }}" \
            --run-id "${{ github.run_id }}" \
            --headline "Release Stage Timing" \
            --commit-budget-minutes "${COMMIT_STAGE_BUDGET_MINUTES}" \
            --acceptance-budget-minutes "${ACCEPTANCE_STAGE_BUDGET_MINUTES}" \
            --release-budget-minutes "${RELEASE_STAGE_BUDGET_MINUTES}" \
            --total-budget-minutes "${TOTAL_LEAD_TIME_BUDGET_MINUTES}" \
            --line-stop "$line_stop"

          {
            echo ""
            echo "## Release Stage"
            echo "- Candidate: ${{ env.CANDIDATE_ID }}"
            echo "- Stage targets: ${{ needs.release-stage-prepare-deployment.outputs.api_stage_app_name }}, ${{ needs.release-stage-prepare-deployment.outputs.web_stage_app_name }}"
            echo "- Production targets: ${{ needs.release-stage-prepare-deployment.outputs.api_prod_app_name }}, ${{ needs.release-stage-prepare-deployment.outputs.web_prod_app_name }}"
            echo "- Post-migration stage smoke verdict: ${{ needs.release-stage-smoke-stage-auth.outputs.verdict }}"
            echo "- Production smoke verdict: ${{ needs.release-stage-smoke-production.outputs.verdict }}"
          } >> "$GITHUB_STEP_SUMMARY"
