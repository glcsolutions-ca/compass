            --job-name "$JOB"

  release-stage-smoke-stage-auth:
    name: Release Stage / Smoke Stage Auth
    needs:
      - release-stage-verify-acceptance
      - release-stage-run-migrations
    runs-on: ubuntu-latest
    concurrency:
      group: continuous-delivery-stage
      cancel-in-progress: false
    environment:
      name: stage
    outputs:
      verdict: ${{ steps.smoke.outputs.verdict }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Stage auth smoke
        id: smoke
        run: |
          node platform/pipeline/stages/03-release-stage/scripts/run-stage-smoke.mjs \
            --api-base-url "${{ needs.release-stage-verify-acceptance.outputs.api_stage_base_url }}" \
            --web-base-url "${{ needs.release-stage-verify-acceptance.outputs.web_stage_base_url }}" \
            --include-auth true
          echo "verdict=pass" >> "$GITHUB_OUTPUT"

  release-stage-deploy-production:
    name: Release Stage / Deploy Production
    needs:
      - prepare-candidate
      - release-stage-verify-acceptance
      - release-stage-smoke-stage-auth
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: continuous-delivery-production
      cancel-in-progress: false
    permissions:
      contents: read
      packages: read
      id-token: write
    environment:
      name: production
      url: ${{ vars.PRODUCTION_WEB_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare-candidate.outputs.source_revision }}
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Setup ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch release candidate manifest
        run: |
          pnpm --filter @compass/pipeline-tools run manifest:fetch -- \
            --candidate-id "${{ needs.prepare-candidate.outputs.candidate_id }}" \
            --registry-repo "${MANIFESTS_REPO}" \
            --out "$RUNNER_TEMP/release-candidate.json"

      - name: Deploy production apps from candidate
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          API_PROD_APP_NAME: ${{ vars.ACA_API_PROD_APP_NAME }}
          WEB_PROD_APP_NAME: ${{ vars.ACA_WEB_PROD_APP_NAME }}
        run: |
          set -euo pipefail

          node platform/pipeline/stages/03-release-stage/scripts/deploy-prod-app-from-candidate.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --resource-group "$RG" \
            --app api \
            --app-name "$API_PROD_APP_NAME" \
            --prod-api-base-url "${{ needs.release-stage-verify-acceptance.outputs.prod_api_base_url }}" \
            --prod-web-base-url "${{ vars.PRODUCTION_WEB_BASE_URL }}" &
          api_pid=$!

          node platform/pipeline/stages/03-release-stage/scripts/deploy-prod-app-from-candidate.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --resource-group "$RG" \
            --app web \
            --app-name "$WEB_PROD_APP_NAME" \
            --prod-api-base-url "${{ needs.release-stage-verify-acceptance.outputs.prod_api_base_url }}" \
            --prod-web-base-url "${{ vars.PRODUCTION_WEB_BASE_URL }}" &
          web_pid=$!

          wait "$api_pid"
          wait "$web_pid"

  release-stage-smoke-production:
    name: Release Stage / Smoke Production
    needs:
      - release-stage-deploy-production
    runs-on: ubuntu-latest
    concurrency:
      group: continuous-delivery-production
      cancel-in-progress: false
    environment:
      name: production
      url: ${{ vars.PRODUCTION_WEB_BASE_URL }}
    outputs:
      verdict: ${{ steps.smoke.outputs.verdict }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Production smoke
        id: smoke
        run: |
          node platform/pipeline/stages/03-release-stage/scripts/run-production-smoke.mjs \
            --web-base-url "${{ vars.PRODUCTION_WEB_BASE_URL }}"
          echo "verdict=pass" >> "$GITHUB_OUTPUT"

  release-stage-record-evidence:
    name: Release Stage / Record Evidence
    needs:
      - prepare-candidate
      - acceptance-stage
      - release-stage-verify-acceptance
      - release-stage-smoke-stage-auth
      - release-stage-deploy-production
      - release-stage-smoke-production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: ${{ vars.PRODUCTION_WEB_BASE_URL }}
    permissions:
      contents: read
      packages: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare-candidate.outputs.source_revision }}
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Setup ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch release candidate manifest
        run: |
          pnpm --filter @compass/pipeline-tools run manifest:fetch -- \
            --candidate-id "${{ needs.prepare-candidate.outputs.candidate_id }}" \
            --registry-repo "${MANIFESTS_REPO}" \
            --out "$RUNNER_TEMP/release-candidate.json"

      - name: Record release evidence
        run: |
          mkdir -p artifacts/release
          node platform/pipeline/stages/03-release-stage/scripts/record-release-evidence.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --stage-api-base-url "${{ needs.release-stage-verify-acceptance.outputs.api_stage_base_url }}" \
            --stage-web-base-url "${{ needs.release-stage-verify-acceptance.outputs.web_stage_base_url }}" \
            --stage-smoke-verdict "${{ needs.release-stage-smoke-stage-auth.outputs.verdict }}" \
            --production-web-base-url "${{ vars.PRODUCTION_WEB_BASE_URL }}" \
            --production-smoke-verdict "${{ needs.release-stage-smoke-production.outputs.verdict }}" \
            --out artifacts/release/release-evidence.json

      - name: Generate release attestation predicate
        run: |
          predicate_path="${GITHUB_WORKSPACE}/artifacts/attestations/release-predicate.json"
          mkdir -p "$(dirname "$predicate_path")"
          pnpm --filter @compass/pipeline-tools run release:predicate:generate -- \
            --out "$predicate_path" \
            --candidate-id "${{ needs.prepare-candidate.outputs.candidate_id }}" \
            --source-revision "${{ needs.prepare-candidate.outputs.source_revision }}" \
            --verdict pass \
            --workflow-run-id "${{ github.run_id }}" \
            --released-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --deployment-ref "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --api-image "$(jq -r '.artifacts.apiImage' "$RUNNER_TEMP/release-candidate.json")" \
            --web-image "$(jq -r '.artifacts.webImage' "$RUNNER_TEMP/release-candidate.json")" \
            --stage-api-base-url "${{ needs.release-stage-verify-acceptance.outputs.api_stage_base_url }}" \
            --stage-web-base-url "${{ needs.release-stage-verify-acceptance.outputs.web_stage_base_url }}" \
            --stage-smoke-verdict "${{ needs.release-stage-smoke-stage-auth.outputs.verdict }}" \
            --production-web-base-url "${{ vars.PRODUCTION_WEB_BASE_URL }}" \
            --production-smoke-verdict "${{ needs.release-stage-smoke-production.outputs.verdict }}"

      - name: Attest release verdict to candidate subject
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.RELEASE_UNITS_REPO }}
          subject-digest: ${{ needs.release-stage-verify-acceptance.outputs.release_unit_digest }}
          predicate-type: ${{ env.RELEASE_PREDICATE_TYPE }}
          predicate-path: ${{ github.workspace }}/artifacts/attestations/release-predicate.json

      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-stage-artifacts
          path: |
            artifacts/release
            artifacts/attestations/release-predicate.json
          if-no-files-found: warn
          retention-days: 7

  release-stage:
    name: Release Stage
    if: always()
    runs-on: ubuntu-latest
    needs:
      - prepare-candidate
      - release-stage-verify-acceptance
      - release-stage-deploy-stage
      - release-stage-smoke-stage-read-only
      - release-stage-run-migrations
      - release-stage-smoke-stage-auth
      - release-stage-deploy-production
      - release-stage-smoke-production
      - release-stage-record-evidence
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare-candidate.outputs.source_revision }}
          persist-credentials: false

      - name: Assert expected path succeeded
        env:
          PREPARE_CANDIDATE: ${{ needs.prepare-candidate.result }}
          VERIFY_ACCEPTANCE: ${{ needs.release-stage-verify-acceptance.result }}
          DEPLOY_STAGE: ${{ needs.release-stage-deploy-stage.result }}
          SMOKE_STAGE_READ_ONLY: ${{ needs.release-stage-smoke-stage-read-only.result }}
          RUN_MIGRATIONS: ${{ needs.release-stage-run-migrations.result }}
          SMOKE_STAGE_AUTH: ${{ needs.release-stage-smoke-stage-auth.result }}
          DEPLOY_PRODUCTION: ${{ needs.release-stage-deploy-production.result }}
          SMOKE_PRODUCTION: ${{ needs.release-stage-smoke-production.result }}
          RECORD_EVIDENCE: ${{ needs.release-stage-record-evidence.result }}
        run: |
          set -euo pipefail

          assert_success() {
            local name="$1"
            local result="$2"
            if [ "$result" != "success" ]; then
              echo "${name} finished with ${result}" >&2
              exit 1
            fi
          }

          assert_success prepare-candidate "$PREPARE_CANDIDATE"
          assert_success verify-acceptance "$VERIFY_ACCEPTANCE"
          assert_success deploy-stage "$DEPLOY_STAGE"
          assert_success smoke-stage-read-only "$SMOKE_STAGE_READ_ONLY"
          assert_success run-migrations "$RUN_MIGRATIONS"
          assert_success smoke-stage-auth "$SMOKE_STAGE_AUTH"
          assert_success deploy-production "$DEPLOY_PRODUCTION"
          assert_success smoke-production "$SMOKE_PRODUCTION"
          assert_success record-evidence "$RECORD_EVIDENCE"

      - name: Write release summary
        if: always()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREPARE_CANDIDATE: ${{ needs.prepare-candidate.result }}
          VERIFY_ACCEPTANCE: ${{ needs.release-stage-verify-acceptance.result }}
          DEPLOY_STAGE: ${{ needs.release-stage-deploy-stage.result }}
          SMOKE_STAGE_READ_ONLY: ${{ needs.release-stage-smoke-stage-read-only.result }}
          RUN_MIGRATIONS: ${{ needs.release-stage-run-migrations.result }}
          SMOKE_STAGE_AUTH: ${{ needs.release-stage-smoke-stage-auth.result }}
          DEPLOY_PRODUCTION: ${{ needs.release-stage-deploy-production.result }}
          SMOKE_PRODUCTION: ${{ needs.release-stage-smoke-production.result }}
          RECORD_EVIDENCE: ${{ needs.release-stage-record-evidence.result }}
        run: |
          line_stop=false
          for result in \
            "$PREPARE_CANDIDATE" \
            "$VERIFY_ACCEPTANCE" \
            "$DEPLOY_STAGE" \
            "$SMOKE_STAGE_READ_ONLY" \
            "$RUN_MIGRATIONS" \
            "$SMOKE_STAGE_AUTH" \
            "$DEPLOY_PRODUCTION" \
            "$SMOKE_PRODUCTION" \
            "$RECORD_EVIDENCE"; do
            if [ "$result" != "success" ]; then
              line_stop=true
            fi
          done

          node platform/pipeline/shared/scripts/write-run-timing-summary.mjs \
            --repo "${{ github.repository }}" \
            --run-id "${{ github.run_id }}" \
            --headline "Release Stage Timing" \
            --commit-budget-minutes "${COMMIT_STAGE_BUDGET_MINUTES}" \
            --acceptance-budget-minutes "${ACCEPTANCE_STAGE_BUDGET_MINUTES}" \
            --release-budget-minutes "${RELEASE_STAGE_BUDGET_MINUTES}" \
            --total-budget-minutes "${TOTAL_LEAD_TIME_BUDGET_MINUTES}" \
            --line-stop "$line_stop"

          {
            echo ""
            echo "## Release Stage"
            echo "- Candidate: ${{ needs.prepare-candidate.outputs.candidate_id }}"
            echo "- Stage smoke verdict: ${{ needs.release-stage-smoke-stage-auth.outputs.verdict }}"
            echo "- Production smoke verdict: ${{ needs.release-stage-smoke-production.outputs.verdict }}"
          } >> "$GITHUB_STEP_SUMMARY"
