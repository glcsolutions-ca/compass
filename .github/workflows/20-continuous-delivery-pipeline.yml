name: Continuous Delivery Pipeline
run-name: ${{ format('CDP / {0}', github.sha) }}

on:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: read

env:
  REGISTRY_BASE: ghcr.io/glcsolutions-ca
  API_IMAGE_NAME: compass-api
  WEB_IMAGE_NAME: compass-web
  MANIFESTS_REPO: ghcr.io/glcsolutions-ca/compass-release-manifests
  RELEASE_UNITS_REPO: ghcr.io/glcsolutions-ca/compass-release-units
  ACCEPTANCE_PREDICATE_TYPE: https://compass.glcsolutions.ca/pipeline/attestations/acceptance/v1
  RELEASE_PREDICATE_TYPE: https://compass.glcsolutions.ca/pipeline/attestations/release/v2
  COMMIT_STAGE_BUDGET_MINUTES: "5"
  ACCEPTANCE_STAGE_BUDGET_MINUTES: "5"
  RELEASE_STAGE_BUDGET_MINUTES: "10"
  TOTAL_LEAD_TIME_BUDGET_MINUTES: "15"

jobs:
  prepare-candidate:
    name: Prepare Candidate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      candidate_id: ${{ steps.candidate.outputs.candidate_id }}
      source_revision: ${{ steps.source.outputs.source_revision }}
    steps:
      - name: Compute candidate id
        id: candidate
        run: echo "candidate_id=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Record source revision
        id: source
        run: echo "source_revision=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  commit-stage-static-analysis:
    name: Commit Stage / Static Analysis
    needs:
      - prepare-candidate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare-candidate.outputs.source_revision }}
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run static analysis
        run: pnpm verify:static

  commit-stage-unit-tests:
    name: Commit Stage / Unit Tests
    needs:
      - prepare-candidate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare-candidate.outputs.source_revision }}
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run unit tests
        run: pnpm verify:unit

  commit-stage-integration-tests:
    name: Commit Stage / Integration Tests
    needs:
      - prepare-candidate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare-candidate.outputs.source_revision }}
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run integration tests
        run: pnpm verify:integration

  commit-stage-build-candidate:
    name: Commit Stage / Build Candidate / ${{ matrix.image.id }}
    needs:
      - prepare-candidate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    env:
      DOCKER_BUILD_RECORD_UPLOAD: "false"
    strategy:
      matrix:
        image:
          - id: api
            dockerfile: apps/api/Dockerfile
            image_name: compass-api
          - id: web
            dockerfile: apps/web/Dockerfile
            image_name: compass-web
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare-candidate.outputs.source_revision }}
          persist-credentials: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image.id }} image
        id: build_image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY_BASE }}/${{ matrix.image.image_name }}:${{ needs.prepare-candidate.outputs.candidate_id }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.prepare-candidate.outputs.source_revision }}
          cache-from: type=gha,scope=build-${{ matrix.image.id }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.image.id }}
          provenance: true
          sbom: true

      - name: Record digest artifact
        run: |
          mkdir -p artifacts/image-digests
          printf '%s' '${{ steps.build_image.outputs.digest }}' > artifacts/image-digests/${{ matrix.image.id }}.digest

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-digest-${{ matrix.image.id }}
          path: artifacts/image-digests/${{ matrix.image.id }}.digest
          if-no-files-found: error
          retention-days: 1

  commit-stage-prepare-manifest:
    name: Commit Stage / Prepare Candidate Manifest
    needs:
      - prepare-candidate
      - commit-stage-build-candidate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare-candidate.outputs.source_revision }}
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Download digest artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: image-digest-*
          path: artifacts/image-digests
          merge-multiple: true

      - name: Capture canonical image refs
        id: refs
        run: |
          set -euo pipefail
          api_digest="$(cat artifacts/image-digests/api.digest)"
          web_digest="$(cat artifacts/image-digests/web.digest)"
          {
            echo "api_image_ref=${REGISTRY_BASE}/${API_IMAGE_NAME}@${api_digest}"
            echo "web_image_ref=${REGISTRY_BASE}/${WEB_IMAGE_NAME}@${web_digest}"
          } >> "$GITHUB_OUTPUT"

      - name: Generate canonical release candidate manifest
        run: |
          pnpm --filter @compass/pipeline-tools run manifest:generate -- \
            --out "$RUNNER_TEMP/release-candidate.json" \
            --repository "${{ github.repository }}" \
            --source-revision "${{ needs.prepare-candidate.outputs.source_revision }}" \
            --api-image "${{ steps.refs.outputs.api_image_ref }}" \
            --web-image "${{ steps.refs.outputs.web_image_ref }}" \
            --registry "${{ env.REGISTRY_BASE }}" \
            --commit-stage-run-id "${{ github.run_id }}"

      - name: Validate canonical release candidate manifest
        run: pnpm --filter @compass/pipeline-tools run manifest:validate:runtime --file "$RUNNER_TEMP/release-candidate.json"

      - name: Upload canonical manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-manifest
          path: ${{ runner.temp }}/release-candidate.json
          if-no-files-found: error
          retention-days: 1

  commit-stage-smoke-candidate:
    name: Commit Stage / Smoke Candidate
    needs:
      - prepare-candidate
      - commit-stage-prepare-manifest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare-candidate.outputs.source_revision }}
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download canonical manifest artifact
        uses: actions/download-artifact@v8
        with:
          name: release-candidate-manifest
          path: ${{ runner.temp }}

      - name: Run candidate smoke
        run: |
          node platform/pipeline/stages/01-commit-stage/scripts/run-candidate-smoke.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --diagnostics-dir "$RUNNER_TEMP/commit-smoke-diagnostics"

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: commit-stage-smoke-artifacts
          path: ${{ runner.temp }}/commit-smoke-diagnostics
          if-no-files-found: warn
          retention-days: 7

  commit-stage-publish-candidate:
    name: Commit Stage / Publish Candidate
    needs:
      - prepare-candidate
      - commit-stage-static-analysis
      - commit-stage-unit-tests
      - commit-stage-integration-tests
      - commit-stage-prepare-manifest
      - commit-stage-smoke-candidate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare-candidate.outputs.source_revision }}
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Setup ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digest artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: image-digest-*
          path: artifacts/image-digests
          merge-multiple: true

      - name: Download canonical manifest artifact
        uses: actions/download-artifact@v8
        with:
          name: release-candidate-manifest
          path: ${{ runner.temp }}

      - name: Capture canonical image refs
        id: refs
        run: |
          set -euo pipefail
          api_digest="$(cat artifacts/image-digests/api.digest)"
          web_digest="$(cat artifacts/image-digests/web.digest)"
          {
            echo "api_image_ref=${REGISTRY_BASE}/${API_IMAGE_NAME}@${api_digest}"
            echo "web_image_ref=${REGISTRY_BASE}/${WEB_IMAGE_NAME}@${web_digest}"
          } >> "$GITHUB_OUTPUT"

      - name: Publish release unit
        id: release_unit
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${RELEASE_UNITS_REPO}:${{ needs.prepare-candidate.outputs.candidate_id }}" \
            "${{ steps.refs.outputs.api_image_ref }}" \
            "${{ steps.refs.outputs.web_image_ref }}"
          release_unit_digest="$(oras manifest fetch --descriptor "${RELEASE_UNITS_REPO}:${{ needs.prepare-candidate.outputs.candidate_id }}" | jq -r '.digest')"
          echo "release_unit_digest=${release_unit_digest}" >> "$GITHUB_OUTPUT"

      - name: Validate canonical release candidate manifest
        run: pnpm --filter @compass/pipeline-tools run manifest:validate:runtime --file "$RUNNER_TEMP/release-candidate.json"

      - name: Publish canonical release candidate manifest
        run: |
          cp "$RUNNER_TEMP/release-candidate.json" manifest.json
          oras push --artifact-type application/vnd.compass.release-manifest.v1+json \
            "${MANIFESTS_REPO}:${{ needs.prepare-candidate.outputs.candidate_id }}" \
            manifest.json:application/vnd.compass.release-manifest.v1+json

  commit-stage:
    name: Commit Stage
    if: always()
    runs-on: ubuntu-latest
    needs:
      - prepare-candidate
      - commit-stage-static-analysis
      - commit-stage-unit-tests
      - commit-stage-integration-tests
      - commit-stage-build-candidate
      - commit-stage-prepare-manifest
      - commit-stage-smoke-candidate
      - commit-stage-publish-candidate
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare-candidate.outputs.source_revision }}
          persist-credentials: false

      - name: Assert expected path succeeded
        env:
          PREPARE_CANDIDATE: ${{ needs.prepare-candidate.result }}
          STATIC_ANALYSIS: ${{ needs.commit-stage-static-analysis.result }}
          UNIT_TESTS: ${{ needs.commit-stage-unit-tests.result }}
          INTEGRATION_TESTS: ${{ needs.commit-stage-integration-tests.result }}
          BUILD_CANDIDATE: ${{ needs.commit-stage-build-candidate.result }}
          PREPARE_MANIFEST: ${{ needs.commit-stage-prepare-manifest.result }}
          SMOKE_CANDIDATE: ${{ needs.commit-stage-smoke-candidate.result }}
          PUBLISH_CANDIDATE: ${{ needs.commit-stage-publish-candidate.result }}
        run: |
          set -euo pipefail

          assert_success() {
            local name="$1"
            local result="$2"
            if [ "$result" != "success" ]; then
              echo "${name} finished with ${result}" >&2
              exit 1
            fi
          }

          assert_success prepare-candidate "$PREPARE_CANDIDATE"
          assert_success static-analysis "$STATIC_ANALYSIS"
          assert_success unit-tests "$UNIT_TESTS"
          assert_success integration-tests "$INTEGRATION_TESTS"
          assert_success build-candidate "$BUILD_CANDIDATE"
          assert_success prepare-manifest "$PREPARE_MANIFEST"
          assert_success smoke-candidate "$SMOKE_CANDIDATE"
          assert_success publish-candidate "$PUBLISH_CANDIDATE"

      - name: Write commit summary
        if: always()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREPARE_CANDIDATE: ${{ needs.prepare-candidate.result }}
          STATIC_ANALYSIS: ${{ needs.commit-stage-static-analysis.result }}
          UNIT_TESTS: ${{ needs.commit-stage-unit-tests.result }}
          INTEGRATION_TESTS: ${{ needs.commit-stage-integration-tests.result }}
          BUILD_CANDIDATE: ${{ needs.commit-stage-build-candidate.result }}
          PREPARE_MANIFEST: ${{ needs.commit-stage-prepare-manifest.result }}
          SMOKE_CANDIDATE: ${{ needs.commit-stage-smoke-candidate.result }}
          PUBLISH_CANDIDATE: ${{ needs.commit-stage-publish-candidate.result }}
        run: |
          line_stop=false
          for result in \
            "$PREPARE_CANDIDATE" \
            "$STATIC_ANALYSIS" \
            "$UNIT_TESTS" \
            "$INTEGRATION_TESTS" \
            "$BUILD_CANDIDATE" \
            "$PREPARE_MANIFEST" \
            "$SMOKE_CANDIDATE" \
            "$PUBLISH_CANDIDATE"; do
            if [ "$result" != "success" ]; then
              line_stop=true
            fi
          done

          node platform/pipeline/shared/scripts/write-run-timing-summary.mjs \
            --repo "${{ github.repository }}" \
            --run-id "${{ github.run_id }}" \
            --headline "Commit Stage Timing" \
            --commit-budget-minutes "${COMMIT_STAGE_BUDGET_MINUTES}" \
            --acceptance-budget-minutes "${ACCEPTANCE_STAGE_BUDGET_MINUTES}" \
            --release-budget-minutes "${RELEASE_STAGE_BUDGET_MINUTES}" \
            --total-budget-minutes "${TOTAL_LEAD_TIME_BUDGET_MINUTES}" \
            --line-stop "$line_stop"

          {
            echo ""
            echo "## Commit Stage"
            echo "- Candidate: ${{ needs.prepare-candidate.outputs.candidate_id }}"
            echo "- Source revision: ${{ needs.prepare-candidate.outputs.source_revision }}"
          } >> "$GITHUB_STEP_SUMMARY"

  acceptance-stage-api:
    name: Acceptance Stage / API
    needs:
      - prepare-candidate
      - commit-stage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare-candidate.outputs.source_revision }}
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Setup ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release candidate manifest
        run: |
          pnpm --filter @compass/pipeline-tools run manifest:fetch -- \
            --candidate-id "${{ needs.prepare-candidate.outputs.candidate_id }}" \
            --registry-repo "${MANIFESTS_REPO}" \
            --out "$RUNNER_TEMP/release-candidate.json"
          pnpm --filter @compass/pipeline-tools run manifest:validate:runtime --file "$RUNNER_TEMP/release-candidate.json"

      - name: Run API acceptance
        run: |
          node platform/pipeline/stages/02-acceptance-stage/scripts/run-acceptance-from-candidate.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --diagnostics-dir "$RUNNER_TEMP/acceptance-api-diagnostics" \
            --suite api

      - name: Upload API acceptance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-stage-api-artifacts
          path: ${{ runner.temp }}/acceptance-api-diagnostics
          if-no-files-found: warn
          retention-days: 7

  acceptance-stage-web:
    name: Acceptance Stage / Web
    needs:
      - prepare-candidate
      - commit-stage
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare-candidate.outputs.source_revision }}
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Setup ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release candidate manifest
        run: |
          pnpm --filter @compass/pipeline-tools run manifest:fetch -- \
            --candidate-id "${{ needs.prepare-candidate.outputs.candidate_id }}" \
            --registry-repo "${MANIFESTS_REPO}" \
            --out "$RUNNER_TEMP/release-candidate.json"
          pnpm --filter @compass/pipeline-tools run manifest:validate:runtime --file "$RUNNER_TEMP/release-candidate.json"

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Web acceptance
        run: |
          node platform/pipeline/stages/02-acceptance-stage/scripts/run-acceptance-from-candidate.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --diagnostics-dir "$RUNNER_TEMP/acceptance-web-diagnostics" \
            --suite web

      - name: Upload Web acceptance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-stage-web-artifacts
          path: ${{ runner.temp }}/acceptance-web-diagnostics
          if-no-files-found: warn
          retention-days: 7

  acceptance-stage:
    name: Acceptance Stage
    if: always()
    needs:
      - prepare-candidate
      - acceptance-stage-api
      - acceptance-stage-web
    runs-on: ubuntu-latest
    outputs:
      release_unit_digest: ${{ steps.resolve.outputs.release_unit_digest }}
    permissions:
      contents: read
      packages: read
      id-token: write
      attestations: write
    env:
      API_ACCEPTANCE: ${{ needs.acceptance-stage-api.result }}
      WEB_ACCEPTANCE: ${{ needs.acceptance-stage-web.result }}
    steps:
      - name: Checkout summary scripts
        if: always()
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare-candidate.outputs.source_revision }}
          persist-credentials: false

      - name: Assert expected path succeeded
        run: |
          set -euo pipefail
          if [ "$API_ACCEPTANCE" != "success" ]; then
            echo "acceptance-stage-api finished with $API_ACCEPTANCE" >&2
            exit 1
          fi
          if [ "$WEB_ACCEPTANCE" != "success" ]; then
            echo "acceptance-stage-web finished with $WEB_ACCEPTANCE" >&2
            exit 1
          fi

      - name: Checkout
        if: ${{ env.API_ACCEPTANCE == 'success' && env.WEB_ACCEPTANCE == 'success' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare-candidate.outputs.source_revision }}
          persist-credentials: false

      - name: Setup Node and pnpm
        if: ${{ env.API_ACCEPTANCE == 'success' && env.WEB_ACCEPTANCE == 'success' }}
        uses: ./.github/actions/setup-node-pnpm

      - name: Setup ORAS
        if: ${{ env.API_ACCEPTANCE == 'success' && env.WEB_ACCEPTANCE == 'success' }}
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

      - name: Login to GHCR
        if: ${{ env.API_ACCEPTANCE == 'success' && env.WEB_ACCEPTANCE == 'success' }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release candidate manifest
        if: ${{ env.API_ACCEPTANCE == 'success' && env.WEB_ACCEPTANCE == 'success' }}
        id: resolve
        run: |
          set -euo pipefail
          candidate_id="${{ needs.prepare-candidate.outputs.candidate_id }}"
          pnpm --filter @compass/pipeline-tools run manifest:fetch -- \
            --candidate-id "$candidate_id" \
            --registry-repo "${MANIFESTS_REPO}" \
            --out "$RUNNER_TEMP/release-candidate.json"
          pnpm --filter @compass/pipeline-tools run manifest:validate:runtime --file "$RUNNER_TEMP/release-candidate.json"
          release_unit_digest="$(oras manifest fetch --descriptor "${RELEASE_UNITS_REPO}:${candidate_id}" | jq -r '.digest')"
          echo "release_unit_digest=${release_unit_digest}" >> "$GITHUB_OUTPUT"

      - name: Generate acceptance attestation predicate
        if: ${{ env.API_ACCEPTANCE == 'success' && env.WEB_ACCEPTANCE == 'success' }}
        run: |
          predicate_path="${GITHUB_WORKSPACE}/artifacts/attestations/acceptance-predicate.json"
          mkdir -p "$(dirname "${predicate_path}")"
          pnpm --filter @compass/pipeline-tools run acceptance:predicate:generate -- \
            --out "${predicate_path}" \
            --candidate-id "${{ needs.prepare-candidate.outputs.candidate_id }}" \
            --source-revision "${{ needs.prepare-candidate.outputs.source_revision }}" \
            --verdict pass \
            --workflow-run-id "${{ github.run_id }}" \
            --tested-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --suite-summary 'api=pass web=pass'

      - name: Attest acceptance verdict to candidate subject
        if: ${{ env.API_ACCEPTANCE == 'success' && env.WEB_ACCEPTANCE == 'success' }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.RELEASE_UNITS_REPO }}
          subject-digest: ${{ steps.resolve.outputs.release_unit_digest }}
          predicate-type: ${{ env.ACCEPTANCE_PREDICATE_TYPE }}
          predicate-path: ${{ github.workspace }}/artifacts/attestations/acceptance-predicate.json

      - name: Upload acceptance predicate
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-stage-artifacts
          path: artifacts/attestations/acceptance-predicate.json
          if-no-files-found: warn
          retention-days: 7

      - name: Write acceptance summary
        if: always()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          line_stop=false
          if [ "$API_ACCEPTANCE" != "success" ] || [ "$WEB_ACCEPTANCE" != "success" ]; then
            line_stop=true
          fi

          node platform/pipeline/shared/scripts/write-run-timing-summary.mjs \
            --repo "${{ github.repository }}" \
            --run-id "${{ github.run_id }}" \
            --headline "Acceptance Stage Timing" \
            --commit-budget-minutes "${COMMIT_STAGE_BUDGET_MINUTES}" \
            --acceptance-budget-minutes "${ACCEPTANCE_STAGE_BUDGET_MINUTES}" \
            --release-budget-minutes "${RELEASE_STAGE_BUDGET_MINUTES}" \
            --total-budget-minutes "${TOTAL_LEAD_TIME_BUDGET_MINUTES}" \
            --line-stop "$line_stop"

  release-stage-verify-acceptance:
    name: Release Stage / Verify Acceptance
    needs:
      - prepare-candidate
      - acceptance-stage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: stage
    outputs:
      api_stage_base_url: ${{ steps.runtime.outputs.api_stage_base_url }}
      web_stage_base_url: ${{ steps.runtime.outputs.web_stage_base_url }}
      prod_api_base_url: ${{ steps.runtime.outputs.prod_api_base_url }}
      release_unit_digest: ${{ needs.acceptance-stage.outputs.release_unit_digest }}
    permissions:
      contents: read
      packages: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare-candidate.outputs.source_revision }}
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Setup ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch release candidate manifest
        run: |
          pnpm --filter @compass/pipeline-tools run manifest:fetch -- \
            --candidate-id "${{ needs.prepare-candidate.outputs.candidate_id }}" \
            --registry-repo "${MANIFESTS_REPO}" \
            --out "$RUNNER_TEMP/release-candidate.json"

      - name: Assert release environment config
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          ACA_API_PROD_APP_NAME: ${{ vars.ACA_API_PROD_APP_NAME }}
          ACA_WEB_PROD_APP_NAME: ${{ vars.ACA_WEB_PROD_APP_NAME }}
          ACA_API_STAGE_APP_NAME: ${{ vars.ACA_API_STAGE_APP_NAME }}
          ACA_WEB_STAGE_APP_NAME: ${{ vars.ACA_WEB_STAGE_APP_NAME }}
          ACA_MIGRATE_JOB_NAME: ${{ vars.ACA_MIGRATE_JOB_NAME }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          PRODUCTION_WEB_BASE_URL: ${{ vars.PRODUCTION_WEB_BASE_URL }}
          ENTRA_WEB_CLIENT_ID: ${{ vars.ENTRA_WEB_CLIENT_ID }}
        run: |
          pnpm --filter @compass/pipeline-tools run env:assert -- \
            --required AZURE_RESOURCE_GROUP \
            --required ACA_API_PROD_APP_NAME \
            --required ACA_WEB_PROD_APP_NAME \
            --required ACA_API_STAGE_APP_NAME \
            --required ACA_WEB_STAGE_APP_NAME \
            --required ACA_MIGRATE_JOB_NAME \
            --required AZURE_CLIENT_ID \
            --required AZURE_TENANT_ID \
            --required AZURE_SUBSCRIPTION_ID \
            --required PRODUCTION_WEB_BASE_URL \
            --required ENTRA_WEB_CLIENT_ID

      - name: Verify acceptance attestation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm --filter @compass/pipeline-tools run attest:verify -- \
            --candidate-id "${{ needs.prepare-candidate.outputs.candidate_id }}" \
            --source-revision "${{ needs.prepare-candidate.outputs.source_revision }}" \
            --predicate-type "${ACCEPTANCE_PREDICATE_TYPE}" \
            --repo "${{ github.repository }}" \
            --subject "${RELEASE_UNITS_REPO}@${{ needs.acceptance-stage.outputs.release_unit_digest }}"

      - name: Azure login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve runtime context
        id: runtime
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          API_PROD: ${{ vars.ACA_API_PROD_APP_NAME }}
          API_STAGE: ${{ vars.ACA_API_STAGE_APP_NAME }}
          WEB_STAGE: ${{ vars.ACA_WEB_STAGE_APP_NAME }}
        run: |
          json="$(node platform/pipeline/stages/03-release-stage/scripts/resolve-runtime-context.mjs \
            --resource-group "$RG" \
            --api-stage-app-name "$API_STAGE" \
            --web-stage-app-name "$WEB_STAGE" \
            --api-prod-app-name "$API_PROD")"
          {
            echo "api_stage_base_url=$(printf '%s' "$json" | jq -r '.apiStageBaseUrl')"
            echo "web_stage_base_url=$(printf '%s' "$json" | jq -r '.webStageBaseUrl')"
            echo "prod_api_base_url=$(printf '%s' "$json" | jq -r '.prodApiBaseUrl')"
          } >> "$GITHUB_OUTPUT"

  release-stage-deploy-stage:
    name: Release Stage / Deploy Stage
    needs:
      - prepare-candidate
      - release-stage-verify-acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: continuous-delivery-stage
      cancel-in-progress: false
    environment:
      name: stage
    permissions:
      contents: read
      packages: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare-candidate.outputs.source_revision }}
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Setup ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch release candidate manifest
        run: |
          pnpm --filter @compass/pipeline-tools run manifest:fetch -- \
            --candidate-id "${{ needs.prepare-candidate.outputs.candidate_id }}" \
            --registry-repo "${MANIFESTS_REPO}" \
            --out "$RUNNER_TEMP/release-candidate.json"

      - name: Deploy stage apps from candidate
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          API_STAGE_APP_NAME: ${{ vars.ACA_API_STAGE_APP_NAME }}
          WEB_STAGE_APP_NAME: ${{ vars.ACA_WEB_STAGE_APP_NAME }}
        run: |
          set -euo pipefail

          node platform/pipeline/stages/03-release-stage/scripts/deploy-stage-app-from-candidate.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --resource-group "$RG" \
            --app api \
            --app-name "$API_STAGE_APP_NAME" \
            --stage-api-base-url "${{ needs.release-stage-verify-acceptance.outputs.api_stage_base_url }}" \
            --stage-web-base-url "${{ needs.release-stage-verify-acceptance.outputs.web_stage_base_url }}" &
          api_pid=$!

          node platform/pipeline/stages/03-release-stage/scripts/deploy-stage-app-from-candidate.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --resource-group "$RG" \
            --app web \
            --app-name "$WEB_STAGE_APP_NAME" \
            --stage-api-base-url "${{ needs.release-stage-verify-acceptance.outputs.api_stage_base_url }}" \
            --stage-web-base-url "${{ needs.release-stage-verify-acceptance.outputs.web_stage_base_url }}" &
          web_pid=$!

          wait "$api_pid"
          wait "$web_pid"

  release-stage-smoke-stage-read-only:
    name: Release Stage / Smoke Stage Read Only
    needs:
      - release-stage-verify-acceptance
      - release-stage-deploy-stage
    runs-on: ubuntu-latest
    concurrency:
      group: continuous-delivery-stage
      cancel-in-progress: false
    environment:
      name: stage
    outputs:
      verdict: ${{ steps.smoke.outputs.verdict }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Stage read-only smoke
        id: smoke
        run: |
          node platform/pipeline/stages/03-release-stage/scripts/run-stage-smoke.mjs \
            --api-base-url "${{ needs.release-stage-verify-acceptance.outputs.api_stage_base_url }}" \
            --web-base-url "${{ needs.release-stage-verify-acceptance.outputs.web_stage_base_url }}" \
            --include-auth false
          echo "verdict=pass" >> "$GITHUB_OUTPUT"

  release-stage-run-migrations:
    name: Release Stage / Run Migrations
    needs:
      - prepare-candidate
      - release-stage-verify-acceptance
      - release-stage-smoke-stage-read-only
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: continuous-delivery-stage
      cancel-in-progress: false
    environment:
      name: stage
    permissions:
      contents: read
      packages: read
