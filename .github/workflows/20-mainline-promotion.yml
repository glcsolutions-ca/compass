name: Mainline Promotion
run-name: >-
  ${{ github.event_name == 'workflow_dispatch'
      && format('Mainline Promotion / Recovery {0}', inputs.candidate_id)
      || format('Mainline Promotion / {0}', github.sha) }}

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      candidate_id:
        description: Previously published candidate to redeploy
        required: true
        type: string

permissions:
  contents: read

env:
  MANIFESTS_REPO: ghcr.io/glcsolutions-ca/compass-release-manifests
  RELEASE_UNITS_REPO: ghcr.io/glcsolutions-ca/compass-release-units
  ACCEPTANCE_PREDICATE_TYPE: https://compass.glcsolutions.ca/pipeline/attestations/acceptance/v1
  RELEASE_PREDICATE_TYPE: https://compass.glcsolutions.ca/pipeline/attestations/release/v2

jobs:
  resolve_candidate:
    name: Resolve Candidate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
    outputs:
      candidate_id: ${{ steps.resolve.outputs.candidate_id }}
      source_revision: ${{ steps.resolve.outputs.source_revision }}
      release_unit_digest: ${{ steps.resolve.outputs.release_unit_digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Setup ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release candidate manifest
        id: resolve
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = 'workflow_dispatch' ]; then
            candidate_id='${{ inputs.candidate_id }}'
          else
            candidate_id="sha-${GITHUB_SHA}"
          fi

          pnpm --filter @compass/pipeline-tools run manifest:fetch -- \
            --candidate-id "$candidate_id" \
            --registry-repo "${MANIFESTS_REPO}" \
            --out "$RUNNER_TEMP/release-candidate.json"

          pnpm --filter @compass/pipeline-tools run manifest:validate:runtime --file "$RUNNER_TEMP/release-candidate.json"

          source_revision="$(jq -r '.source.revision' "$RUNNER_TEMP/release-candidate.json")"
          if [ "${{ github.event_name }}" = 'push' ] && [ "$source_revision" != "${GITHUB_SHA}" ]; then
            echo "Resolved candidate ${candidate_id} points at ${source_revision}, expected ${GITHUB_SHA}." >&2
            exit 1
          fi

          release_unit_digest="$(oras manifest fetch --descriptor "${RELEASE_UNITS_REPO}:${candidate_id}" | jq -r '.digest')"

          {
            echo "candidate_id=${candidate_id}"
            echo "source_revision=${source_revision}"
            echo "release_unit_digest=${release_unit_digest}"
          } >> "$GITHUB_OUTPUT"

  acceptance:
    name: Acceptance
    if: ${{ github.event_name == 'push' }}
    needs:
      - resolve_candidate
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: read
      id-token: write
      attestations: write
    outputs:
      duration_seconds: ${{ steps.stage_timing.outputs.duration_seconds }}
    steps:
      - name: Record stage start
        id: stage_start
        run: echo "epoch=$(date -u +%s)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Setup ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch release candidate manifest
        run: |
          pnpm --filter @compass/pipeline-tools run manifest:fetch -- \
            --candidate-id "${{ needs.resolve_candidate.outputs.candidate_id }}" \
            --registry-repo "${MANIFESTS_REPO}" \
            --out "$RUNNER_TEMP/release-candidate.json"

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run acceptance tests
        run: |
          node platform/pipeline/stages/02-acceptance/scripts/run-acceptance-from-candidate.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --diagnostics-dir "$RUNNER_TEMP/acceptance-diagnostics"

      - name: Generate acceptance attestation predicate
        run: |
          predicate_path="${GITHUB_WORKSPACE}/.artifacts/attestations/acceptance-predicate.json"
          mkdir -p "$(dirname "${predicate_path}")"
          pnpm --filter @compass/pipeline-tools run acceptance:predicate:generate -- \
            --out "${predicate_path}" \
            --candidate-id "${{ needs.resolve_candidate.outputs.candidate_id }}" \
            --source-revision "${{ needs.resolve_candidate.outputs.source_revision }}" \
            --verdict pass \
            --workflow-run-id "${{ github.run_id }}" \
            --tested-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --suite-summary 'system=pass browser=pass'

      - name: Attest acceptance verdict to candidate subject
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.RELEASE_UNITS_REPO }}
          subject-digest: ${{ needs.resolve_candidate.outputs.release_unit_digest }}
          predicate-type: ${{ env.ACCEPTANCE_PREDICATE_TYPE }}
          predicate-path: ${{ github.workspace }}/.artifacts/attestations/acceptance-predicate.json

      - name: Upload acceptance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-artifacts-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/acceptance-diagnostics
            .artifacts/attestations/acceptance-predicate.json
          if-no-files-found: warn
          retention-days: 7

      - name: Record acceptance stage elapsed time
        if: always()
        id: stage_timing
        run: |
          start_epoch='${{ steps.stage_start.outputs.epoch }}'
          end_epoch="$(date -u +%s)"
          echo "duration_seconds=$((end_epoch - start_epoch))" >> "$GITHUB_OUTPUT"

  release:
    name: Release
    if: >-
      ${{ (github.event_name == 'push' && needs.acceptance.result == 'success')
          || github.event_name == 'workflow_dispatch' }}
    needs:
      - resolve_candidate
      - acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 90
    concurrency:
      group: production-release
      cancel-in-progress: false
    permissions:
      actions: read
      contents: read
      packages: read
      id-token: write
      attestations: write
    outputs:
      duration_seconds: ${{ steps.stage_timing.outputs.duration_seconds }}
    environment:
      name: production
      url: ${{ vars.PRODUCTION_WEB_BASE_URL }}
    steps:
      - name: Record stage start
        id: stage_start
        run: echo "epoch=$(date -u +%s)" >> "$GITHUB_OUTPUT"

      - name: Wait for older mainline promotions
        if: ${{ github.event_name == 'push' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/20-mainline-promotion.yml/runs?branch=main&event=push&per_page=100"

          fetch_response() {
            local output_file="$1"
            local status_code
            status_code="$(curl -sSL -o "$output_file" -w '%{http_code}' \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H 'Accept: application/vnd.github+json' \
              "$api")"

            if [ "$status_code" = '404' ]; then
              echo '404'
              return 0
            fi

            if [ "$status_code" != '200' ]; then
              cat "$output_file" >&2
              exit 1
            fi

            echo '200'
          }

          for attempt in $(seq 1 90); do
            response_file="$(mktemp)"
            status_code="$(fetch_response "$response_file")"
            if [ "$status_code" = '404' ]; then
              echo 'No previous mainline promotions found; continuing.'
              exit 0
            fi

            older_running_count="$(jq --argjson current "${GITHUB_RUN_NUMBER}" '
              [.workflow_runs[]
               | select(.run_number < $current)
               | select(.status == "queued" or .status == "in_progress" or .status == "waiting" or .status == "requested" or .status == "pending")
              ] | length
            ' "$response_file")"

            if [ "$older_running_count" = '0' ]; then
              break
            fi

            echo "Waiting for ${older_running_count} older mainline promotions (attempt ${attempt}/90)."
            sleep 10
          done

          response_file="$(mktemp)"
          status_code="$(fetch_response "$response_file")"
          if [ "$status_code" = '404' ]; then
            echo 'No previous mainline promotions found; continuing.'
            exit 0
          fi

          older_running_count="$(jq --argjson current "${GITHUB_RUN_NUMBER}" '
            [.workflow_runs[]
             | select(.run_number < $current)
             | select(.status == "queued" or .status == "in_progress" or .status == "waiting" or .status == "requested" or .status == "pending")
            ] | length
          ' "$response_file")"

          if [ "$older_running_count" != '0' ]; then
            echo 'Timed out waiting for older mainline promotions.' >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Setup ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch release candidate manifest
        run: |
          pnpm --filter @compass/pipeline-tools run manifest:fetch -- \
            --candidate-id "${{ needs.resolve_candidate.outputs.candidate_id }}" \
            --registry-repo "${MANIFESTS_REPO}" \
            --out "$RUNNER_TEMP/release-candidate.json"

      - name: Assert production environment config
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          ACA_API_PROD_APP_NAME: ${{ vars.ACA_API_PROD_APP_NAME }}
          ACA_WEB_PROD_APP_NAME: ${{ vars.ACA_WEB_PROD_APP_NAME }}
          ACA_API_STAGE_APP_NAME: ${{ vars.ACA_API_STAGE_APP_NAME }}
          ACA_WEB_STAGE_APP_NAME: ${{ vars.ACA_WEB_STAGE_APP_NAME }}
          ACA_MIGRATE_JOB_NAME: ${{ vars.ACA_MIGRATE_JOB_NAME }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          PRODUCTION_WEB_BASE_URL: ${{ vars.PRODUCTION_WEB_BASE_URL }}
          ENTRA_WEB_CLIENT_ID: ${{ vars.ENTRA_WEB_CLIENT_ID }}
        run: |
          pnpm --filter @compass/pipeline-tools run env:assert -- \
            --required AZURE_RESOURCE_GROUP \
            --required ACA_API_PROD_APP_NAME \
            --required ACA_WEB_PROD_APP_NAME \
            --required ACA_API_STAGE_APP_NAME \
            --required ACA_WEB_STAGE_APP_NAME \
            --required ACA_MIGRATE_JOB_NAME \
            --required AZURE_CLIENT_ID \
            --required AZURE_TENANT_ID \
            --required AZURE_SUBSCRIPTION_ID \
            --required PRODUCTION_WEB_BASE_URL \
            --required ENTRA_WEB_CLIENT_ID

      - name: Azure login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Verify acceptance attestation
        if: ${{ github.event_name == 'push' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm --filter @compass/pipeline-tools run attest:verify -- \
            --candidate-id "${{ needs.resolve_candidate.outputs.candidate_id }}" \
            --source-revision "${{ needs.resolve_candidate.outputs.source_revision }}" \
            --predicate-type "${ACCEPTANCE_PREDICATE_TYPE}" \
            --repo "${{ github.repository }}" \
            --subject "${RELEASE_UNITS_REPO}@${{ needs.resolve_candidate.outputs.release_unit_digest }}"

      - name: Verify prior release attestation
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm --filter @compass/pipeline-tools run attest:verify -- \
            --candidate-id "${{ needs.resolve_candidate.outputs.candidate_id }}" \
            --source-revision "${{ needs.resolve_candidate.outputs.source_revision }}" \
            --predicate-type "${RELEASE_PREDICATE_TYPE}" \
            --repo "${{ github.repository }}" \
            --subject "${RELEASE_UNITS_REPO}@${{ needs.resolve_candidate.outputs.release_unit_digest }}"

      - name: Detect infra changes
        if: ${{ github.event_name == 'push' }}
        id: changed
        run: |
          json="$(node platform/scripts/infra/detect-changed-scopes.mjs --revision "${{ needs.resolve_candidate.outputs.source_revision }}")"
          echo "infra_changed=$(printf '%s' "$json" | jq -r '.infraChanged')" >> "$GITHUB_OUTPUT"

      - name: Resolve runtime context
        id: runtime
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          API_PROD: ${{ vars.ACA_API_PROD_APP_NAME }}
          API_STAGE: ${{ vars.ACA_API_STAGE_APP_NAME }}
          WEB_STAGE: ${{ vars.ACA_WEB_STAGE_APP_NAME }}
        run: |
          json="$(node platform/pipeline/stages/03-release/scripts/resolve-runtime-context.mjs \
            --resource-group "$RG" \
            --api-stage-app-name "$API_STAGE" \
            --web-stage-app-name "$WEB_STAGE" \
            --api-prod-app-name "$API_PROD")"
          {
            echo "api_stage_base_url=$(printf '%s' "$json" | jq -r '.apiStageBaseUrl')"
            echo "web_stage_base_url=$(printf '%s' "$json" | jq -r '.webStageBaseUrl')"
            echo "prod_api_base_url=$(printf '%s' "$json" | jq -r '.prodApiBaseUrl')"
          } >> "$GITHUB_OUTPUT"

      - name: Apply production Bicep when infra changed
        if: ${{ github.event_name == 'push' && steps.changed.outputs.infra_changed == 'true' }}
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          node platform/scripts/infra/apply-platform.mjs \
            --mode apply \
            --resource-group "$RG"

      - name: Deploy stage apps from candidate
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          API_STAGE: ${{ vars.ACA_API_STAGE_APP_NAME }}
          WEB_STAGE: ${{ vars.ACA_WEB_STAGE_APP_NAME }}
        run: |
          node platform/pipeline/stages/03-release/scripts/deploy-stage-from-candidate.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --resource-group "$RG" \
            --api-app-name "$API_STAGE" \
            --web-app-name "$WEB_STAGE" \
            --stage-api-base-url "${{ steps.runtime.outputs.api_stage_base_url }}" \
            --stage-web-base-url "${{ steps.runtime.outputs.web_stage_base_url }}"

      - name: Stage health smoke
        id: stage_health_smoke
        run: |
          node platform/pipeline/stages/03-release/scripts/run-stage-smoke.mjs \
            --api-base-url "${{ steps.runtime.outputs.api_stage_base_url }}" \
            --web-base-url "${{ steps.runtime.outputs.web_stage_base_url }}" \
            --include-auth false
          echo "verdict=pass" >> "$GITHUB_OUTPUT"

      - name: Run production migrations
        if: ${{ github.event_name == 'push' }}
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          JOB: ${{ vars.ACA_MIGRATE_JOB_NAME }}
        run: |
          node platform/pipeline/stages/03-release/scripts/run-production-migrations.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --resource-group "$RG" \
            --job-name "$JOB"

      - name: Stage auth smoke
        id: stage_smoke
        run: |
          node platform/pipeline/stages/03-release/scripts/run-stage-smoke.mjs \
            --api-base-url "${{ steps.runtime.outputs.api_stage_base_url }}" \
            --web-base-url "${{ steps.runtime.outputs.web_stage_base_url }}" \
            --include-auth true
          echo "verdict=pass" >> "$GITHUB_OUTPUT"

      - name: Deploy prod apps from candidate
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          API_PROD: ${{ vars.ACA_API_PROD_APP_NAME }}
          WEB_PROD: ${{ vars.ACA_WEB_PROD_APP_NAME }}
        run: |
          node platform/pipeline/stages/03-release/scripts/deploy-prod-from-candidate.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --resource-group "$RG" \
            --api-app-name "$API_PROD" \
            --web-app-name "$WEB_PROD" \
            --prod-api-base-url "${{ steps.runtime.outputs.prod_api_base_url }}" \
            --prod-web-base-url "${{ vars.PRODUCTION_WEB_BASE_URL }}"

      - name: Production smoke
        id: production_smoke
        run: |
          node platform/pipeline/stages/03-release/scripts/run-production-smoke.mjs \
            --web-base-url "${{ vars.PRODUCTION_WEB_BASE_URL }}"
          echo "verdict=pass" >> "$GITHUB_OUTPUT"

      - name: Record release evidence
        run: |
          mkdir -p .artifacts/release
          node platform/pipeline/stages/03-release/scripts/record-release-evidence.mjs \
            --manifest "$RUNNER_TEMP/release-candidate.json" \
            --stage-api-base-url "${{ steps.runtime.outputs.api_stage_base_url }}" \
            --stage-web-base-url "${{ steps.runtime.outputs.web_stage_base_url }}" \
            --stage-smoke-verdict "${{ steps.stage_smoke.outputs.verdict }}" \
            --production-web-base-url "${{ vars.PRODUCTION_WEB_BASE_URL }}" \
            --production-smoke-verdict "${{ steps.production_smoke.outputs.verdict }}" \
            --out .artifacts/release/release-evidence.json

      - name: Generate release attestation predicate
        run: |
          predicate_path="${GITHUB_WORKSPACE}/.artifacts/attestations/release-predicate.json"
          mkdir -p "$(dirname "$predicate_path")"
          pnpm --filter @compass/pipeline-tools run release:predicate:generate -- \
            --out "$predicate_path" \
            --candidate-id "${{ needs.resolve_candidate.outputs.candidate_id }}" \
            --source-revision "${{ needs.resolve_candidate.outputs.source_revision }}" \
            --verdict pass \
            --workflow-run-id "${{ github.run_id }}" \
            --released-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --deployment-ref "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --api-image "$(jq -r '.artifacts.apiImage' "$RUNNER_TEMP/release-candidate.json")" \
            --web-image "$(jq -r '.artifacts.webImage' "$RUNNER_TEMP/release-candidate.json")" \
            --stage-api-base-url "${{ steps.runtime.outputs.api_stage_base_url }}" \
            --stage-web-base-url "${{ steps.runtime.outputs.web_stage_base_url }}" \
            --stage-smoke-verdict "${{ steps.stage_smoke.outputs.verdict }}" \
            --production-web-base-url "${{ vars.PRODUCTION_WEB_BASE_URL }}" \
            --production-smoke-verdict "${{ steps.production_smoke.outputs.verdict }}"

      - name: Attest release verdict to candidate subject
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.RELEASE_UNITS_REPO }}
          subject-digest: ${{ needs.resolve_candidate.outputs.release_unit_digest }}
          predicate-type: ${{ env.RELEASE_PREDICATE_TYPE }}
          predicate-path: ${{ github.workspace }}/.artifacts/attestations/release-predicate.json

      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ github.run_id }}
          path: |
            .artifacts/release
            .artifacts/attestations/release-predicate.json
          if-no-files-found: warn
          retention-days: 7

      - name: Record release stage elapsed time
        if: always()
        id: stage_timing
        run: |
          start_epoch='${{ steps.stage_start.outputs.epoch }}'
          end_epoch="$(date -u +%s)"
          echo "duration_seconds=$((end_epoch - start_epoch))" >> "$GITHUB_OUTPUT"

  mainline_promotion:
    name: Mainline Promotion
    if: ${{ always() && github.event_name == 'push' }}
    runs-on: ubuntu-latest
    needs:
      - resolve_candidate
      - acceptance
      - release
    steps:
      - name: Assert mainline promotion succeeded
        env:
          RESOLVE_CANDIDATE: ${{ needs.resolve_candidate.result }}
          ACCEPTANCE: ${{ needs.acceptance.result }}
          RELEASE: ${{ needs.release.result }}
        run: |
          set -euo pipefail

          assert_success() {
            local name="$1"
            local result="$2"
            if [ "$result" != 'success' ]; then
              echo "${name} finished with ${result}" >&2
              exit 1
            fi
          }

          assert_success resolve_candidate "$RESOLVE_CANDIDATE"
          assert_success acceptance "$ACCEPTANCE"
          assert_success release "$RELEASE"

  recovery_redeploy:
    name: Recovery Redeploy
    if: ${{ always() && github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    needs:
      - resolve_candidate
      - release
    steps:
      - name: Assert recovery redeploy succeeded
        env:
          RESOLVE_CANDIDATE: ${{ needs.resolve_candidate.result }}
          RELEASE: ${{ needs.release.result }}
        run: |
          set -euo pipefail

          assert_success() {
            local name="$1"
            local result="$2"
            if [ "$result" != 'success' ]; then
              echo "${name} finished with ${result}" >&2
              exit 1
            fi
          }

          assert_success resolve_candidate "$RESOLVE_CANDIDATE"
          assert_success release "$RELEASE"
