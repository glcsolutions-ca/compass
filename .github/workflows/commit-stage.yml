name: commit-stage

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY_BASE: ghcr.io/glcsolutions-ca
  API_IMAGE_NAME: compass-api
  WEB_IMAGE_NAME: compass-web
  WORKER_IMAGE_NAME: compass-worker
  MIGRATIONS_IMAGE_NAME: compass-migrations
  RC_REGISTRY_REPO: ghcr.io/glcsolutions-ca/compass-release-candidates
  ACCEPTANCE_EVIDENCE_REGISTRY_REPO: ghcr.io/glcsolutions-ca/compass-acceptance-evidence

jobs:
  commit_tests:
    name: Commit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      stage_start_at: ${{ steps.capture_start.outputs.stage_start_at }}

    steps:
      - name: Capture commit-stage start time
        id: capture_start
        run: echo "stage_start_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Commit quick gate
        run: pnpm test:quick

      - name: Pipeline script tests
        run: pnpm test:rc

  commit_analysis:
    name: Commit analysis
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs:
      - commit_tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Coverage gate inputs
        run: pnpm test:coverage:commit

      - name: Duplication analysis (JSCPD)
        run: |
          mkdir -p .artifacts/jscpd
          pnpm exec jscpd \
            --reporters json \
            --output .artifacts/jscpd \
            --ignore "**/node_modules/**,**/dist/**,**/coverage/**,**/.next/**,**/.turbo/**,**/pnpm-lock.yaml,**/*.snap,**/packages/contracts/openapi/openapi.json" \
            --format "typescript,javascript,tsx,jsx,json,css,md,yaml,yml" \
            .

      - name: Generate commit analysis report
        run: |
          pnpm rc:analyze:report \
            --config pipeline/commit-analysis.config.json \
            --out .artifacts/commit-analysis/commit-analysis.json \
            --lint-warnings 0 \
            --typecheck-warnings 0

      - name: Upload commit analysis artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: commit-analysis-${{ github.run_id }}
          path: .artifacts/commit-analysis/commit-analysis.json
          if-no-files-found: error

  build_and_publish_images:
    name: Build and publish ${{ matrix.image.id }} image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - commit_tests
    strategy:
      fail-fast: false
      matrix:
        image:
          - id: api
            dockerfile: apps/api/Dockerfile
            image_name: compass-api
          - id: web
            dockerfile: apps/web/Dockerfile
            image_name: compass-web
          - id: worker
            dockerfile: apps/worker/Dockerfile
            image_name: compass-worker
          - id: migrations
            dockerfile: db/Dockerfile.migrations
            image_name: compass-migrations

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image.id }} image
        id: build_image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY_BASE }}/${{ matrix.image.image_name }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=build-${{ matrix.image.id }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.image.id }}

      - name: Record digest output
        run: |
          mkdir -p .artifacts/image-digests
          printf '%s' '${{ steps.build_image.outputs.digest }}' > .artifacts/image-digests/${{ matrix.image.id }}.digest

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-digest-${{ matrix.image.id }}
          path: .artifacts/image-digests/${{ matrix.image.id }}.digest
          if-no-files-found: error

  collect_image_refs:
    name: Collect image refs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - build_and_publish_images
    outputs:
      api_image_ref: ${{ steps.refs.outputs.api_image_ref }}
      web_image_ref: ${{ steps.refs.outputs.web_image_ref }}
      worker_image_ref: ${{ steps.refs.outputs.worker_image_ref }}
      migrations_image_ref: ${{ steps.refs.outputs.migrations_image_ref }}

    steps:
      - name: Download api digest
        uses: actions/download-artifact@v4
        with:
          name: image-digest-api
          path: .artifacts/image-digests

      - name: Download web digest
        uses: actions/download-artifact@v4
        with:
          name: image-digest-web
          path: .artifacts/image-digests

      - name: Download worker digest
        uses: actions/download-artifact@v4
        with:
          name: image-digest-worker
          path: .artifacts/image-digests

      - name: Download migrations digest
        uses: actions/download-artifact@v4
        with:
          name: image-digest-migrations
          path: .artifacts/image-digests

      - name: Capture canonical digest refs
        id: refs
        run: |
          api_digest="$(cat .artifacts/image-digests/api.digest)"
          web_digest="$(cat .artifacts/image-digests/web.digest)"
          worker_digest="$(cat .artifacts/image-digests/worker.digest)"
          migrations_digest="$(cat .artifacts/image-digests/migrations.digest)"

          echo "api_image_ref=${REGISTRY_BASE}/${API_IMAGE_NAME}@${api_digest}" >> "$GITHUB_OUTPUT"
          echo "web_image_ref=${REGISTRY_BASE}/${WEB_IMAGE_NAME}@${web_digest}" >> "$GITHUB_OUTPUT"
          echo "worker_image_ref=${REGISTRY_BASE}/${WORKER_IMAGE_NAME}@${worker_digest}" >> "$GITHUB_OUTPUT"
          echo "migrations_image_ref=${REGISTRY_BASE}/${MIGRATIONS_IMAGE_NAME}@${migrations_digest}" >> "$GITHUB_OUTPUT"

  generate_and_validate_manifest:
    name: Generate and publish release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - collect_image_refs
      - commit_analysis
    outputs:
      candidate_id: ${{ steps.candidate.outputs.candidate_id }}
      manifest_ref: ${{ steps.publish_manifest.outputs.manifest_ref }}
      stage_end_at: ${{ steps.capture_end.outputs.stage_end_at }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute candidate id
        id: candidate
        run: |
          short_sha="${GITHUB_SHA::7}"
          candidate_id="main-${short_sha}-${GITHUB_RUN_ID}"
          echo "candidate_id=${candidate_id}" >> "$GITHUB_OUTPUT"

      - name: Generate release candidate manifest
        run: |
          mkdir -p .artifacts/release-candidate
          node scripts/pipeline/generate-release-candidate.mjs \
            --out .artifacts/release-candidate/manifest.json \
            --candidate-id "${{ steps.candidate.outputs.candidate_id }}" \
            --repository "${{ github.repository }}" \
            --source-revision "${{ github.sha }}" \
            --api-image "${{ needs.collect_image_refs.outputs.api_image_ref }}" \
            --web-image "${{ needs.collect_image_refs.outputs.web_image_ref }}" \
            --worker-image "${{ needs.collect_image_refs.outputs.worker_image_ref }}" \
            --migrations-artifact "${{ needs.collect_image_refs.outputs.migrations_image_ref }}" \
            --registry "${{ env.REGISTRY_BASE }}" \
            --commit-stage-run-id "${{ github.run_id }}"

      - name: Validate release candidate manifest
        run: node scripts/pipeline/validate-release-candidate.mjs --file .artifacts/release-candidate/manifest.json

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR (ORAS)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish release candidate manifest
        id: publish_manifest
        run: |
          candidate_id="${{ steps.candidate.outputs.candidate_id }}"
          cp .artifacts/release-candidate/manifest.json manifest.json
          oras push --artifact-type application/vnd.compass.release-candidate.v1 \
            "${RC_REGISTRY_REPO}:${candidate_id}" \
            "manifest.json:application/vnd.compass.release-candidate.v1+json"
          echo "manifest_ref=${RC_REGISTRY_REPO}:${candidate_id}" >> "$GITHUB_OUTPUT"

      - name: Capture commit-stage end time
        id: capture_end
        run: echo "stage_end_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

  enforce_commit_stage_slo:
    name: Enforce commit-stage SLO
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - commit_tests
      - generate_and_validate_manifest
    if: ${{ needs.generate_and_validate_manifest.result == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Enforce SLO and write metrics
        run: |
          mkdir -p .artifacts/commit-stage
          pnpm rc:slo:check \
            --start "${{ needs.commit_tests.outputs.stage_start_at }}" \
            --end "${{ needs.generate_and_validate_manifest.outputs.stage_end_at }}" \
            --warn-seconds 300 \
            --fail-seconds 600 \
            --out .artifacts/commit-stage/commit-stage-metrics.json

      - name: Upload commit-stage metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: commit-stage-metrics-${{ github.run_id }}
          path: .artifacts/commit-stage/commit-stage-metrics.json
          if-no-files-found: error

  acceptance_tests:
    name: Automated acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs:
      - generate_and_validate_manifest
      - enforce_commit_stage_slo
    if: ${{ needs.generate_and_validate_manifest.result == 'success' && needs.enforce_commit_stage_slo.result == 'success' }}
    outputs:
      started_at: ${{ steps.capture_start.outputs.started_at }}
      finished_at: ${{ steps.capture_finish.outputs.finished_at }}

    steps:
      - name: Capture acceptance start time
        id: capture_start
        run: echo "started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR (ORAS)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Fetch release candidate manifest
        run: |
          node scripts/pipeline/fetch-release-candidate.mjs \
            --candidate-id "${{ needs.generate_and_validate_manifest.outputs.candidate_id }}" \
            --registry-repo "${{ env.RC_REGISTRY_REPO }}" \
            --out "$RUNNER_TEMP/release-candidate.json"

      - name: Re-validate release candidate manifest
        run: node scripts/pipeline/validate-release-candidate.mjs --file "$RUNNER_TEMP/release-candidate.json"

      - name: Deploy exact candidate to acceptance
        env:
          ACCEPTANCE_DEPLOY_COMMAND: ${{ vars.ACCEPTANCE_DEPLOY_COMMAND }}
        run: |
          if [ -z "${ACCEPTANCE_DEPLOY_COMMAND:-}" ]; then
            echo "Repository variable ACCEPTANCE_DEPLOY_COMMAND is required." >&2
            exit 1
          fi
          MANIFEST_PATH="$RUNNER_TEMP/release-candidate.json" bash -lc "$ACCEPTANCE_DEPLOY_COMMAND"

      - name: Deployment verification
        env:
          ACCEPTANCE_VERIFY_COMMAND: ${{ vars.ACCEPTANCE_VERIFY_COMMAND }}
        run: |
          if [ -z "${ACCEPTANCE_VERIFY_COMMAND:-}" ]; then
            echo "Repository variable ACCEPTANCE_VERIFY_COMMAND is required." >&2
            exit 1
          fi
          MANIFEST_PATH="$RUNNER_TEMP/release-candidate.json" bash -lc "$ACCEPTANCE_VERIFY_COMMAND"

      - name: Acceptance endpoint precheck
        env:
          ACCEPTANCE_API_BASE_URL: ${{ vars.ACCEPTANCE_API_BASE_URL }}
          ACCEPTANCE_WEB_BASE_URL: ${{ vars.ACCEPTANCE_WEB_BASE_URL }}
        run: |
          if [ -z "${ACCEPTANCE_API_BASE_URL:-}" ]; then
            echo "Repository variable ACCEPTANCE_API_BASE_URL is required." >&2
            exit 1
          fi
          if [ -z "${ACCEPTANCE_WEB_BASE_URL:-}" ]; then
            echo "Repository variable ACCEPTANCE_WEB_BASE_URL is required." >&2
            exit 1
          fi

          api_base="${ACCEPTANCE_API_BASE_URL%/}"
          web_base="${ACCEPTANCE_WEB_BASE_URL%/}"
          curl --fail --silent --show-error "${api_base}/health" > /dev/null
          curl --fail --silent --show-error "${web_base}/" > /dev/null

      - name: Acceptance system tests
        env:
          ACCEPTANCE_API_BASE_URL: ${{ vars.ACCEPTANCE_API_BASE_URL }}
        run: |
          BASE_URL="${ACCEPTANCE_API_BASE_URL}" TARGET_API_BASE_URL="${ACCEPTANCE_API_BASE_URL}" pnpm test:acceptance:system

      - name: Acceptance browser tests
        env:
          ACCEPTANCE_WEB_BASE_URL: ${{ vars.ACCEPTANCE_WEB_BASE_URL }}
        run: |
          WEB_BASE_URL="${ACCEPTANCE_WEB_BASE_URL}" pnpm test:e2e

      - name: Capture acceptance finish time
        id: capture_finish
        if: always()
        run: echo "finished_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

  record_acceptance_evidence:
    name: Record acceptance evidence
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - generate_and_validate_manifest
      - acceptance_tests
    if: ${{ always() && needs.generate_and_validate_manifest.result == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR (ORAS)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Record acceptance evidence
        run: |
          mkdir -p .artifacts/acceptance-evidence

          verdict="fail"
          if [ "${{ needs.acceptance_tests.result }}" = "success" ]; then
            verdict="pass"
          fi

          started_at="${{ needs.acceptance_tests.outputs.started_at }}"
          finished_at="${{ needs.acceptance_tests.outputs.finished_at }}"

          if [ -z "${started_at}" ]; then
            started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi

          if [ -z "${finished_at}" ]; then
            finished_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi

          node scripts/pipeline/record-acceptance-evidence.mjs \
            --out .artifacts/acceptance-evidence/acceptance-evidence.json \
            --candidate-id "${{ needs.generate_and_validate_manifest.outputs.candidate_id }}" \
            --source-revision "${{ github.sha }}" \
            --workflow-run-id "${{ github.run_id }}" \
            --verdict "${verdict}" \
            --started-at "${started_at}" \
            --finished-at "${finished_at}" \
            --summary "Automated acceptance ${verdict} for candidate ${{ needs.generate_and_validate_manifest.outputs.candidate_id }}"

      - name: Publish acceptance evidence
        run: |
          cp .artifacts/acceptance-evidence/acceptance-evidence.json acceptance-evidence.json
          oras push --artifact-type application/vnd.compass.acceptance-evidence.v1 \
            "${ACCEPTANCE_EVIDENCE_REGISTRY_REPO}:${{ needs.generate_and_validate_manifest.outputs.candidate_id }}" \
            "acceptance-evidence.json:application/vnd.compass.acceptance-evidence.v1+json"
