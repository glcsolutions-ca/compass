name: Commit Stage

on:
  merge_group:
    types:
      - checks_requested
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  actions: read
  contents: read
  pull-requests: read

env:
  EXPECTED_ENTRYPOINT: /

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  classify_change:
    name: classify-change
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      docs_only: ${{ steps.classify.outputs.docs_only }}
      desktop_only: ${{ steps.classify.outputs.desktop_only }}
      docs_changed: ${{ steps.classify.outputs.docs_changed }}
      desktop_changed: ${{ steps.classify.outputs.desktop_changed }}
      runtime_changed: ${{ steps.classify.outputs.runtime_changed }}
      infra_changed: ${{ steps.classify.outputs.infra_changed }}
      identity_changed: ${{ steps.classify.outputs.identity_changed }}
      migration_changed: ${{ steps.classify.outputs.migration_changed }}
      pipeline_changed: ${{ steps.classify.outputs.pipeline_changed }}
      runtime_lane_required: ${{ steps.classify.outputs.runtime_lane_required }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          token: ${{ github.token }}
          base: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          filters: |
            docs:
              - 'docs/**'
              - 'README.md'
              - 'CONTRIBUTING.md'
              - 'AGENTS.md'
              - '**/README.md'
            desktop:
              - 'apps/desktop/**'
            runtime:
              - 'apps/api/**'
              - 'apps/web/**'
              - 'apps/worker/**'
              - 'apps/codex-session-runtime/**'
              - 'apps/api/Dockerfile'
              - 'apps/web/Dockerfile'
              - 'apps/worker/Dockerfile'
              - 'apps/codex-session-runtime/Dockerfile'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '**/package.json'
            infra:
              - 'infra/azure/**'
            identity:
              - 'infra/identity/**'
            migration:
              - 'db/migrations/**'
              - 'db/scripts/**'
            pipeline:
              - '.github/workflows/**'
              - '.github/policy/**'
              - 'scripts/pipeline/**'

      - name: Resolve lane selection
        id: classify
        run: |
          set -euo pipefail

          docs_changed='${{ steps.changes.outputs.docs }}'
          desktop_changed='${{ steps.changes.outputs.desktop }}'
          runtime_changed='${{ steps.changes.outputs.runtime }}'
          infra_changed='${{ steps.changes.outputs.infra }}'
          identity_changed='${{ steps.changes.outputs.identity }}'
          migration_changed='${{ steps.changes.outputs.migration }}'
          pipeline_changed='${{ steps.changes.outputs.pipeline }}'

          docs_only=false
          if [ "$docs_changed" = "true" ] && \
             [ "$desktop_changed" != "true" ] && \
             [ "$runtime_changed" != "true" ] && \
             [ "$infra_changed" != "true" ] && \
             [ "$identity_changed" != "true" ] && \
             [ "$migration_changed" != "true" ] && \
             [ "$pipeline_changed" != "true" ]; then
            docs_only=true
          fi

          desktop_only=false
          if [ "$desktop_changed" = "true" ] && \
             [ "$runtime_changed" != "true" ] && \
             [ "$infra_changed" != "true" ] && \
             [ "$identity_changed" != "true" ] && \
             [ "$migration_changed" != "true" ] && \
             [ "$pipeline_changed" != "true" ] && \
             [ "$docs_changed" != "true" ]; then
            desktop_only=true
          fi

          runtime_lane_required=false
          if [ "$runtime_changed" = "true" ] || \
             [ "$infra_changed" = "true" ] || \
             [ "$identity_changed" = "true" ] || \
             [ "$migration_changed" = "true" ] || \
             [ "$pipeline_changed" = "true" ]; then
            runtime_lane_required=true
          fi

          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"
          echo "desktop_only=$desktop_only" >> "$GITHUB_OUTPUT"
          echo "docs_changed=$docs_changed" >> "$GITHUB_OUTPUT"
          echo "desktop_changed=$desktop_changed" >> "$GITHUB_OUTPUT"
          echo "runtime_changed=$runtime_changed" >> "$GITHUB_OUTPUT"
          echo "infra_changed=$infra_changed" >> "$GITHUB_OUTPUT"
          echo "identity_changed=$identity_changed" >> "$GITHUB_OUTPUT"
          echo "migration_changed=$migration_changed" >> "$GITHUB_OUTPUT"
          echo "pipeline_changed=$pipeline_changed" >> "$GITHUB_OUTPUT"
          echo "runtime_lane_required=$runtime_lane_required" >> "$GITHUB_OUTPUT"

          mkdir -p ".artifacts/commit-stage/${GITHUB_SHA}"
          cat > ".artifacts/commit-stage/${GITHUB_SHA}/scope.json" <<JSON
          {
            "schemaVersion": "1",
            "generatedAt": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "testedSha": "${GITHUB_SHA}",
            "eventName": "${GITHUB_EVENT_NAME}",
            "scope": {
              "docs": ${docs_changed},
              "desktop": ${desktop_changed},
              "runtime": ${runtime_changed},
              "infra": ${infra_changed},
              "identity": ${identity_changed},
              "migration": ${migration_changed},
              "pipeline": ${pipeline_changed},
              "docsOnly": ${docs_only},
              "desktopOnly": ${desktop_only}
            }
          }
          JSON

      - name: Upload scope artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: commit-stage-scope-${{ github.sha }}
          path: .artifacts/commit-stage/${{ github.sha }}/scope.json
          if-no-files-found: warn

  docs_checks:
    name: docs-checks
    needs:
      - classify_change
    if: ${{ needs.classify_change.outputs.docs_only == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run docs lane checks
        run: |
          pnpm ci:doc-quality
          pnpm ci:terminology-policy

  runtime_commit_tests:
    name: runtime-commit-tests
    needs:
      - classify_change
    if: ${{ needs.classify_change.outputs.runtime_lane_required == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run runtime commit lane
        run: pnpm ci:commit-test-suite

  desktop_commit_tests:
    name: desktop-commit-tests
    needs:
      - classify_change
    if: ${{ needs.classify_change.outputs.desktop_changed == 'true' && needs.classify_change.outputs.docs_only != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run desktop commit lane
        run: |
          pnpm --filter @compass/desktop lint
          pnpm --filter @compass/desktop test
          pnpm --filter @compass/desktop typecheck

  infra_static_check:
    name: infra-static-check
    needs:
      - classify_change
    if: ${{ needs.classify_change.outputs.infra_changed == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile Bicep entrypoint
        run: az bicep build --file infra/azure/main.bicep --stdout >/dev/null

  identity_static_check:
    name: identity-static-check
    needs:
      - classify_change
    if: ${{ needs.classify_change.outputs.identity_changed == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform -chdir=infra/identity fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform -chdir=infra/identity init -backend=false -input=false

      - name: Terraform validate
        run: terraform -chdir=infra/identity validate

  commit_stage:
    name: commit-stage
    if: ${{ always() }}
    needs:
      - classify_change
      - docs_checks
      - runtime_commit_tests
      - desktop_commit_tests
      - infra_static_check
      - identity_static_check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TESTED_SHA: ${{ github.sha }}
      DOCS_ONLY: ${{ needs.classify_change.outputs.docs_only }}
      DESKTOP_CHANGED: ${{ needs.classify_change.outputs.desktop_changed }}
      RUNTIME_REQUIRED: ${{ needs.classify_change.outputs.runtime_lane_required }}
      INFRA_CHANGED: ${{ needs.classify_change.outputs.infra_changed }}
      IDENTITY_CHANGED: ${{ needs.classify_change.outputs.identity_changed }}
      DOCS_CHECKS_RESULT: ${{ needs.docs_checks.result }}
      RUNTIME_CHECKS_RESULT: ${{ needs.runtime_commit_tests.result }}
      DESKTOP_CHECKS_RESULT: ${{ needs.desktop_commit_tests.result }}
      INFRA_CHECK_RESULT: ${{ needs.infra_static_check.result }}
      IDENTITY_CHECK_RESULT: ${{ needs.identity_static_check.result }}
    steps:
      - name: Evaluate commit-stage
        id: evaluate
        run: |
          set -euo pipefail

          pass=true
          reason_codes='[]'

          add_reason() {
            local code="$1"
            reason_codes="$(jq -c --arg code "$code" '. + [$code]' <<<"$reason_codes")"
            pass=false
          }

          if [ "$DOCS_ONLY" = "true" ] && [ "$DOCS_CHECKS_RESULT" != "success" ]; then
            add_reason "DOCS_CHECKS_FAILED"
          fi

          if [ "$RUNTIME_REQUIRED" = "true" ] && [ "$RUNTIME_CHECKS_RESULT" != "success" ]; then
            add_reason "RUNTIME_COMMIT_TESTS_FAILED"
          fi

          if [ "$DESKTOP_CHANGED" = "true" ] && [ "$DESKTOP_CHECKS_RESULT" != "success" ]; then
            add_reason "DESKTOP_COMMIT_TESTS_FAILED"
          fi

          if [ "$INFRA_CHANGED" = "true" ] && [ "$INFRA_CHECK_RESULT" != "success" ]; then
            add_reason "INFRA_STATIC_CHECK_FAILED"
          fi

          if [ "$IDENTITY_CHANGED" = "true" ] && [ "$IDENTITY_CHECK_RESULT" != "success" ]; then
            add_reason "IDENTITY_STATIC_CHECK_FAILED"
          fi

          mkdir -p ".artifacts/commit-stage/$TESTED_SHA"
          cat > ".artifacts/commit-stage/$TESTED_SHA/result.json" <<JSON
          {
            "schemaVersion": "1",
            "generatedAt": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "testedSha": "$TESTED_SHA",
            "pass": $pass,
            "reasonCodes": $reason_codes,
            "checks": {
              "classifyChange": "${{ needs.classify_change.result }}",
              "docsChecks": "$DOCS_CHECKS_RESULT",
              "runtimeCommitTests": "$RUNTIME_CHECKS_RESULT",
              "desktopCommitTests": "$DESKTOP_CHECKS_RESULT",
              "infraStaticCheck": "$INFRA_CHECK_RESULT",
              "identityStaticCheck": "$IDENTITY_CHECK_RESULT"
            }
          }
          JSON

          echo "gate_pass=$pass" >> "$GITHUB_OUTPUT"

      - name: Upload commit-stage artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: commit-stage-${{ env.TESTED_SHA }}
          path: .artifacts/commit-stage/${{ env.TESTED_SHA }}/result.json
          if-no-files-found: warn

      - name: Fail when commit-stage is NO
        if: ${{ steps.evaluate.outputs.gate_pass != 'true' }}
        run: |
          echo "commit-stage failed" >&2
          exit 1
