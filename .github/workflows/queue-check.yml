name: queue-check

on:
  merge_group:
    types:
      - checks_requested

permissions:
  contents: read

jobs:
  queue-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit

      - name: Contract tests (pipeline scripts)
        run: pnpm test:rc

      - name: Docker smoke build api
        run: docker build -f apps/api/Dockerfile -t compass-api:queue-${{ github.sha }} .

      - name: Docker smoke build web
        run: docker build -f apps/web/Dockerfile -t compass-web:queue-${{ github.sha }} .

      - name: Docker smoke build worker
        run: docker build -f apps/worker/Dockerfile -t compass-worker:queue-${{ github.sha }} .
