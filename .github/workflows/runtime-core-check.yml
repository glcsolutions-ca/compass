name: runtime-core-check

on:
  pull_request:
    branches:
      - main
    paths:
      - apps/codex-session-runtime/**
      - packages/codex-runtime-core/**
      - packages/codex-protocol/**
  merge_group:
    types:
      - checks_requested

permissions:
  contents: read

jobs:
  runtime-core-check:
    name: runtime-core-check
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect runtime-core scope changes
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MG_BASE_SHA: ${{ github.event.merge_group.base_sha }}
          MG_HEAD_SHA: ${{ github.event.merge_group.head_sha }}
        run: |
          base_sha=""
          head_sha=""

          if [ "$EVENT_NAME" = "pull_request" ]; then
            base_sha="$PR_BASE_SHA"
            head_sha="$PR_HEAD_SHA"
          elif [ "$EVENT_NAME" = "merge_group" ]; then
            base_sha="$MG_BASE_SHA"
            head_sha="$MG_HEAD_SHA"
          fi

          if [ -z "$base_sha" ] || [ -z "$head_sha" ]; then
            echo "Unable to resolve diff range for event '$EVENT_NAME'; running check by default."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --name-only "$base_sha" "$head_sha" > "$RUNNER_TEMP/runtime-core-changes.txt"

          if rg -q '^(apps/codex-session-runtime/|packages/codex-runtime-core/|packages/codex-protocol/)' "$RUNNER_TEMP/runtime-core-changes.txt"; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (no runtime-core changes)
        if: steps.scope.outputs.should_run != 'true'
        run: echo "No runtime-core-related changes detected; skipping runtime-core-check."

      - name: Setup pnpm
        if: steps.scope.outputs.should_run == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node
        if: steps.scope.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: steps.scope.outputs.should_run == 'true'
        run: pnpm install --frozen-lockfile

      - name: Runtime-core lint
        if: steps.scope.outputs.should_run == 'true'
        run: pnpm --filter @compass/codex-runtime-core lint

      - name: Runtime-core tests
        if: steps.scope.outputs.should_run == 'true'
        run: |
          pnpm --filter @compass/codex-runtime-core test
          pnpm --filter @compass/codex-session-runtime test
